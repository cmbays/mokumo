language: rust
stack: backend
env:
  CARGO_TERM_COLOR: always
fileGroups:
  sources:
  - src/**/*
  - Cargo.toml
  - /Cargo.toml
  - /Cargo.lock
  migrations:
  - /crates/kikan/src/migrations/**/*
  - /crates/mokumo-shop/src/migrations/**/*
  allRust:
  - /crates/*/src/**/*
  - /crates/*/Cargo.toml
  - /apps/*/src/**/*
  - /apps/*/Cargo.toml
  - src/**/*
  - Cargo.toml
  - /Cargo.toml
  - /Cargo.lock
tasks:
  build:
    command: cargo build --package mokumo-server
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  dev:
    # Build first, then exec the binary directly so Moon holds the actual server PID.
    # `cargo run` forks a child and doesn't forward signals — the binary becomes an
    # orphan when the parent is killed. `exec` replaces the shell with the server process.
    script: |
      set -euo pipefail
      cargo build -p mokumo-server
      TARGET_DIR=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import sys,json;print(json.load(sys.stdin)["target_directory"])')
      exec "$TARGET_DIR/debug/mokumo-server" serve
    deps:
    - web:build
    options:
      cache: false
      persistent: true
      outputStyle: stream
      runFromWorkspaceRoot: true
  # `--exclude mokumo-desktop --exclude kikan-tauri --exclude kikan-admin-ui`
  # appears on every cargo invocation in this file (test, crap, coverage-*,
  # lint-rust, types-export). Architectural rationale lives in
  # docs/adr/adr-coverage-exclusions.md — these crates have zero unit-test
  # surface under cargo nextest by design (Tauri runtime requirement,
  # rust-embed compile-time frontend dependency).
  test:
    command: cargo nextest run --profile ci --workspace --exclude mokumo-desktop --exclude kikan-tauri --exclude kikan-admin-ui
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    - /crates/*/tests/**/*
    - tests/**/*.rs
    options:
      runFromWorkspaceRoot: true
  test-bdd:
    # Shop-vertical BDD harness (unchanged from PR 4b).
    command: cargo test --package mokumo-shop --test bdd --features bdd
    inputs:
      - src/**/*
      - tests/**/*.rs
      - tests/features/**/*.feature
      - Cargo.toml
      - /Cargo.toml
      - /Cargo.lock
    options:
      runFromWorkspaceRoot: true
  test-bdd-api:
    # Axum/HTTP BDD harness — exercises the data-plane router end-to-end
    # via the in-process Axum app (no real network bind).
    command: cargo test --package mokumo-shop --test api_bdd --features bdd
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    - tests/**/*.rs
    - tests/api_features/**/*.feature
    options:
      runFromWorkspaceRoot: true
  test-platform-bdd:
    # Platform BDD harness — covers database initialization, first-run detection,
    # install validation, migration safety, restore validation, and storage
    # diagnostics against the kikan platform schema + mokumo vertical migrations.
    # Uses `@group(allRust)` so changes to kikan's platform migrations invalidate
    # the cache — this harness exercises cross-crate migration integration.
    command: cargo test --package mokumo-shop --test platform_bdd --features bdd
    inputs:
    - '@group(allRust)'
    - tests/**/*.rs
    - tests/platform_features/**/*.feature
    options:
      runFromWorkspaceRoot: true
  crap:
    # CRAP (Change Risk Anti-Patterns) quality gate — scoped to unit-testable crates.
    # Integration-only layers (crates/mokumo-shop HTTP adapters, apps/mokumo-desktop)
    # are excluded via crap4rs.toml. Generates LCOV coverage then runs crap4rs.
    script: |
      set -euo pipefail
      mkdir -p tmp
      cargo llvm-cov nextest --workspace --exclude mokumo-desktop --exclude kikan-tauri --exclude kikan-admin-ui --lcov --output-path tmp/lcov.info
      crap4rs --coverage tmp/lcov.info --src .
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    - /crap4rs.toml
    options:
      cache: false
      runFromWorkspaceRoot: true
  coverage:
    # --lib: unit tests only. Integration/BDD coverage excluded intentionally at M0.
    # Add --tests when domain logic in crates/core/ warrants full-stack coverage.
    command: cargo llvm-cov nextest --lib --workspace --exclude mokumo-desktop --exclude kikan-tauri --exclude kikan-admin-ui --json --output-path coverage.json
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  coverage-report:
    # Standalone alternative to `coverage` — re-runs tests with instrumentation.
    # Keep command flags in sync with `coverage` above.
    command: cargo llvm-cov nextest --lib --workspace --exclude mokumo-desktop --exclude kikan-tauri --exclude kikan-admin-ui --html --output-dir coverage/rust
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  lint:
    command: cargo clippy --workspace --exclude mokumo-desktop --exclude kikan-tauri --exclude kikan-admin-ui --all-targets -- -D warnings
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  deny:
    command: cargo deny check
    inputs:
    - /deny.toml
    - /Cargo.lock
    - /Cargo.toml
    - /crates/*/Cargo.toml
    - /apps/*/Cargo.toml
    - Cargo.toml
    options:
      runFromWorkspaceRoot: true
  fmt:
    command: cargo fmt --all --check
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  fmt-write:
    command: cargo fmt --all
    options:
      cache: false
      runFromWorkspaceRoot: true
  gen-types:
    command: cargo test --package kikan-types -- export_bindings
    env:
      TS_RS_EXPORT_DIR: ../../apps/web/src/lib/types/kikan
    inputs:
    - /crates/kikan-types/src/**/*
    - /crates/kikan-types/Cargo.toml
    outputs:
    - /apps/web/src/lib/types/kikan/
    options:
      runFromWorkspaceRoot: true
  gen-types-shop:
    # Regenerate TypeScript bindings for the mokumo-shop vertical.
    # Kept separate from `gen-types` (which targets the platform `kikan-types`
    # crate) because Stage 3 splits the two out: platform DTOs stay under
    # apps/web/src/lib/types/kikan/, vertical DTOs land under types/shop/.
    command: cargo test --package mokumo-shop --lib -- export_bindings
    env:
      TS_RS_EXPORT_DIR: ../../apps/web/src/lib/types/shop
    inputs:
    - /crates/mokumo-shop/src/types/**/*
    - /crates/mokumo-shop/Cargo.toml
    outputs:
    - /apps/web/src/lib/types/shop/
    options:
      runFromWorkspaceRoot: true
  db-prepare:
    command: cargo sqlx prepare --workspace
    inputs:
    - '@group(allRust)'
    - '@group(migrations)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  mutate:
    command: cargo mutants --workspace
    options:
      cache: false
      runFromWorkspaceRoot: true
  smoke:
    # External HTTP smoke tests against a running server.
    # Single source of truth for the api-smoke gate — CI invokes this task
    # rather than inlining its own list of .hurl paths (mokumo#383).
    #
    # Pre-boot seed: `web:seed-demo` produces apps/web/scripts/demo.db; we
    # point MOKUMO_DEMO_SIDECAR at it so the boot-time SidecarRecovery in
    # crates/mokumo-shop/src/graft.rs copies the seeded data into the demo
    # profile and validates. That flips `demo_install_ok=true` from t0 so
    # the data-plane boot guard in
    # crates/mokumo-shop/src/auth/handlers.rs lifts before any test
    # runs. Without this seed, every protected route returns 423
    # `demo_setup_required`.
    #
    # tests/api/_prelude/healthy-demo.hurl runs first as a fail-fast gate
    # on the seed; if the sidecar didn't take, we abort with a clear
    # assertion failure instead of cascading 423s downstream.
    #
    # Multi-phase auth bootstrap (mokumo#723 PR-2.5):
    #
    #   Phase 1 — Demo-profile coverage. `hurl --test <file…>` over
    #     endpoints that either do not need auth, or whose auth is carried
    #     by the demo profile's auto-login middleware
    #     (`require_auth_with_demo_auto_login` in
    #     `crates/mokumo-shop/src/auth/handlers.rs`). Boot is cold: no admin
    #     exists yet, `active_profile=demo`. `tests/api/_prelude/healthy-demo.hurl`
    #     fail-fast asserts the demo sidecar took.
    #
    #   Setup wizard — Capture the `Setup token: <uuid>` line `mokumo-server`
    #     `eprintln!`s on cold boot (operator UX contract from
    #     `apps/mokumo-server/src/main.rs`). POST /api/setup with the token,
    #     admin credentials, and a non-empty `shop_name`. The vertical
    #     handler at `crates/mokumo-shop/src/setup.rs` calls
    #     `kikan::control_plane::users::setup_admin` (creates admin in the
    #     auth profile DB atomically with recovery codes + the
    #     `setup_completed` flag), then writes `shop_settings.shop_name`
    #     and atomically flips `<data_dir>/active_profile` to `production`.
    #     From this point demo auto-login is disabled.
    #
    #   Phase 1.5a — login-success smoke files. The seeded admin now exists
    #     in the auth profile DB (`SetupMode::Production`); both the legacy
    #     `/api/auth/login` alias and the canonical
    #     `/api/platform/v1/auth/login` resolve cleanly.
    #
    #   Phase 1.5b — `hurl --cookie-jar "$COOKIE_JAR" --test
    #     tests/api/_prelude/admin-login.hurl` POSTs the canonical
    #     `/api/platform/v1/auth/login` with admin creds. The Set-Cookie
    #     response carries the `id` session cookie (the `tower-sessions`
    #     default, pinned in `kikan::data_plane::session_layer::SESSION_COOKIE_NAME`)
    #     for the auth profile DB, so subsequent `Backend::get_user(user_id)`
    #     lookups succeed.
    #
    #   Phase 2 — `hurl --cookie "$COOKIE_JAR" --test <file…>` runs the
    #     explicit-admin suite (canonical and legacy `/auth/me`, admin
    #     `/api/users/*` routes, the `shop/logo-*` write trio, and
    #     `/api/customers/get` self-seeded chain). All target handlers
    #     strictly resolve `auth_session.user`, which now resolves cleanly
    #     because the admin is in the auth profile DB.
    #
    # Why a shared cookie jar instead of per-file embedded login: the
    # in-memory rate limiter in `kikan::rate_limit::RateLimiter`
    # (10/15min sliding window per email) caps repeated logins; the
    # shared jar keeps the login cost at one request regardless of
    # how many explicit-cookie tests are added later.
    #
    # Why the HTTP setup wizard (not `mokumo-server bootstrap`): post-M00,
    # `bootstrap` writes admin rows into the per-profile users table, but
    # the legacy-completed-install upgrade path on the next boot moves
    # those rows into `meta.users` (see
    # `crates/kikan/src/meta/upgrade.rs`). The setup wizard is the
    # post-M00-correct admin-creation path; it lands the admin where
    # `Backend::get_user` looks for it on every subsequent request.
    #
    # Local run: moon run shop:smoke
    # Env file: copy tests/api/envs/local.env.example → tests/api/envs/local.env (gitignored)
    script: |
      set -euo pipefail
      cp -n tests/api/envs/ci.env.example tests/api/envs/ci.env 2>/dev/null || true
      cargo build -p mokumo-server
      TARGET_DIR=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import sys,json;print(json.load(sys.stdin)["target_directory"])')
      export MOKUMO_DEMO_SIDECAR="$PWD/apps/web/scripts/demo.db"
      if [ ! -f "$MOKUMO_DEMO_SIDECAR" ]; then
        echo "demo sidecar missing at $MOKUMO_DEMO_SIDECAR (web:seed-demo must run before shop:smoke)" >&2
        exit 1
      fi
      # Isolated data dir so each run boots into setup_required state. The
      # trap also removes the cookie jar and the captured stderr.
      # mktemp invocations use a positional template (not `-t`) for portability
      # across GNU and BSD mktemp — `-t` semantics differ between them.
      MOKUMO_DATA_DIR=$(mktemp -d "${TMPDIR:-/tmp}/mokumo-smoke.XXXXXX")
      export MOKUMO_DATA_DIR
      COOKIE_JAR=$(mktemp "${TMPDIR:-/tmp}/mokumo-smoke-cookies.XXXXXX")
      SERVER_STDERR=$(mktemp "${TMPDIR:-/tmp}/mokumo-smoke-stderr.XXXXXX")
      cleanup() {
        # Surface server stderr so failures (auth setup, boot guards) are
        # diagnosable from CI logs. Direct redirect above means none of it
        # has hit the parent's stderr yet.
        if [ -s "$SERVER_STDERR" ]; then
          echo "--- mokumo-server stderr ---" >&2
          cat "$SERVER_STDERR" >&2
        fi
        kill $SERVER_PID 2>/dev/null || true
        rm -f "$COOKIE_JAR" "$SERVER_STDERR" 2>/dev/null || true
        rm -rf "$MOKUMO_DATA_DIR" 2>/dev/null || true
      }
      trap cleanup EXIT
      # Boot cold. Server prints `Setup token: <uuid>` to stderr on first
      # boot when no admin exists yet; we capture stderr to a file so the
      # wizard step below can read the token. Direct redirect (no tee):
      # `eprintln!` is unbuffered, but `tee` block-buffers its file output,
      # so a single short line written to a long-lived background process's
      # stderr never flushes through tee. The cleanup hook dumps the file
      # to stderr on exit so CI keeps visibility.
      "$TARGET_DIR/debug/mokumo-server" serve --deployment-mode lan --host 127.0.0.1 \
        2> "$SERVER_STDERR" &
      SERVER_PID=$!
      ready=0
      for i in $(seq 1 30); do
        if curl -sf http://localhost:6565/api/health > /dev/null 2>&1; then ready=1; break; fi
        sleep 1
      done
      if [ "$ready" -ne 1 ]; then
        echo "mokumo-server did not become healthy within 30s" >&2
        exit 1
      fi
      # ---------------------------------------------------------------------
      # Documented exclusions / retirements — files kept on disk and
      # intentionally NOT in the active list, plus tombstones for files
      # whose premise is structurally impossible against the current harness.
      # Each entry names the failure mode and the work-item that restores
      # it (or the canonical equivalent for retired files). Update this
      # block (NOT delete entries) when un-darking.
      #
      #   tests/api/routing/api-prefix-boundary.hurl
      #     Resolved (mokumo#694): the regression was on `GET /api/`
      #     (trailing slash) — `.route("/api/{*rest}", ...)` requires
      #     `*rest` to be non-empty, so `/api/` slipped through to the
      #     SPA shell and broke the JSON-404 contract. Fix added an
      #     explicit `.route("/api/", ...)` next to the bare and starred
      #     forms in `kikan/src/data_plane/router.rs::mount_spa_fallback`.
      #     Re-attached to the active list below.
      #
      #   tests/api/auth/me-unauthenticated.hurl  [retired — file removed]
      #     Premise (assert 401 on `GET /api/auth/me` without a session)
      #     is structurally impossible against the demo profile because
      #     the legacy `/api/auth/me` mount is behind
      #     `require_auth_with_demo_auto_login` (see `routes.rs`
      #     `protected_auth_routes`), which auto-issues a session for
      #     anonymous callers. The 401 wire shape is exercised by the
      #     canonical mount via `tests/api/platform/auth/me-unauthenticated.hurl`,
      #     which is mounted OUTSIDE the demo-auto-login layer.
      #     Re-attach would require a separate production-profile smoke
      #     task; deferred indefinitely (no current track).
      #
      #   tests/api/customers/list-unauthenticated.hurl  [retired — file removed]
      #     Same structural impossibility as `auth/me-unauthenticated`:
      #     `/api/customers` is behind `require_auth_with_demo_auto_login`
      #     so anonymous callers get auto-issued a session. The 401-on-
      #     missing-cookie wire shape is exercised by
      #     `tests/api/platform/auth/me-unauthenticated.hurl`. Re-attach
      #     would require a production-profile harness; deferred.
      #
      #   tests/api/auth/login-success.hurl
      #   tests/api/platform/auth/login-success.hurl
      #     Resolved (mokumo#723): the production profile DB is seeded
      #     with `admin@demo.local` by the HTTP setup wizard step below
      #     (POST /api/setup with the `Setup token: <uuid>` printed to
      #     stderr on cold boot). Both endpoints route through the
      #     canonical kikan login handler, which authenticates against
      #     `Graft::auth_profile_kind()` (`SetupMode::Production`); with
      #     the seeded admin row present, login resolves cleanly.
      #     Re-attached in Phase 1.5a, after the wizard runs.
      #
      # Coverage notes — files in the active list with known structural-only
      # coverage that requires a Rust-side backstop per the G3 split:
      #
      #   tests/api/shop/restore.hurl
      #   tests/api/shop/restore-validate.hurl
      #     Under the smoke harness, `RestoreGuard::acquire` always returns
      #     409 `production_db_exists` before body parsing, so the 400
      #     `parse_error` and 429 `rate_limited` paths are unreachable here.
      #     Per-variant Rust unit tests for those wire shapes are tracked in
      #     mokumo#701.
      #
      #   tests/api/auth/recover.hurl
      #     Per the anti-enumeration design in
      #     `crates/mokumo-shop/src/auth/recover.rs`, rate-limit / invalid
      #     code / short-password all collapse to the same 400
      #     `validation_error` wire shape. Hurl asserts that rejection
      #     contract; the per-branch reasoning lives in Rust unit tests.
      #
      # Routes intentionally NOT covered by shop:smoke (PR 3 ledger):
      #
      #   POST /api/demo/reset
      #     Always restarts the server (`crates/mokumo-shop/src/demo_reset.rs`
      #     all paths). Calling it from the smoke harness would orphan the
      #     captured stderr file and break every subsequent test. Covered
      #     out-of-band by the Tauri `demo-smoke` desktop job.
      #
      #   POST /api/profile/switch
      #     Flips `<data_dir>/active_profile` on disk and in memory
      #     (`crates/mokumo-shop/src/profile_switch.rs`). Switching out of
      #     production would invalidate the shared cookie jar and reshape
      #     `/api/setup-status`, breaking every other Phase 2 file. Needs a
      #     dedicated harness; not in PR 3 scope.
      #
      #   GET /ws
      #     WebSocket upgrade — Hurl is HTTP-only by design. Covered by
      #     Playwright BDD scenarios in `apps/web/tests`.
      #
      #   GET|POST /api/debug/*
      #     `cfg(debug_assertions)` only — the release binary the smoke
      #     harness boots does not register these routes.
      #
      # ---------------------------------------------------------------------
      # Phase 1 — unauthenticated paths and demo-auto-login-carried tests.
      # Excludes login-success.hurl: admin doesn't exist yet (setup wizard
      # below creates it). Excludes any cookie-bearing tests: those run in
      # Phase 2 against the post-setup production profile.
      hurl --variables-file tests/api/envs/ci.env --test \
        tests/api/_prelude/healthy-demo.hurl \
        tests/api/routing/api-prefix-boundary.hurl \
        tests/api/routing/method-rejection.hurl \
        tests/api/health/health.hurl \
        tests/api/health/security-headers.hurl \
        tests/api/offline/boot.hurl \
        tests/api/bind/ephemeral-loopback.hurl \
        tests/api/security/host-allowlist.hurl \
        tests/api/kikan-version/kikan-version.hurl \
        tests/api/server-info.hurl \
        tests/api/setup-status.hurl \
        tests/api/auth/login-bad-credentials.hurl \
        tests/api/auth/login-rate-limit.hurl \
        tests/api/auth/forgot-password.hurl \
        tests/api/auth/reset-password.hurl \
        tests/api/auth/recover.hurl \
        tests/api/auth/logout.hurl \
        tests/api/platform/auth/login-bad-credentials.hurl \
        tests/api/platform/auth/login-rate-limit.hurl \
        tests/api/platform/auth/me-unauthenticated.hurl \
        tests/api/platform/auth/logout.hurl \
        tests/api/platform/auth/recover-request.hurl \
        tests/api/platform/auth/recover-complete.hurl \
        tests/api/platform/auth/recover-rate-limit.hurl \
        tests/api/customers/not-found.hurl \
        tests/api/customers/list.hurl \
        tests/api/customers/create.hurl \
        tests/api/activity/list.hurl \
        tests/api/settings/lan-access.hurl \
        tests/api/shop/logo-get.hurl \
        tests/api/shop/restore-validate.hurl \
        tests/api/shop/restore.hurl \
        tests/api/backup/status.hurl \
        tests/api/diagnostics/diagnostics.hurl \
        tests/api/diagnostics/bundle.hurl
      # Setup wizard — extract the `Setup token: <uuid>` line from stderr
      # (anchor on the literal prefix so unrelated UUIDs in trace/request
      # logs cannot collide), then run tests/api/_prelude/setup-wizard.hurl
      # which POSTs /api/setup with the captured token plus admin creds
      # and shop_name from ci.env. The wizard creates the admin user in
      # the auth profile DB, writes shop_settings.shop_name, and atomically
      # flips `<data_dir>/active_profile` to production. From this point
      # demo auto-login is disabled; cookie-bearing requests are required.
      SETUP_TOKEN=$(grep -m1 -oE 'Setup token: [0-9a-fA-F-]{36}' "$SERVER_STDERR" \
        | sed -E 's/^Setup token: //')
      if [ -z "$SETUP_TOKEN" ]; then
        echo "setup token not found in server stderr" >&2
        cat "$SERVER_STDERR" >&2
        exit 1
      fi
      hurl --variables-file tests/api/envs/ci.env \
        --variable "setup_token=$SETUP_TOKEN" \
        --test tests/api/_prelude/setup-wizard.hurl
      # Phase 1.5a — login-success files. Admin now exists in the auth
      # profile DB; both endpoints (legacy alias + canonical) resolve.
      hurl --variables-file tests/api/envs/ci.env --test \
        tests/api/auth/login-success.hurl \
        tests/api/platform/auth/login-success.hurl
      # Phase 1.5b — populate the cookie jar with a single admin session.
      hurl --variables-file tests/api/envs/ci.env --cookie-jar "$COOKIE_JAR" --test \
        tests/api/_prelude/admin-login.hurl
      # Phase 2 — explicit-admin tests reading the shared cookie jar.
      # `--jobs 1` is required: hurl --test runs files in parallel by
      # default (one job per CPU), but two collisions need serialization:
      #   1. shop/logo-* mutate the same `shop_settings WHERE id = 1`
      #      row; logo-delete.hurl's DELETE can land between logo-upload's
      #      POST and its follow-up `/api/setup-status` read, blanking
      #      logo_extension/logo_epoch and turning logo_url back to null.
      #   2. customers/{update,delete,restore}.hurl each open a write
      #      transaction that includes an activity_log INSERT; running
      #      them concurrently with each other (and with customers/get's
      #      seeding POST) starves the SeaORM transaction coordinator
      #      and surfaces SQLITE_BUSY before the 5s busy_timeout retry
      #      window can drain (PR 3 CI evidence).
      # Order within the logo trio: logo-upload first (leaves a logo),
      # logo-upload-errors next (validation rejects, no state change),
      # logo-delete last (uploads + deletes; ends with no logo on disk).
      hurl --variables-file tests/api/envs/ci.env --cookie "$COOKIE_JAR" --jobs 1 --test \
        tests/api/auth/me.hurl \
        tests/api/platform/auth/me.hurl \
        tests/api/account/recovery-codes-regenerate.hurl \
        tests/api/customers/get.hurl \
        tests/api/customers/update.hurl \
        tests/api/customers/delete.hurl \
        tests/api/customers/restore.hurl \
        tests/api/users/soft-delete-not-found.hurl \
        tests/api/users/update-role-not-found.hurl \
        tests/api/shop/logo-upload.hurl \
        tests/api/shop/logo-upload-errors.hurl \
        tests/api/shop/logo-delete.hurl
    deps:
    - web:build
    - web:seed-demo
    inputs:
    - '@group(allRust)'
    - /tests/api/**/*.hurl
    - /tests/api/envs/ci.env.example
    - /tests/api/shop/fixtures/**/*
    - /apps/web/scripts/seed-demo.ts
    options:
      cache: false
      runFromWorkspaceRoot: true
  entity-check:
    command: cargo test --package mokumo-shop --test platform_entity_drift
    inputs:
    - '@group(allRust)'
    - '@group(migrations)'
    - /crates/*/tests/**/*
    options:
      runFromWorkspaceRoot: true
  bindings-check:
    deps:
    - web:build
    script: |
      set -euo pipefail
      TEMP_BINDINGS="$(mktemp -d)"
      SHOP_BINDINGS="$(mktemp -d)"
      KIKAN_BINDINGS="$(mktemp -d)"
      trap 'rm -rf "$TEMP_BINDINGS" "$SHOP_BINDINGS" "$KIKAN_BINDINGS"' EXIT

      TS_RS_EXPORT_DIR="$TEMP_BINDINGS" cargo test --workspace --exclude mokumo-desktop --exclude kikan-tauri --exclude kikan-admin-ui

      # Format generated files so diff ignores stylistic differences (oxfmt vs ts-rs)
      npx oxfmt "$TEMP_BINDINGS"/*.ts 2>/dev/null || true
      npx oxfmt apps/web/src/lib/types/kikan/*.ts 2>/dev/null || true
      npx oxfmt apps/web/src/lib/types/shop/*.ts 2>/dev/null || true

      # Fan out ts-rs output (flat temp dir) to the per-crate committed layout.
      # kikan-types → types/kikan/, mokumo-shop → types/shop/. Any file that
      # lives in one committed directory but is produced with different content
      # by another crate will be caught here.

      for f in apps/web/src/lib/types/shop/*.ts; do
        name="$(basename "$f")"
        if [ -f "$TEMP_BINDINGS/$name" ]; then
          cp "$TEMP_BINDINGS/$name" "$SHOP_BINDINGS/$name"
          rm "$TEMP_BINDINGS/$name"
        fi
      done
      cp "$TEMP_BINDINGS"/*.ts "$KIKAN_BINDINGS/" 2>/dev/null || true
      # ts-rs emits `serde_json/JsonValue.ts` as a subdir alongside the flat
      # DTO files when a struct references `serde_json::Value` (e.g. the
      # activity-log payload). Propagate that subdir to the expected-output
      # layout so the diff does not flag it as drift.
      for sub in "$TEMP_BINDINGS"/*/; do
        [ -d "$sub" ] || continue
        cp -r "$sub" "$KIKAN_BINDINGS/"
      done

      diff -ru apps/web/src/lib/types/kikan/ "$KIKAN_BINDINGS/"
      diff -ru apps/web/src/lib/types/shop/ "$SHOP_BINDINGS/"
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
