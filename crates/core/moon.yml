language: rust
stack: backend
tasks:
  test-bdd:
    command: cargo test --package mokumo-core --test bdd --features bdd
    inputs:
      - src/**/*
      - tests/**/*.rs
      - tests/features/**/*.feature
      - Cargo.toml
      - /Cargo.toml
      - /Cargo.lock
    options:
      runFromWorkspaceRoot: true
