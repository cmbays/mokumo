language: rust
stack: backend
fileGroups:
  sources:
    - src/**/*
    - Cargo.toml
    - /Cargo.toml
    - /Cargo.lock
    - /crates/core/src/**/*
    - /crates/core/Cargo.toml
  migrations:
    - migrations/**/*
  bdd:
    - tests/**/*.rs
    - tests/features/**/*.feature
tasks:
  test-bdd:
    command: cargo test --package mokumo-db --test bdd --features bdd
    inputs:
      - '@group(sources)'
      - '@group(migrations)'
      - '@group(bdd)'
    options:
      runFromWorkspaceRoot: true
