# CRAP score configuration for Mokumo
# Scoped to unit-testable crates only. Integration-only layers are excluded
# because llvm-cov via nextest does not run the cucumber-rs BDD harness, so
# line coverage reads as 0% even when semantic coverage through BDD + hurl
# integration tests is high.
#
# Architectural exclusions below — see
# docs/adr/adr-coverage-exclusions.md for the full rationale,
# promotion path, and revisit conditions.
preset = "strict"

exclude = [
  # Platform-wiring Axum handlers; exercised through the BDD harness.
  "crates/kikan/src/platform/**",
  # Transport-neutral control-plane handlers; exercised through the BDD harness.
  # Scoped helpers with unit tests (e.g. scrub_line) still get coverage.
  "crates/kikan/src/control_plane/**",
  # HTTP adapters; exercised through the `api_bdd` harness in
  # crates/mokumo-shop/tests/.
  "crates/mokumo-shop/src/restore_handler.rs",
  "crates/mokumo-shop/src/profile_switch.rs",
  "crates/mokumo-shop/src/routes.rs",
  "crates/mokumo-shop/src/setup.rs",
  "crates/mokumo-shop/src/settings.rs",
  "crates/mokumo-shop/src/server_info.rs",
  "crates/mokumo-shop/src/ws/handler.rs",
  # Hoisted from kikan::platform/** and kikan::control_plane/** —
  # HTTP adapters + admin UDS handlers exercised through the api_bdd
  # and admin_uds integration harnesses, same rationale as the
  # originally-excluded kikan platform/control_plane paths above.
  "crates/mokumo-shop/src/admin/**",
  "crates/mokumo-shop/src/auth_handlers/**",
  "crates/mokumo-shop/src/demo_reset.rs",
  "crates/mokumo-shop/src/user_admin.rs",
  # Binary-shell helpers; exercised through the BDD harness and
  # demo-smoke / api-smoke integration tests.
  "crates/mokumo-shop/src/startup.rs",
  "crates/mokumo-shop/src/cli.rs",
  "crates/kikan/src/logging.rs",
  # Binary entry points — no unit test surface.
  "apps/mokumo-desktop/**",
  "apps/mokumo-server/**",
  # UDS HTTP client library; exercised through the admin_uds integration
  # tests (crates/mokumo-shop/tests/admin_uds.rs).
  "crates/kikan-cli/**",
  # Test helpers have 0% coverage by definition. Both `tests/` directories
  # (integration tests) and sibling `*_tests.rs` files (the pattern kikan
  # uses when a `#[cfg(test)] mod tests` grew large enough to relocate).
  "**/tests/**",
  "**/*_tests.rs",
  "**/build.rs",
]
