# Operator-tuned thresholds for the sticky PR scorecard.
#
# When this file is present the producer consumes it for per-row
# warn/fail thresholds and resolves each row's status (Green / Yellow /
# Red) accordingly. Removing or renaming the file falls back to the
# starter-wheel defaults compiled into the producer; the renderer flags
# fallback runs explicitly so verdicts cannot silently come from
# defaults.
#
# Schema lives at `.config/scorecard/quality.config.schema.json` and is
# kept in lockstep with this file by the `scorecard-drift` CI gate.
#
# Boundary semantics: `delta_pp == warn_pp_delta` resolves Yellow;
# `delta_pp == fail_pp_delta` resolves Red. Both fields are signed
# percentage points — a coverage drop is a negative number, so the
# default warn/fail values are negative.

[rows.coverage]
# Coverage delta vs. base, in percentage points.
#   delta_pp >  -1.0   → Green (within typical instrumentation noise)
#   delta_pp <= -1.0   → Yellow (visible regression worth a soft signal)
#   delta_pp <= -5.0   → Red (hard fail)
warn_pp_delta = -1.0
fail_pp_delta = -5.0

[rows.coverage_handler]
# Per-handler branch-coverage threshold (mokumo#583). Worst-of: the
# lowest branch_coverage_pct across every handler in every crate
# determines the row escalation. Inclusive on the worse side —
# pct == warn_pct_below resolves Yellow; pct == fail_pct_below resolves
# Red.
#
# `report_only = true` keeps this gate purely informational: the row's
# verdict is driven by the CoverageDelta thresholds above, and a
# low-coverage handler surfaces only in the per-handler drill-down. Flip
# to `false` to promote the handler-coverage gate to a hard escalation
# signal. The companion `coverage-handlers` CI job carries
# `continue-on-error: true` for the same reason — promoting the gate is
# two paired edits (this flag + the CI job's continue-on-error).
warn_pct_below = 60.0
fail_pct_below = 40.0
report_only = true

[rows.bdd_feature_skip]
# Count of `.feature` files carrying a feature-level skip tag (`@wip`,
# `@future`, `@tracked:*`). Tracks *backlog* — how many work-streams are
# still gated open. A feature with `@wip` at the top counts as one
# regardless of how many scenarios live in the file.
#   skipped <  10   → Green
#   skipped >= 10   → Yellow
#   skipped >= 20   → Red
warn_skipped_features = 10
fail_skipped_features = 20

[rows.bdd_scenario_skip]
# Count of individual scenarios whose own tag set carries a skip tag
# (excludes scenarios skipped only because their feature is).
#   skipped <  40   → Green
#   skipped >= 40   → Yellow
#   skipped >= 60   → Red
warn_skipped_scenarios = 40
fail_skipped_scenarios = 60
