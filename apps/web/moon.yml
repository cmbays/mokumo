language: javascript
stack: frontend
fileGroups:
  app:
  - static/**/*
  - svelte.config.*
  - vite.config.*
  sources:
  - src/**/*
  tests:
  - tests/**/*
  - src/**/*.test.*
tasks:
  dev:
    command: pnpm dev
    options:
      cache: false
      persistent: true
      outputStyle: stream
  build:
    command: pnpm build
    inputs:
    - '@group(app)'
    - '@group(sources)'
    - package.json
    - tsconfig.json
    outputs:
    - build
  preview:
    command: pnpm preview
    deps:
    - build
    options:
      cache: false
      persistent: true
      outputStyle: stream
  test:
    command: pnpm test
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  lint:
    command: pnpm oxlint --config ../../.oxlintrc.json src/
    inputs:
    - '@group(sources)'
    - /.oxlintrc.json
  fmt-oxfmt:
    command: pnpm oxfmt --config ../../.oxfmtrc.json --check src/
    inputs:
    - '@group(sources)'
  fmt-prettier:
    command: pnpm prettier --config ../../.prettierrc --check "src/**/*.svelte"
    inputs:
    - '@group(sources)'
  fmt:
    command: noop
    deps:
    - fmt-oxfmt
    - fmt-prettier
  fmt-write-oxfmt:
    command: pnpm oxfmt --config ../../.oxfmtrc.json src/
    options:
      cache: false
  fmt-write-prettier:
    command: pnpm prettier --config ../../.prettierrc --write "src/**/*.svelte"
    options:
      cache: false
  fmt-write:
    command: noop
    deps:
    - fmt-write-oxfmt
    - fmt-write-prettier
    options:
      cache: false
  test-coverage:
    command: pnpm test:coverage
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    outputs:
    - coverage
  test-mutation:
    command: pnpm test:mutation
    deps:
    - check
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    - stryker.config.mjs
    options:
      cache: false
  depcruise:
    command: pnpm depcruise
    deps:
    - check
    inputs:
    - '@group(sources)'
    - .dependency-cruiser.cjs
  storybook:
    command: pnpm storybook
    options:
      cache: false
      persistent: true
      outputStyle: stream
  build-storybook:
    command: pnpm build-storybook
    inputs:
    - '@group(sources)'
    - '@group(app)'
    - .storybook/**/*
    - package.json
    outputs:
    - storybook-static
  test-storybook:
    command: pnpm test-storybook
    deps:
    - build-storybook
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    - .storybook/**/*
  check:
    command: pnpm check
    inputs:
    - '@group(sources)'
    - tsconfig.json
