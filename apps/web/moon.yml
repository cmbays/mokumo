language: javascript
stack: frontend
fileGroups:
  app:
  - static/**/*
  - svelte.config.*
  - vite.config.*
  sources:
  - src/**/*
  tests:
  - tests/**/*
  - src/**/*.test.*
tasks:
  dev:
    command: pnpm dev
    options:
      cache: false
      persistent: true
      outputStyle: stream
  build:
    command: pnpm build
    inputs:
    - '@group(app)'
    - '@group(sources)'
    - package.json
    - tsconfig.json
    outputs:
    - build
  preview:
    command: pnpm preview
    deps:
    - build
    options:
      cache: false
      persistent: true
      outputStyle: stream
  test:
    command: pnpm test
    inputs:
    - '@group(sources)'
    - '@group(tests)'
  sidebar-sync:
    command: pnpm tsx ../../scripts/check-pages-yaml-sync.ts
    inputs:
    - src/routes/**
    - /.claude/routines/daily-qa/pages.yaml
    - /scripts/check-pages-yaml-sync.ts
  lint:
    command: pnpm oxlint --config ../../.oxlintrc.json src/
    deps:
    - sidebar-sync
    inputs:
    - '@group(sources)'
    - /.oxlintrc.json
  fmt-oxfmt:
    command: pnpm oxfmt --config ../../.oxfmtrc.json --check src/
    inputs:
    - '@group(sources)'
  fmt-prettier:
    command: pnpm prettier --config ../../.prettierrc --check "src/**/*.svelte"
    inputs:
    - '@group(sources)'
  fmt:
    command: noop
    deps:
    - fmt-oxfmt
    - fmt-prettier
  fmt-write-oxfmt:
    command: pnpm oxfmt --config ../../.oxfmtrc.json src/
    options:
      cache: false
  fmt-write-prettier:
    command: pnpm prettier --config ../../.prettierrc --write "src/**/*.svelte"
    options:
      cache: false
  fmt-write:
    command: noop
    deps:
    - fmt-write-oxfmt
    - fmt-write-prettier
    options:
      cache: false
  test-coverage:
    command: pnpm test:coverage
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    outputs:
    - coverage
  depcruise:
    command: pnpm depcruise
    deps:
    - check
    inputs:
    - '@group(sources)'
    - .dependency-cruiser.cjs
  storybook:
    command: pnpm storybook
    options:
      cache: false
      persistent: true
      outputStyle: stream
  build-storybook:
    command: pnpm build-storybook
    # TODO(#32): add `deps: [check]` once svelte-check type errors are resolved
    inputs:
    - '@group(sources)'
    - '@group(app)'
    - .storybook/**/*
    - package.json
    outputs:
    - storybook-static
  test-storybook:
    command: pnpm test-storybook
    deps:
    - build
    - build-storybook
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    - .storybook/**/*
  test-e2e:
    script: pnpm exec bddgen && pnpm exec playwright test --project app --project profile --project welcome-restore
    deps:
    - ~:build
    - shop:build
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    options:
      cache: false
  test-welcome-restore:
    script: pnpm exec bddgen && pnpm exec playwright test --project welcome-restore
    deps:
    - ~:build
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    options:
      cache: false
  test-e2e-lan:
    script: pnpm exec playwright test --project e2e-lan --pass-with-no-tests
    deps:
    - ~:build
    - shop:build
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    options:
      cache: false
      timeout: 600
  seed-demo:
    script: pnpm tsx scripts/seed-demo.ts
    deps:
    - shop:build
    - shop:gen-types
    options:
      cache: false
  demo-captures:
    script: pnpm exec playwright test --project demo-captures
    deps:
    - ~:build
    - shop:build
    inputs:
    - '@group(sources)'
    - '@group(tests)'
    options:
      cache: false
  check:
    command: pnpm check
    inputs:
    - '@group(sources)'
    - tsconfig.json
