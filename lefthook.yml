pre-commit:
  parallel: true
  commands:
    # Timeouts are hard ceilings to prevent runaway hangs (e.g. cargo fmt
    # stalling on container env issues), not tight performance budgets.
    # If commands legitimately exceed these, raise the ceiling.
    gitleaks:
      run: gitleaks protect --staged --redact
      timeout: 60s
    rust-fmt:
      glob: "*.rs"
      # Override env vars that cause failures in dev containers where the
      # sccache Redis server is unreachable and /workspace/target is read-only.
      # cargo fmt doesn't invoke the compiler, but PATH may not include
      # /cargo-home/bin in all hook environments, so we set it explicitly.
      env:
        RUSTC_WRAPPER: ""
        CARGO_TARGET_DIR: /tmp/mokumo-target
        # /cargo-home/bin covers dev containers; $HOME/.cargo/bin covers host
        # installs (rustup default). /opt/homebrew/bin is macOS brew-installed
        # rustup wrappers.
        PATH: /cargo-home/bin:$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      run: cargo fmt --all --check
      timeout: 60s
    oxlint:
      glob: "apps/web/**/*.{ts,svelte,js}"
      root: "apps/web/"
      run: node ./node_modules/oxlint/bin/oxlint --config ../../.oxlintrc.json {staged_files}
      timeout: 30s
    # Explicit --config required: oxfmt misidentifies vite.config.ts as config
    # when running under Node without native TS module support (e.g. Node 22).
    oxfmt-check:
      glob: "apps/web/**/*.{ts,js,css,json,md,html}"
      root: "apps/web/"
      run: node ./node_modules/oxfmt/bin/oxfmt --config ../../.oxfmtrc.json --check {staged_files}
      timeout: 30s
    prettier-svelte:
      glob: "apps/web/**/*.svelte"
      root: "apps/web/"
      run: npx prettier --config ../../.prettierrc --check {staged_files}
      timeout: 60s
    story-colocation:
      glob: "apps/web/src/lib/components/**/*.svelte"
      run: bash apps/web/scripts/check-story-colocation.sh
      timeout: 30s

pre-push:
  commands:
    rust-clippy:
      glob: "*.rs"
      # Override env vars that cause failures in dev containers where the
      # sccache Redis server is unreachable and /workspace/target is read-only.
      env:
        RUSTC_WRAPPER: ""
        CARGO_TARGET_DIR: /tmp/mokumo-target
      run: moon run shop:lint
    # Skip-friendly local mirror of the CI G2 step. The script warn-skips
    # when origin/main isn't fetched (developer hasn't synced) so a stale
    # ref doesn't block a push; CI is the source of truth.
    route-coverage:
      glob: "{crates/**/*.rs,tests/api/**/*.hurl,crates/mokumo-shop/moon.yml}"
      run: bash scripts/check-route-coverage.sh
      timeout: 30s
    docs-drift:
      # Regenerates AUTO-GEN sections (currently README.md MSRV badge) and
      # asserts the working tree matches HEAD. The glob fires on every input
      # to the generator: workspace Cargo.toml (MSRV source), the target
      # files themselves, and the generator crate.
      glob: "{Cargo.toml,README.md,tools/docs-gen/**}"
      env:
        RUSTC_WRAPPER: ""
        CARGO_TARGET_DIR: /tmp/mokumo-target
      run: cargo run --quiet -p docs-gen && git diff --exit-code README.md
      timeout: 60s
    docs-paired-files:
      # Local mirror of the CI gate. Detects added `pub` items in the §B
      # source paths and asserts the matching glossary was touched. Like
      # the route-coverage hook, this warn-skips when origin/main isn't
      # fetched so a stale ref doesn't block a push (CI is the source of
      # truth). Glob fires on Rust source changes in scope and on
      # AGENTS.md / glossary edits so a doc-only push still validates.
      glob: "{crates/mokumo-shop/src/**/*.rs,crates/kikan/src/**/*.rs,crates/kikan-*/src/**/*.rs,LANGUAGE.md,crates/kikan/LANGUAGE.md,AGENTS.md,scripts/check-docs-paired-files.sh}"
      run: bash scripts/check-docs-paired-files.sh
      timeout: 30s
    tools-pins:
      # Asserts every governed tool in tools.toml is pinned to the matching
      # version on every `bins:` line in .github/workflows/*.yml. Glob fires
      # on either side of the pairing.
      glob: "{tools.toml,.github/workflows/*.yml,scripts/check-tools-pins.sh}"
      run: bash scripts/check-tools-pins.sh
      timeout: 15s
