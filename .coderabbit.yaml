language: en
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "crates/core/**"
      instructions: "Shared domain primitives (errors). No ORM deps (SeaORM, SQLx). Newtype IDs must not implement Deref."
    - path: "crates/kikan/**"
      instructions: "Platform engine. No shop-vertical identifiers (customer, garment, quote, invoice, print_job). No tauri:: paths. No dependency on mokumo-shop, mokumo-server, mokumo-desktop, kikan-tauri, kikan-socket, or kikan-cli (I1-I4 invariants, CI-enforced via scripts/check-i*.sh). Repository traits use `async fn` (Rust 1.75+, no `async-trait` crate except where object-safety is required, e.g. `ActivityWriter`); bounds are `Send + Sync` only."
    - path: "crates/kikan-types/**"
      instructions: "API DTOs with ts-rs for TypeScript generation. No DeriveEntityModel or FromRow — ORM entities live with their repo impl in kikan or mokumo-shop."
    - path: "crates/mokumo-shop/**"
      instructions: "Mokumo shop vertical — domain, entities, SeaORM repos, Axum handlers. Activity logging is enforced by the adapter within the same transaction as the mutation (not orchestrated by the service layer). Handlers return `Result<Json<T>, AppError>`."
    - path: "apps/web/src/**"
      instructions: "Svelte 5 runes only — no stores, no 'export let', no '$:', no 'on:click', no '<slot>'. Use $state, $derived, $effect, $props, onclick, {@render children()}. shadcn-svelte for components, @lucide/svelte for icons."
