vertical: garments-favorites
waves:
  - name: 'Wave 0: Database Foundation'
    serial: true
    sessions:
      - topic: db-schema-preferences
        stage: build
        prompt: |
          Build the database foundation for Issue #640 (Color Group Favorites).

          Read these docs first:
          1. docs/workspace/20260226-640-color-favorites/breadboard.md — data stores S3/S4/S6
          2. docs/workspace/20260226-640-color-favorites/spike-data-model.md — exact Drizzle table definitions
          3. docs/workspace/20260226-640-color-favorites/shaping.md — DP2 (DM-B selected)
          4. CLAUDE.md — project standards (architecture, coding standards, testing thresholds)
          5. src/db/schema/catalog-normalized.ts — existing table patterns to match

          ## What to Build

          Add 3 new Drizzle tables to `src/db/schema/catalog-normalized.ts`.
          Follow the exact pattern of the existing `catalogStylePreferences` table.

          1. `catalogColorGroups` — (id, brand_id → catalog_brands.id CASCADE, color_group_name varchar(100), UNIQUE(brand_id, color_group_name), created_at, updated_at)
          2. `catalogColorGroupPreferences` — (id, scope_type varchar(20) default 'shop', scope_id uuid, color_group_id → catalog_color_groups.id CASCADE, is_favorite bool, UNIQUE(scope_type, scope_id, color_group_id), created_at, updated_at)
          3. `catalogBrandPreferences` — (id, scope_type varchar(20) default 'shop', scope_id uuid, brand_id → catalog_brands.id CASCADE, is_enabled bool, is_favorite bool, UNIQUE(scope_type, scope_id, brand_id), created_at, updated_at)

          After adding the tables:
          1. Run `npm run db:generate` to produce the migration SQL
          2. Open the generated migration file. Add this backfill AFTER the CREATE TABLE catalog_color_groups DDL:
             INSERT INTO catalog_color_groups (id, brand_id, color_group_name)
             SELECT gen_random_uuid(), cs.brand_id, cc.color_group_name
             FROM catalog_colors cc
             JOIN catalog_styles cs ON cc.style_id = cs.id
             WHERE cc.color_group_name IS NOT NULL
             GROUP BY cs.brand_id, cc.color_group_name
             ON CONFLICT (brand_id, color_group_name) DO NOTHING;
          3. Run `npm run db:migrate`
          4. Verify catalog_color_groups has rows (check via npm run db:studio or a quick SELECT COUNT)

          ## Testing
          Use .claude/skills/tdd/skill.md. Write Vitest schema tests verifying:
          - All 3 tables exist with correct columns
          - UNIQUE constraints enforce correctly (attempt duplicate insert, verify conflict behavior)

          ## Workspace Documentation
          Before finalizing, commit implementation notes to:
            docs/workspace/20260226-640-color-favorites/db-schema-notes.md
          Include:
          - Migration filename/number
          - Backfill row count (catalog_color_groups rows after migration)
          - Any issues encountered during schema generation
          - Links to new table definitions in catalog-normalized.ts

  - name: 'Wave 1: Nav + Summary + Configure Brand'
    serial: true
    sessions:
      - topic: nav-summary-configure-brand
        stage: build
        dependsOn: db-schema-preferences
        prompt: |
          Build V1 of Issue #640 (Color Group Favorites): sidebar nav, summary page,
          and configure page with brand controls.

          Read these docs first:
          1. docs/workspace/20260226-640-color-favorites/breadboard.md — full affordance tables + V1 slice (lines 269–298)
          2. docs/workspace/20260226-640-color-favorites/shaping.md — Shape B parts B1, B2, B3.1
          3. docs/workspace/20260226-640-color-favorites/db-schema-notes.md — Wave 0 migration details
          4. CLAUDE.md — project standards (design system, coding standards)
          5. src/app/(dashboard)/garments/_components/GarmentCatalogClient.tsx — optimistic update pattern to copy
          6. src/app/(dashboard)/garments/actions.ts — existing server action patterns
          7. docs/APP_IA.md — IA principles (why Garment Favorites is a main nav item, not Settings)

          ## What to Build

          ### 1. Sidebar navigation (N17, N18)
          Find the sidebar nav constants (grep for SIDEBAR_MAIN or the garments nav entry).
          - Add "Garment Favorites" → /garments/favorites with Lucide Star icon, adjacent to Garments
          - Remove the existing /settings/colors (Color Settings) entry

          ### 2. Summary page — /garments/favorites (N5, U5–U9)
          - src/app/(dashboard)/garments/favorites/page.tsx — pure RSC
          - getBrandPreferencesSummary(shopId): query catalog_brands LEFT JOIN catalog_brand_preferences,
            plus subquery counts for favoritedStyleCount (from catalog_style_preferences) and
            favoritedColorGroupCount (from catalog_color_group_preferences JOIN catalog_color_groups).
            Return only brands with at least one non-null preference.
          - _components/BrandSummaryRow.tsx: brand name, filled Star if isBrandFavorite, counts,
            "Configure →" link to /garments/favorites/configure?brand=[id]
          - Empty state: "No favorites configured yet." with Browse Catalog CTA
          - Breadcrumbs: [{ label: 'Garment Favorites', href: '/garments/favorites' }]

          ### 3. Configure page — /garments/favorites/configure (N6–N9, N12–N13, U10–U13)
          - src/app/(dashboard)/garments/favorites/configure/page.tsx — RSC loader
            Reads brand query param. Calls getBrandConfigureData(shopId, brandId).
          - getBrandConfigureData(shopId, brandId): returns brand record + catalog_brand_preferences
            for this brand. Stubs: styles: [], colorGroups: [] (filled in Waves 2+3)
          - _components/FavoritesConfigureClient.tsx — client component:
            Brand section: Lucide Star toggle (isFavorite) + Eye/EyeOff or Switch toggle (isEnabled)
            Style section: <p>Style preferences — coming soon</p> (stub)
            Color group section: <p>Color group preferences — coming soon</p> (stub)
            Optimistic update: read ref → setState optimistically → await action → rollback on error + toast
          - actions.ts (new file): toggleBrandFavorite(brandId, value) + toggleBrandEnabled(brandId, value)
            Both upsert catalog_brand_preferences. Use getUser() NOT getSession() for auth.
          - Breadcrumbs: [Garment Favorites, [Brand Name]]

          ## Design
          - Stars: Lucide Star (fill when active, outline when not). text-action when favorited.
          - text-muted-foreground for zero counts and inactive stars.
          - Never add per-component TooltipProvider (global one exists in layout).
          - Design tokens from CLAUDE.md — bg-elevated for cards, border-border for dividers.

          ## Testing
          Use .claude/skills/tdd/skill.md. Test:
          - toggleBrandFavorite and toggleBrandEnabled server actions (80% threshold for actions)
          - getBrandPreferencesSummary happy path + empty state

          ## Workspace Documentation
          Before finalizing, commit notes to:
            docs/workspace/20260226-640-color-favorites/v1-brand-notes.md
          Include:
          - Sidebar constants file location
          - Server action file structure chosen
          - Optimistic update state type (ConfigureData shape)
          - Any reused UI patterns from the garments feature

  - name: 'Wave 2: Style Configure'
    serial: true
    sessions:
      - topic: configure-style-grid
        stage: build
        dependsOn: nav-summary-configure-brand
        prompt: |
          Build V2 of Issue #640: style grid on the configure page.

          Read these docs first:
          1. docs/workspace/20260226-640-color-favorites/breadboard.md — V2 slice (lines 303–321)
          2. docs/workspace/20260226-640-color-favorites/v1-brand-notes.md — ConfigureData type, component structure
          3. CLAUDE.md — project standards
          4. src/app/(dashboard)/garments/favorites/configure/_components/FavoritesConfigureClient.tsx — component to extend
          5. src/app/(dashboard)/garments/actions.ts — existing toggleStyleFavorite (DO NOT recreate it)

          ## What to Build

          ### 1. Extend getBrandConfigureData (in actions.ts)
          Add styles to the return value:
          - Query catalog_styles WHERE brand_id = ? with LEFT JOIN catalog_style_preferences
            ON (scope_type='shop', scope_id=shopId, style_id=s.id)
          - Return styles: { id, name, number, thumbnailUrl, isFavorite: boolean }[]

          ### 2. StyleGrid component (U14, U15)
          - src/app/(dashboard)/garments/favorites/configure/_components/StyleGrid.tsx — new file
          - Responsive grid of style cards (use existing thumbnail/card visual pattern)
          - Each card: thumbnail image, style name + number, Lucide Star top-right corner
          - Star: filled + text-action when isFavorite, outline + text-muted-foreground when not

          ### 3. handleToggleStyleFavorite handler (N10)
          - Add to FavoritesConfigureClient
          - IMPORTANT: Call existing toggleStyleFavorite() from garments/actions.ts — no new action needed
          - Optimistic: update configureState.styles[idx].isFavorite before await
          - Rollback on error + toast

          ### 4. Replace the style stub
          Replace the "Style preferences — coming soon" placeholder with:
            <StyleGrid styles={configureState.styles} onToggle={handleToggleStyleFavorite} />

          ## Testing
          - Test handleToggleStyleFavorite optimistic logic (pure function if extracted)
          - Test getBrandConfigureData styles query (80% threshold)

          ## Workspace Documentation
          Before finalizing, commit notes to:
            docs/workspace/20260226-640-color-favorites/v2-style-notes.md
          Include:
          - StyleGrid component structure decisions
          - Confirmation that existing toggleStyleFavorite was reused (no new action)
          - ConfigureData type extension for styles

  - name: 'Wave 3: Color Group Configure + Sync Pipeline'
    serial: false
    sessions:
      - topic: configure-color-group-grid
        stage: build
        dependsOn: configure-style-grid
        prompt: |
          Build V3 Session A of Issue #640: color group swatch grid on the configure page.
          Runs in PARALLEL with sync-pipeline-color-groups (different files, no conflicts).

          Read these docs first:
          1. docs/workspace/20260226-640-color-favorites/breadboard.md — V3 slice (lines 325–349)
          2. docs/workspace/20260226-640-color-favorites/v2-style-notes.md — current ConfigureData shape
          3. CLAUDE.md — project standards
          4. src/app/(dashboard)/garments/_components/ColorFilterGrid.tsx — swatch chip visual pattern to match
          5. src/app/(dashboard)/garments/favorites/configure/_components/FavoritesConfigureClient.tsx

          ## What to Build

          ### 1. Extend getBrandConfigureData (in actions.ts)
          Add color groups to return value:
          - Query catalog_color_groups WHERE brand_id = ? with LEFT JOIN catalog_color_group_preferences
            ON (scope_type='shop', scope_id, color_group_id)
          - Return colorGroups: { id, colorGroupName, isFavorite: boolean }[]

          ### 2. ColorGroupGrid component (U16, U17)
          - src/app/(dashboard)/garments/favorites/configure/_components/ColorGroupGrid.tsx — new file
          - Grid of swatch chips matching ColorFilterGrid visual style
          - Each chip: colored circle (derive hex from colorGroupName with a small lookup map for
            common names like Navy→#1a2a5e, Black→#1a1a1a, White→#f5f5f5, use bg-muted fallback)
            + color group name label + Lucide Star overlay top-right
          - Star: filled + text-action when isFavorite

          ### 3. handleToggleColorGroupFavorite handler (N11)
          - Add to FavoritesConfigureClient
          - Calls new toggleColorGroupFavorite server action
          - Optimistic: update configureState.colorGroups[idx].isFavorite before await
          - Rollback on error + toast

          ### 4. toggleColorGroupFavorite(colorGroupId, value) server action (N15)
          - Add to actions.ts
          - Upsert catalog_color_group_preferences (scope_type='shop', scope_id, color_group_id, is_favorite)

          ### 5. Extend getBrandPreferencesSummary
          Include favoritedColorGroupCount by counting catalog_color_group_preferences
          JOIN catalog_color_groups WHERE brand_id = ? for each brand.

          ### 6. Replace the color group stub
          Replace "Color group preferences — coming soon" placeholder with:
            <ColorGroupGrid colorGroups={configureState.colorGroups} onToggle={handleToggleColorGroupFavorite} />

          ## Testing
          - Test toggleColorGroupFavorite server action (80% threshold)
          - Test getBrandConfigureData color groups query

          ## Workspace Documentation
          Before finalizing, commit notes to:
            docs/workspace/20260226-640-color-favorites/v3a-color-group-notes.md
          Include:
          - ColorGroupGrid hex derivation approach (lookup map contents)
          - ConfigureData type extension for colorGroups
          - Any color groups found missing from catalog_color_groups after backfill

      - topic: sync-pipeline-color-groups
        stage: build
        dependsOn: db-schema-preferences
        prompt: |
          Build V3 Session B of Issue #640: add upsertColorGroups to the image sync pipeline.
          Runs in PARALLEL with configure-color-group-grid. This session only touches the sync script.

          Read these docs first:
          1. docs/workspace/20260226-640-color-favorites/breadboard.md — N16 (upsertColorGroups), S3 (catalog_color_groups)
          2. docs/workspace/20260226-640-color-favorites/db-schema-notes.md — catalog_color_groups schema, migration details
          3. CLAUDE.md — project standards (logging: use logger not console.log)
          4. src/db/schema/catalog-normalized.ts — catalogColorGroups table definition

          ## What to Build

          ### Find the sync script
          Search for run-image-sync.ts (check scripts/, src/scripts/, or lib/scripts/).
          Find the step that writes catalog_colors rows (the batch upsert/insert).

          ### upsertColorGroups(db, colorRows) (N16)
          Add immediately after the catalog_colors write step:

          1. Extract distinct (brand_id, color_group_name) pairs from the colors batch
             - Colors have style_id; you need to derive brand_id from catalog_styles
             - If brand_id is already on the color rows (via a join done earlier in the sync), use it directly
             - Filter: color_group_name must be non-null and non-empty
          2. Batch upsert:
             INSERT INTO catalog_color_groups (id, brand_id, color_group_name)
             VALUES ... ON CONFLICT (brand_id, color_group_name) DO NOTHING
          3. Log using logger (from @shared/lib/logger):
             logger.info({ domain: 'sync', newColorGroups: insertedCount }, 'upserted color groups')
          4. Return insertedCount for the caller's log summary

          ## Testing
          Write a Vitest unit test for upsertColorGroups with mock DB and mock data:
          - 5 colors across 2 brands with 3 unique color groups
          - Verify correct insertedCount returned
          - Re-run with same data → 0 new rows (ON CONFLICT DO NOTHING)

          ## Workspace Documentation
          Before finalizing, commit notes to:
            docs/workspace/20260226-640-color-favorites/v3b-sync-notes.md
          Include:
          - Exact location in run-image-sync.ts where step was added
          - How brand_id was derived from the colors batch
          - Performance impact estimate (does this add significant time?)

  - name: 'Wave 4: Garments Page Surfacing'
    serial: true
    sessions:
      - topic: garments-surfacing
        stage: build
        dependsOn: configure-color-group-grid
        prompt: |
          Build V4 of Issue #640: surface garment favorites on the /garments browse page.
          This is the final slice — favorites set in Configure now appear pre-sorted in the catalog.

          Read these docs first:
          1. docs/workspace/20260226-640-color-favorites/breadboard.md — V4 slice (lines 353–376) + P1 affordances (N1, N3, N4, S1)
          2. docs/workspace/20260226-640-color-favorites/shaping.md — B5 (Favorites surfacing) and R0
          3. CLAUDE.md — project standards
          4. src/app/(dashboard)/garments/page.tsx — RSC loader to extend
          5. src/app/(dashboard)/garments/_components/GarmentCatalogClient.tsx — client component to extend
          6. src/app/(dashboard)/garments/_components/ColorFilterGrid.tsx — existing pre-sort logic (parent pre-sorts before passing)

          ## What to Build

          ### 1. getColorGroupFavorites(shopId) (N1)
          Add to src/app/(dashboard)/garments/favorites/actions.ts:
          - Query: catalog_color_group_preferences JOIN catalog_color_groups
            WHERE scope_type='shop' AND scope_id=shopId AND is_favorite=true
          - Return: string[] of colorGroupName values

          ### 2. garments/page.tsx
          Add getColorGroupFavorites(shopId) call alongside existing fetches.
          Pass initialFavoriteColorGroupNames: string[] prop to GarmentCatalogClient.

          ### 3. GarmentCatalogClient.tsx — three additions

          a. State (S1):
             const [favoriteColorGroupNames] = useState(
               () => new Set(props.initialFavoriteColorGroupNames ?? [])
             )

          b. Extract sortColorGroupsByFavorites to a new pure-function utility:
             src/features/garments/utils/favorites-sort.ts
             export function sortColorGroupsByFavorites(
               colorGroups: FilterColorGroup[],
               favoriteNames: Set<string>
             ): FilterColorGroup[] {
               return [...colorGroups].sort((a, b) => {
                 const aFav = favoriteNames.has(a.colorGroupName ?? '')
                 const bFav = favoriteNames.has(b.colorGroupName ?? '')
                 return Number(bFav) - Number(aFav)
               })
             }
             Use this useMemo in GarmentCatalogClient. Pass sortedColorGroups to ColorFilterGrid.

          c. Extract partitionByFavorite to the same utils file:
             export function partitionByFavorite<T extends { isFavorite?: boolean }>(
               items: T[]
             ): { favorites: T[]; others: T[] }
             In GarmentCatalogClient, partition filteredCatalog styles.
             Render two sections:
             - If favorites.length > 0: label "Your Favorites" (text-sm text-muted-foreground uppercase tracking-wide mb-2) + favorites grid
             - Then: others grid (no label if favorites exist — don't duplicate context)
             - If zero favorites: unchanged single-list behavior

          IMPORTANT: Verify that isFavorite flag is already present on catalog styles from
          hydrateCatalogPreferences(). Read GarmentCatalogClient carefully before adding any
          new data fetches — the flag should already be there from existing style preferences.

          ## Testing
          Unit tests in src/features/garments/utils/favorites-sort.test.ts:
          - sortColorGroupsByFavorites: favorites=["Navy"], input=[Royal, Navy, Black] → [Navy, Royal, Black]
          - partitionByFavorite: 2 favorites + 3 others → favorites.length === 2, others.length === 3
          These are pure functions — no mocking needed, 90%+ coverage easily achievable.

          ## Workspace Documentation
          Before finalizing, commit notes to:
            docs/workspace/20260226-640-color-favorites/v4-surfacing-notes.md
          Include:
          - Confirmation isFavorite was already present in catalog state (or if additional fetch needed)
          - How the two-section render integrates with existing filteredCatalog logic
          - Edge cases handled (empty favorites set, colorGroupName null)
