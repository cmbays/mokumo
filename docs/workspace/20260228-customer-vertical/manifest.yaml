vertical: customers
pipeline: 20260228-customer-vertical

waves:
  - name: 'Wave 0: Schema Foundation'
    serial: true
    sessions:
      - topic: customer-schema
        stage: build
        prompt: |
          You are building Wave 0 of the Customer Vertical for Mokumo.
          This is the critical path session — all parallel waves block on this PR merging.

          ## Context
          Read these docs before starting:
          1. CLAUDE.md — project standards, coding rules, quality checklist
          2. docs/workspace/20260228-customer-vertical/plan.md — full implementation plan
          3. docs/workspace/20260228-customer-vertical/breadboard.md — affordance map (V1 foundation)
          4. docs/workspace/20260228-customer-vertical/shaping.md — Shape C parts C1.1–C1.8
          5. docs/workspace/20260228-customer-vertical/spike-address-snapshot.md — confirms snapshot fields needed
          6. src/db/schema/shops.ts — existing schema pattern to follow
          7. src/domain/entities/address.ts — current address entity (needs expansion)
          8. src/domain/entities/quote.ts — needs shippingAddressSnapshot + billingAddressSnapshot
          9. src/domain/entities/invoice.ts — needs billingAddressSnapshot
          10. src/domain/entities/job.ts — needs customerId FK
          11. src/domain/ports/index.ts — expand ICustomerRepository

          ## Goal
          Create all customer vertical database tables and update domain entities.
          Zero UI work in this session — schema and types only.

          ## What to Build

          ### 1. Create `src/db/schema/customers.ts`

          Define these Drizzle pg-core enums:
          - `lifecycleStageEnum`: prospect, new, repeat, vip, at-risk, archived
          - `healthStatusEnum`: active, potentially-churning, churned
          - `contactRoleEnum`: ordering, billing, art-approver, primary
          - `activitySourceEnum`: manual, system, email, sms, voicemail, portal
          - `activityDirectionEnum`: inbound, outbound, internal
          - `actorTypeEnum`: staff, system, customer
          - `addressTypeEnum`: billing, shipping, both

          Define these Drizzle tables:
          - `customers`: id (uuid PK), shop_id (uuid FK → shops.id), company (varchar 255 not null),
            lifecycle_stage (lifecycleStageEnum, default 'prospect'), health_status (healthStatusEnum, default 'active'),
            type_tags (jsonb default '[]'), payment_terms (varchar 50), pricing_tier (varchar 50),
            discount_pct (numeric 5,2 default 0), tax_exempt (boolean default false),
            tax_exempt_cert_expiry (date), credit_limit (numeric 10,2),
            referral_by_customer_id (uuid FK → customers.id self-referential),
            metadata (jsonb default '{}'), is_archived (boolean default false),
            created_at (timestamp tz not null defaultNow), updated_at (timestamp tz not null defaultNow)
          - `contacts`: id, customer_id (FK → customers.id cascade delete), first_name, last_name,
            email, phone, title, role (contactRoleEnum[]), is_primary (bool default false),
            portal_access (bool default false), can_approve_proofs (bool default false),
            can_place_orders (bool default false), created_at
          - `addresses`: id, customer_id (FK → customers.id cascade delete), label (varchar 100),
            type (addressTypeEnum default 'shipping'), street1, street2, city, state (varchar 2),
            zip (varchar 10), country (varchar 2 default 'US'), attention_to (varchar 255),
            is_primary_billing (bool default false), is_primary_shipping (bool default false), created_at
          - `customerGroups`: id, shop_id (FK → shops.id), name (varchar 255), description (text), created_at
          - `customerGroupMembers`: customer_id (FK → customers.id), group_id (FK → customerGroups.id),
            composite PK on (customer_id, group_id), created_at
          - `customerActivities`: id, customer_id (FK → customers.id cascade delete), shop_id,
            source (activitySourceEnum not null), direction (activityDirectionEnum default 'internal'),
            actor_type (actorTypeEnum default 'staff'), actor_id (varchar 255),
            content (text not null), external_ref (varchar 500), related_entity_type (varchar 50),
            related_entity_id (varchar 255), created_at (timestamp tz not null defaultNow)
          - `customerTaxExemptions`: id, customer_id (FK → customers.id cascade delete), state (varchar 2 not null),
            cert_number (varchar 255), document_url (text), expiry_date (date), verified (bool default false), created_at
            UNIQUE index on (customer_id, state)

          Add indexes:
          - customers(shop_id, company)
          - contacts(customer_id)
          - customerActivities(customer_id, created_at DESC)
          - customerTaxExemptions(customer_id, state)

          ### 2. Update `src/db/schema/index.ts`
          Re-export all new tables and enums from customers.ts

          ### 3. Run Migration
          ```bash
          npm run db:generate
          ```
          Review the generated SQL in supabase/migrations/. Then manually add:
          - RLS policies (see plan.md for SQL pattern — scope all tables to shop_id)
          - Seed data: 5 realistic customers (River City Brewing, Riverside Academy, Austin Sports League,
            Central Baptist Church, Thompson's Restaurant Group) with contacts + addresses

          ```bash
          npm run db:migrate
          npm run db:studio  # verify tables + data
          ```

          ### 4. Update Domain Entities

          **src/domain/entities/address.ts** — Add to addressSchema:
          - `attentionTo: z.string().optional()`
          - `isPrimaryBilling: z.boolean().default(false)`
          - `isPrimaryShipping: z.boolean().default(false)`

          **src/domain/entities/quote.ts** — Add to quoteSchema:
          - `shippingAddressSnapshot: addressSchema.optional()`
          - `billingAddressSnapshot: addressSchema.optional()`

          **src/domain/entities/invoice.ts** — Add to invoiceSchema:
          - `billingAddressSnapshot: addressSchema.optional()`

          **src/domain/entities/job.ts** — Add to jobSchema:
          - `customerId: z.string().uuid().optional()`

          ### 5. Expand ICustomerRepository Port

          In src/domain/ports/ (find the customer port file), add these methods:
          ```typescript
          listCustomers(filters: CustomerFilters, sort: CustomerSort, page: number): Promise<{ items: Customer[], total: number }>
          getListStats(shopId: string): Promise<CustomerListStats>
          getAccountBalance(customerId: string): Promise<number>
          searchCustomers(query: string): Promise<Customer[]>
          getCustomerDefaults(customerId: string): Promise<CustomerDefaults>
          getPreferences(customerId: string): Promise<CustomerPreferences>
          createCustomer(input: CreateCustomerInput): Promise<Customer>
          updateCustomer(id: string, input: UpdateCustomerInput): Promise<Customer>
          archiveCustomer(id: string): Promise<void>
          createContact(customerId: string, input: CreateContactInput): Promise<Contact>
          updateContact(contactId: string, input: UpdateContactInput): Promise<Contact>
          deleteContact(contactId: string): Promise<void>
          createAddress(customerId: string, input: CreateAddressInput): Promise<Address>
          updateAddress(addressId: string, input: UpdateAddressInput): Promise<Address>
          deleteAddress(addressId: string): Promise<void>
          ```
          Define required Zod schemas for inputs: CustomerFilters, CustomerSort, CreateCustomerInput, etc.

          ### 6. Also create `ICustomerActivityRepository` port:
          ```typescript
          insert(activity: CreateActivityInput): Promise<void>
          list(customerId: string, opts: { page: number, source?: ActivitySource }): Promise<{ items: Activity[], hasMore: boolean }>
          ```

          ## Verification
          - `npx tsc --noEmit` passes
          - `npm test` — no regressions
          - `npm run db:studio` shows all 7 tables with seed data
          - `npm run lint` clean
          - `npx prettier --write .` before commit

          ## Workspace Documentation
          Before finalizing, write notes to:
            docs/workspace/20260228-customer-vertical/customer-schema-notes.md
          Include: migration approach, enum decisions, any tradeoffs in schema design.

          ## Completion
          Use the build-session-protocol skill when done.
          Open ONE PR titled: "feat(customers): Wave 0 — Drizzle schema, migrations, domain entity updates"

  - name: 'Wave 1: Core CRUD + Activity Timeline'
    serial: false
    sessions:
      - topic: customer-crud
        stage: build
        dependsOn: customer-schema
        prompt: |
          You are building Wave 1a of the Customer Vertical for Mokumo.
          This session runs IN PARALLEL with customer-activity — coordinate on shared files.

          ## Context
          Read these docs before starting:
          1. CLAUDE.md — project standards, coding rules
          2. docs/workspace/20260228-customer-vertical/plan.md — Task 1.1 details
          3. docs/workspace/20260228-customer-vertical/breadboard.md — V1, V2, V3 slices
          4. docs/workspace/20260228-customer-vertical/shaping.md — Shape C parts C2.1–C2.6
          5. src/infrastructure/repositories/_providers/supabase/catalog.ts — existing Supabase repo pattern
          6. src/infrastructure/repositories/_providers/supabase/supplier-pricing.ts — another Supabase repo
          7. src/infrastructure/repositories/_shared/result.ts — Result<T,E> pattern
          8. src/infrastructure/repositories/_shared/errors.ts — error types
          9. src/infrastructure/repositories/customers.ts — current mock delegate (replace with router)
          10. src/infrastructure/bootstrap.ts — compile-time port assertions (update for new methods)
          11. app/(dashboard)/customers/ — existing customer pages (wire to real repo)

          ## Goal
          Wire the customer list and detail pages to Supabase. Build all customer CRUD server actions.
          Covers slices V1 (list live), V2 (create + detail), V3 (contact + address CRUD).

          ## What to Build

          ### 1. `src/infrastructure/repositories/_providers/supabase/customers.ts`
          Create `SupabaseCustomerRepository` implementing the full `ICustomerRepository` port.

          Key methods:
          - `listCustomers(filters, sort, page)` — Drizzle query with WHERE clauses for search (ILIKE),
            lifecycle_stage filter, health_status filter, type_tags filter (jsonb contains),
            is_archived filter, seasonal filter. ORDER BY (company ASC / last order date / lifetime revenue / created_at).
            LIMIT 25 per page, count total for pagination.
          - `getListStats(shopId)` — COUNT by lifecycle_stage for stats bar (Total, Active, Prospects, Revenue YTD)
          - `getCustomer(id)` — single customer with contacts + addresses joined or parallel queries
          - `getLinkedQuotes(customerId)` — quotes WHERE customer_id = $1 ORDER BY created_at DESC
          - `getLinkedJobs(customerId)` — jobs WHERE customer_id = $1
          - `getLinkedInvoices(customerId)` — invoices WHERE customer_id = $1
          - `getAccountBalance(customerId)` — SUM of invoices WHERE customer_id = $1 AND status != 'paid'
          - `searchCustomers(query)` — ILIKE search on company + contacts.email, LIMIT 10, for combobox
          - `getCustomerDefaults(customerId)` — returns { primaryBillingAddress, primaryShippingAddress, paymentTerms, pricingTier, taxExempt }
          - `createCustomer(input)`, `updateCustomer(id, input)`, `archiveCustomer(id)`
          - `createContact`, `updateContact`, `deleteContact`
          - `createAddress`, `updateAddress`, `deleteAddress`
          - `getPreferences(customerId)` — returns { favoriteStyleIds: [], favoriteColorsByBrand: {} } (from customer.metadata JSONB)

          Use `logger.child({ domain: 'customers' })` for all queries.
          All methods call `verifySession()` first.

          ### 2. Update `src/infrastructure/repositories/customers.ts`
          Replace the mock-delegate pattern with a provider router:
          ```typescript
          import { isSupabaseMode } from '@infra/repositories/_shared/provider'
          export const customerRepo = isSupabaseMode()
            ? new SupabaseCustomerRepository(db)
            : mockCustomerRepository
          // Re-export individual functions for backward compat with bootstrap.ts
          export const listCustomers = (...args) => customerRepo.listCustomers(...args)
          // ... etc
          ```

          ### 3. Update `src/infrastructure/bootstrap.ts`
          Add the new port methods to the compile-time `_portChecks.customer` assertion.

          ### 4. Server Actions in `src/features/customers/actions/`

          **customer.actions.ts:**
          - `createCustomer(formData)` — validate with Zod, call repo.createCustomer(), log "Customer created" system event via customerActivityService, return Result<Customer, CustomerError>, redirect to /customers/[id]
          - `updateCustomer(id, formData)` — validate, update, log "Customer updated" system event
          - `archiveCustomer(id)` — confirm via N18 pattern (called after UI confirmation), log system event
          - `duplicateCheck(companyName, shopId)` — repo.searchCustomers() for exact match, return boolean

          **contact.actions.ts:**
          - `createContact(customerId, formData)` — Zod validate ContactInput, repo.createContact()
          - `updateContact(contactId, formData)` — repo.updateContact()
          - `deleteContact(contactId)` — repo.deleteContact()

          **address.actions.ts:**
          - `createAddress(customerId, formData)` — Zod validate AddressInput, repo.createAddress()
          - `updateAddress(addressId, formData)` — repo.updateAddress()
          - `deleteAddress(addressId)` — repo.deleteAddress()

          All actions: `logger.child({ domain: 'customers' })`, return `Result<T, E>`, `use server` directive.

          ### 5. Wire Customer List Page (`app/(dashboard)/customers/page.tsx`)
          - Read `searchParams` → pass to `listCustomers(filters, sort, page)`
          - Render stats bar from `getListStats()`
          - Search input: `CustomerSearchInput` client component (debounced 300ms → `router.replace`)
          - Filter chips: lifecycle, health, type tags, archived toggle, seasonal
          - Sort select: company A-Z, last order date, lifetime revenue, created date
          - TanStack Table for the customer rows
          - Pagination via URL params
          - Loading skeleton, empty state

          ### 6. Wire Customer Detail Page (`app/(dashboard)/customers/[id]/page.tsx`)
          - Read `[id]` → `getCustomer(id)` → render tabbed detail
          - Overview tab: header stats (lifetime revenue, order count, avg, last order, referrals), lifecycle badge, health badge, seasonal indicator (hidden if no dbt mart yet)
          - Contacts tab: list with role badges, "Add Contact" → P4 sheet
          - Addresses tab: list with type/primary, "Add Address" → P5 sheet
          - Financial tab: payment terms, pricing tier, credit limit, balance bar, tax exempt toggle
          - Quotes tab: `getLinkedQuotes(customerId)` rows (number, status, date, total)
          - Jobs tab: `getLinkedJobs(customerId)` rows (number, status, lane)
          - Invoices tab: `getLinkedInvoices(customerId)` rows (number, status, balance due)
          - Preferences tab: placeholder until Wave 2b adds garment favorites
          - Activity tab: placeholder — Wave 1b (customer-activity session) handles this

          ### 7. Customer Form Modal (P3)
          - `CustomerFormModal` (shadcn `<Dialog>`) — handles create AND edit (P3 renamed from "Create Customer Modal")
          - Company name field with duplicate check
          - Initial contact fields (name, email, phone, role)
          - "Referred by" combobox: `searchCustomers(query)` live
          - Save & View CTA

          ### 8. Contact + Address Sheets (P4, P5)
          - `ContactSheet` (shadcn `<Sheet>`) — React Hook Form + Zod, role multi-select, portal_access + proof/order flags
          - `AddressSheet` — label, type (billing/shipping/both), street1/2, city, state, zip, attention_to, primary billing/shipping toggles

          ## Verification
          - `npx tsc --noEmit` passes
          - `npm test` — no regressions, new server action tests written
          - `npm run lint` clean
          - `npx prettier --write .` before commit
          - Manual: navigate /customers → see seed data, search, filter, sort, paginate

          ## Workspace Documentation
          Before finalizing, write notes to:
            docs/workspace/20260228-customer-vertical/customer-crud-notes.md

          ## Completion
          Use the build-session-protocol skill when done.
          Open ONE PR titled: "feat(customers): Wave 1a — Supabase repo, CRUD actions, list + detail wired"

      - topic: customer-activity
        stage: build
        dependsOn: customer-schema
        prompt: |
          You are building Wave 1b of the Customer Vertical for Mokumo.
          This session runs IN PARALLEL with customer-crud — coordinate on shared files.

          ## Context
          Read these docs before starting:
          1. CLAUDE.md — project standards, coding rules
          2. docs/workspace/20260228-customer-vertical/plan.md — Task 1.2 details
          3. docs/workspace/20260228-customer-vertical/breadboard.md — V4 slice (Activity Timeline)
          4. docs/workspace/20260228-customer-vertical/shaping.md — Shape C parts C3.1–C3.4
          5. docs/workspace/20260228-customer-vertical/spike-activity-wiring.md — audit of existing server actions
          6. src/infrastructure/repositories/_providers/supabase/catalog.ts — Supabase repo pattern
          7. src/infrastructure/repositories/_shared/result.ts — Result<T,E> pattern
          8. src/domain/ports/index.ts — see ICustomerActivityRepository added in Wave 0

          ## Goal
          Build the CustomerActivityService domain service, Supabase activity repository,
          manual note server action, and the Activity timeline UI component.
          Auto-logging from quote/job/invoice server actions is wired in Wave 3 (cross-vertical).

          ## What to Build

          ### 1. `src/domain/services/customer-activity.service.ts`
          ```typescript
          export class CustomerActivityService {
            constructor(private repo: ICustomerActivityRepository) {}

            async log(input: {
              customerId: string
              source: ActivitySource
              direction?: ActivityDirection
              actorType?: ActorType
              actorId?: string
              content: string
              externalRef?: string
              relatedEntityType?: string
              relatedEntityId?: string
            }): Promise<void> {
              await this.repo.insert({
                ...input,
                shopId: input.shopId ?? await getShopId(),
              })
            }
          }
          ```
          This is a pure domain service — no direct DB access. Calls `ICustomerActivityRepository`.

          ### 2. `src/infrastructure/repositories/_providers/supabase/customer-activity.ts`
          `SupabaseCustomerActivityRepository` implementing `ICustomerActivityRepository`:
          - `insert(activity)` — INSERT into customer_activities table
          - `list(customerId, { page, source? })` — SELECT from customer_activities WHERE customer_id = $1
            AND (source = $2 IF filter active), ORDER BY created_at DESC, LIMIT 20 per page
            Returns { items: Activity[], hasMore: boolean }

          ### 3. `src/infrastructure/repositories/customer-activity.ts`
          Provider router — Supabase vs mock.

          ### 4. `src/features/customers/actions/activity.actions.ts`
          - `addCustomerNote(customerId, content, relatedEntityType?, relatedEntityId?)` — validates inputs,
            calls `customerActivityService.log({ source: 'manual', direction: 'internal', content, ... })`
            Returns to P2.4 (Activity tab). Revalidates the customer detail path.
          - `loadMoreActivities(customerId, page, source?)` — calls `customerActivityRepo.list()`,
            returns next page of activities for client-side append

          ### 5. Activity Timeline UI Components

          **`src/features/customers/components/ActivityFeed.tsx`**
          - Server component — initial render with first page (20 items)
          - Receives `customerId` + initial `activities` array
          - Renders list of `<ActivityEntry>` components
          - "Load More" button triggers `loadMoreActivities` server action

          **`src/features/customers/components/ActivityEntry.tsx`**
          - Source icon: Clock (manual), Bot (system), Mail (email), Phone (sms/voicemail), Globe (portal) — Lucide icons
          - Direction badge: green "↙ Inbound" / gray "↗ Outbound" / hidden for internal
          - Linked entity badge: if relatedEntityType + relatedEntityId, render clickable badge → navigate to that entity
          - Timestamp: relative format ("2 hours ago", "Yesterday at 3:15pm")
          - Content: text display

          **`src/features/customers/components/NoteInput.tsx`**
          - Client component ("use client")
          - Textarea for note content (React Hook Form)
          - Optional linked entity select (quote/job/invoice from customer's linked records)
          - "Save Note" button → calls addCustomerNote server action
          - Optimistic UI: add note to local state immediately, reconcile on revalidation

          **Type filter chips** (in Activity tab):
          - All | Manual | System | Email | SMS | Voicemail | Portal
          - Click → URL param `?source=manual` → `loadMoreActivities` filters by source

          ### 6. Wire Activity Tab
          In `app/(dashboard)/customers/[id]/activity/page.tsx` (or as a tab component):
          - Load initial activities server-side: `customerActivityRepo.list(customerId, { page: 1 })`
          - Render `<NoteInput>` at top
          - Render `<ActivityFeed activities={initial} customerId={id} />`
          - The `createCustomer` action from Wave 1a logs "Customer created" — that event should appear here

          ### 7. Tests
          Write Vitest unit tests for:
          - `CustomerActivityService.log()` — verify repo.insert called with correct fields
          - `addCustomerNote` server action — test validation, test service call
          - Target: 80% coverage on service + action files

          ## Verification
          - `npx tsc --noEmit` passes
          - `npm test` — no regressions, new tests pass, coverage ≥80% on new files
          - `npm run lint` clean
          - `npx prettier --write .` before commit

          ## Workspace Documentation
          Before finalizing, write notes to:
            docs/workspace/20260228-customer-vertical/customer-activity-notes.md

          ## Completion
          Use the build-session-protocol skill when done.
          Open ONE PR titled: "feat(customers): Wave 1b — CustomerActivityService, activity repo, timeline UI"

  - name: 'Wave 2: Financial + Intelligence + dbt'
    serial: false
    sessions:
      - topic: customer-financial
        stage: build
        dependsOn: customer-crud
        prompt: |
          You are building Wave 2a of the Customer Vertical for Mokumo.
          This session runs IN PARALLEL with customer-intelligence and customer-dbt.

          ## Context
          Read these docs before starting:
          1. CLAUDE.md — project standards, coding rules
          2. docs/workspace/20260228-customer-vertical/plan.md — Task 2.1 details
          3. docs/workspace/20260228-customer-vertical/breadboard.md — V5 slice (Financial Management)
          4. docs/workspace/20260228-customer-vertical/shaping.md — Shape C parts C4.1–C4.5
          5. src/infrastructure/repositories/_providers/supabase/customers.ts — from Wave 1a (read to understand patterns)
          6. src/features/customers/actions/customer.actions.ts — from Wave 1a (read patterns)
          7. lib/helpers/money.ts — REQUIRED for all monetary operations

          ## Goal
          Build the Financial Management tab: credit limits, account balance bar, tax exemptions (basic + per-state).

          ## What to Build

          ### 1. Update `src/infrastructure/repositories/_providers/supabase/customers.ts`
          Add `getAccountBalance(customerId)`:
          - Query: `SELECT COALESCE(SUM(balance_due), 0) FROM invoices WHERE customer_id = $1 AND status != 'paid'`
          - Use `money()` from lib/helpers/money.ts for the return value
          - Return as number (toNumber())

          Add `createTaxExemption(customerId, input)`, `updateTaxExemption(id, input)`:
          - Insert/update customer_tax_exemptions table
          - `checkTaxExemptionByState(customerId, state)` — SELECT from customer_tax_exemptions
            WHERE customer_id = $1 AND state = $2 AND (expiry_date IS NULL OR expiry_date > NOW())

          ### 2. `src/features/customers/actions/financial.actions.ts`
          - `saveFinancialSettings(customerId, input)` — update customers table (payment_terms, pricing_tier,
            discount_pct, tax_exempt, tax_exempt_cert_expiry, credit_limit). Log activity: "Financial settings updated".
          - `createTaxExemption(customerId, input)` — validate TaxExemptionInput (Zod), call repo
          - `updateTaxExemption(id, input)` — validate, call repo
          - `deleteTaxExemption(id)` — call repo
          - `uploadTaxDocument(customerId, state, file)` — upload to Supabase Storage bucket 'tax-exemption-docs',
            generate signed URL, store in document_url column

          ### 3. `src/features/customers/components/AccountBalanceBar.tsx`
          - Props: `balance: number`, `creditLimit: number | null`
          - If no credit limit: show balance only ("Current Balance: $X,XXX")
          - If credit limit: show progress bar (balance / limit as percentage)
            - Green: <50% → `text-success` / `bg-success`
            - Yellow: 50–80% → `text-warning` / `bg-warning`
            - Red: >80% → `text-error` / `bg-error`
          - Use big.js for percentage calculation
          - Neobrutalist style: thick border, `4px 4px 0px` shadow on bar

          ### 4. Wire Financial Tab (`app/(dashboard)/customers/[id]/financial/page.tsx`)
          - `getCustomer(id)` → payment_terms, pricing_tier, discount_pct, tax_exempt fields
          - `getAccountBalance(customerId)` → balance bar
          - List per-state tax exemptions
          - Payment terms dropdown (Net-15, Net-30, Net-45, Net-60, COD, Prepaid)
          - Pricing tier dropdown (Standard, Preferred, Contract, Wholesale)
          - Discount % field (0–100)
          - Credit limit field (nullable — leave blank = no limit)
          - Tax exempt toggle + cert expiry date
          - "Save Financial Settings" button → saveFinancialSettings action

          ### 5. `src/features/customers/components/TaxExemptionList.tsx`
          - List per-state exemptions with state, cert#, expiry, verified status
          - Expiry warning: if expiry_date within 30 days → amber badge "Expiring Soon"
          - "Add Exemption" → P6 sheet (TaxExemptionSheet)

          ### 6. `src/features/customers/components/TaxExemptionSheet.tsx`
          - shadcn `<Sheet>` — state (2-char input), cert number, expiry date, verified checkbox
          - PDF upload field → triggers uploadTaxDocument action
          - Save → createTaxExemption or updateTaxExemption

          ## Verification
          - `npx tsc --noEmit` passes
          - `npm test` — coverage ≥80% on new action files
          - `npm run lint` clean
          - `npx prettier --write .` before commit
          - Manual: set credit limit, verify balance bar colors at 0%, 60%, 90%

          ## Workspace Documentation
          Before finalizing, write notes to:
            docs/workspace/20260228-customer-vertical/customer-financial-notes.md

          ## Completion
          Use the build-session-protocol skill when done.
          Open ONE PR titled: "feat(customers): Wave 2a — financial management, credit limits, tax exemptions"

      - topic: customer-intelligence
        stage: build
        dependsOn: customer-crud
        prompt: |
          You are building Wave 2b of the Customer Vertical for Mokumo.
          This session runs IN PARALLEL with customer-financial and customer-dbt.

          ## Context
          Read these docs before starting:
          1. CLAUDE.md — project standards, coding rules
          2. docs/workspace/20260228-customer-vertical/plan.md — Task 2.2 details
          3. docs/workspace/20260228-customer-vertical/breadboard.md — V6 slice (Intelligence + Preferences)
          4. docs/workspace/20260228-customer-vertical/shaping.md — Shape C parts C5.1–C5.6
          5. docs/workspace/20260228-customer-vertical/spike-favorites-cascade.md — REQUIRED: read this first for the cascade refactor
          6. src/domain/rules/customer.rules.ts — current customer domain rules (has the 'global' EntityType to rename)
          7. src/features/settings/components/SettingsColorsClient.tsx — 3 call sites to update
