      - topic: customer-dbt
        stage: build
        dependsOn: customer-schema
        prompt: |
          You are building Wave 2c of the Customer Vertical for Mokumo.
          This session runs IN PARALLEL with customer-financial and customer-intelligence.
          It only requires Wave 0 (schema) to have merged — it can run anytime after schema is in Supabase.

          ## Context
          Read these docs before starting:
          1. CLAUDE.md — project standards (dbt section)
          2. docs/workspace/20260228-customer-vertical/plan.md — Task 2.3 details
          3. docs/workspace/20260228-customer-vertical/breadboard.md — V8 slice (dbt Analytics)
          4. docs/workspace/20260228-customer-vertical/shaping.md — Shape C parts C7.1–C7.5
          5. docs/TECH_STACK.md — Analytics section (dbt-core layer architecture)
          6. dbt/models/staging/ — existing staging models for pattern reference
          7. dbt/models/marts/ — existing mart models for pattern reference
          8. src/db/schema/marts.ts — existing .existing() declarations to extend

          ## Goal
          Build 5 dbt models for customer analytics. Wire `customer_seasonality_mart`
          into the app via Drizzle `.existing()` so the seasonal indicator can read it.

          ## What to Build

          ### 1. `dbt/models/staging/stg_customers.sql`
          Ephemeral staging model — cast + rename from the `customers` table:
          ```sql
          WITH source AS (
            SELECT * FROM {{ source('public', 'customers') }}
          )
          SELECT
            id AS customer_id,
            shop_id,
            company AS company_name,
            lifecycle_stage,
            health_status,
            payment_terms,
            pricing_tier,
            discount_pct,
            tax_exempt,
            credit_limit,
            is_archived,
            created_at,
            updated_at
          FROM source
          WHERE NOT is_archived
          ```
          Config: `{{ config(materialized='ephemeral') }}`

          ### 2. `dbt/models/staging/stg_customers.yml`
          Schema tests: id not_null, id unique, shop_id not_null

          ### 3. `dbt/models/marts/dim_customers.sql`
          ```sql
          WITH customers AS (
            SELECT * FROM {{ ref('stg_customers') }}
          ),
          referrals AS (
            SELECT referral_by_customer_id, COUNT(*) AS referral_count
            FROM {{ source('public', 'customers') }}
            WHERE referral_by_customer_id IS NOT NULL
            GROUP BY referral_by_customer_id
          )
          SELECT
            c.*,
            COALESCE(r.referral_count, 0) AS referral_count
          FROM customers c
          LEFT JOIN referrals r ON r.referral_by_customer_id = c.customer_id
          ```
          Config: `{{ config(materialized='table', schema='marts') }}`

          ### 4. `dbt/models/marts/fct_customer_orders.sql`
          One row per order per customer, combining jobs + invoices:
          ```sql
          WITH jobs AS (
            SELECT customer_id, id AS order_id, 'job' AS order_type,
                   created_at AS order_date, updated_at AS completed_at,
                   NULL::numeric AS revenue
            FROM {{ source('public', 'jobs') }}
            WHERE customer_id IS NOT NULL
          ),
          invoices AS (
            SELECT customer_id, id AS order_id, 'invoice' AS order_type,
                   created_at AS order_date, NULL AS completed_at,
                   total AS revenue
            FROM {{ source('public', 'invoices') }}
            WHERE customer_id IS NOT NULL
          )
          SELECT * FROM jobs
          UNION ALL
          SELECT * FROM invoices
          ```
          Config: `{{ config(materialized='table', schema='marts') }}`

          ### 5. `dbt/models/marts/customer_seasonality_mart.sql`
          ```sql
          WITH orders AS (
            SELECT * FROM {{ ref('fct_customer_orders') }}
          ),
          monthly_counts AS (
            SELECT
              customer_id,
              EXTRACT(MONTH FROM order_date)::int AS order_month,
              COUNT(*) AS order_count
            FROM orders
            GROUP BY customer_id, EXTRACT(MONTH FROM order_date)
          ),
          customer_totals AS (
            SELECT customer_id, SUM(order_count) AS total_orders
            FROM monthly_counts
            GROUP BY customer_id
          ),
          scored AS (
            SELECT
              m.customer_id,
              m.order_month,
              m.order_count,
              t.total_orders,
              ROUND(m.order_count::numeric / NULLIF(t.total_orders, 0), 2) AS month_share
            FROM monthly_counts m
            JOIN customer_totals t USING (customer_id)
          ),
          top_months AS (
            SELECT
              customer_id,
              ARRAY_AGG(order_month ORDER BY month_share DESC) AS seasonal_months,
              MAX(month_share) AS seasonal_score,
              CASE
                WHEN MAX(month_share) >= 0.5 THEN 'strong'
                WHEN MAX(month_share) >= 0.3 THEN 'moderate'
                ELSE 'weak'
              END AS pattern_strength
            FROM scored
            GROUP BY customer_id
          )
          SELECT * FROM top_months
          ```
          Config: `{{ config(materialized='table', schema='marts') }}`

          ### 6. `dbt/models/marts/customer_lifecycle_funnel.sql`
          ```sql
          SELECT
            lifecycle_stage,
            COUNT(*) AS customer_count,
            ROUND(COUNT(*)::numeric / SUM(COUNT(*)) OVER (), 4) AS stage_share
          FROM {{ ref('dim_customers') }}
          GROUP BY lifecycle_stage
          ORDER BY
            CASE lifecycle_stage
              WHEN 'prospect' THEN 1
              WHEN 'new' THEN 2
              WHEN 'repeat' THEN 3
              WHEN 'vip' THEN 4
              WHEN 'at-risk' THEN 5
              ELSE 6
            END
          ```
          Config: `{{ config(materialized='table', schema='marts') }}`

          ### 7. Add schema tests (`.yml` files) for all 4 mart models

          ### 8. Update `src/db/schema/marts.ts`
          Add Drizzle `.existing()` declarations for `customer_seasonality_mart`:
          ```typescript
          export const customerSeasonalityMart = pgTable('customer_seasonality_mart', {
            customerId: uuid('customer_id').notNull(),
            seasonalMonths: integer('seasonal_months').array(),
            seasonalScore: numeric('seasonal_score'),
            patternStrength: varchar('pattern_strength', { length: 20 }),
          })
          // Mark as existing (dbt owns DDL)
          ```

          ### 9. Run and Verify
          ```bash
          cd dbt
          uv run dbt build
          uv run dbt test
          ```
          All schema tests must pass. Models should materialize in the `marts` schema.

          ## Verification
          - `npm run dbt:build` succeeds (all 5 models materialize)
          - `npm run dbt:test` passes (all schema tests)
          - `npx tsc --noEmit` passes (marts.ts update)
          - `npx prettier --write .` before commit

          ## Workspace Documentation
          Before finalizing, write notes to:
            docs/workspace/20260228-customer-vertical/customer-dbt-notes.md

          ## Completion
          Use the build-session-protocol skill when done.
          Open ONE PR titled: "feat(customers): Wave 2c — dbt models for customer analytics (seasonality, funnel, facts)"

