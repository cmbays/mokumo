vertical: garments
waves:
  - name: 'Wave 1 — Rename: Align to S&S API naming'
    serial: true
    sessions:
      - topic: ss-pipeline-rename
        stage: build
        prompt: |
          # S&S Pipeline Rename (Issue #703)

          You are implementing Wave 1 of the S&S data pipeline refactor (Epic #701).
          This is a pure rename — zero behavior change. Every test must pass before and after.

          ## Context

          Read these files first:
          - docs/workspace/20260301-ss-pipeline-refactor/plan.md (full plan)
          - src/infrastructure/services/catalog-sync.service.ts
          - src/infrastructure/services/pricing-sync.service.ts
          - src/app/api/catalog/sync/route.ts
          - src/app/api/catalog/sync-pricing/route.ts
          - src/infrastructure/services/__tests__/catalog-sync-normalized.test.ts
          - src/infrastructure/services/__tests__/pricing-sync.service.test.ts
          - src/app/api/catalog/sync/__tests__/route.test.ts
          - src/app/api/catalog/sync-pricing/__tests__/route.test.ts
          - vercel.json

          ## What to Build

          ### 1. New service files (copy + rename internals)

          **`src/infrastructure/services/styles-sync.service.ts`**
          - Copied from catalog-sync.service.ts
          - Rename exported function: syncCatalogFromSupplier → syncStylesFromSupplier
          - Update logger domain: 'catalog-sync' → 'styles-sync'

          **`src/infrastructure/services/products-sync.service.ts`**
          - Copied from pricing-sync.service.ts
          - Rename exported function: syncRawPricingFromSupplier → syncProductsFromSupplier
          - Update logger domain: 'pricing-sync' → 'products-sync'

          ### 2. New route directories (copy + update imports)

          **`src/app/api/catalog/sync-styles/route.ts`**
          - Copied from sync/route.ts
          - Import syncStylesFromSupplier from @infra/services/styles-sync.service
          - Update logger domain: 'catalog-sync-endpoint' → 'styles-sync-endpoint'

          **`src/app/api/catalog/sync-products/route.ts`**
          - Copied from sync-pricing/route.ts
          - Import syncProductsFromSupplier from @infra/services/products-sync.service
          - Update logger domain: 'pricing-sync-endpoint' → 'products-sync-endpoint'

          ### 3. Delete old files
          - src/infrastructure/services/catalog-sync.service.ts
          - src/infrastructure/services/pricing-sync.service.ts
          - src/app/api/catalog/sync/ (entire directory)
          - src/app/api/catalog/sync-pricing/ (entire directory)

          ### 4. Rename + update test files
          - catalog-sync-normalized.test.ts → styles-sync.service.test.ts
            (update mock paths and function name references)
          - pricing-sync.service.test.ts → products-sync.service.test.ts
