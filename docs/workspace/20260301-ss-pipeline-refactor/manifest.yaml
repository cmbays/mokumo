  - name: "Wave 2 — Merge Syncs: Fix the '-' Bug"
    serial: true
    sessions:
      - topic: ss-products-sync-merge
        stage: build
        dependsOn: ss-pipeline-rename
        prompt: |
          # S&S Products Sync Merge (Issue #702)

          You are implementing Wave 2 of the S&S data pipeline refactor (Epic #701).
          This wave merges pricing-sync and run-image-sync into a single atomic service.
          This is the primary bug fix — it eliminates "–" in the garment availability drawer.

          ## Context

          Read these files first:
          - docs/workspace/20260301-ss-pipeline-refactor/plan.md (full plan)
          - docs/workspace/20260301-ss-pipeline-refactor/rename-notes.md (Wave 1 notes)
          - src/infrastructure/services/products-sync.service.ts (the renamed pricing-sync)
          - src/infrastructure/services/styles-sync.service.ts (for reference — NOT changed)
          - scripts/run-image-sync.ts (logic to absorb)
          - scripts/image-sync-utils.ts (color + image mapping utilities)
          - scripts/color-group-utils.ts (color group pair collection)
          - lib/suppliers/adapters/ss-activewear.ts (ssProductSchema, getRawProductsBatch)
          - src/db/schema/catalog-normalized.ts (catalogColors, catalogImages, catalogSizes)
          - src/db/schema/raw.ts (ssActivewearProducts)
          - src/infrastructure/services/__tests__/products-sync.service.test.ts

          ## Root Cause (understand before coding)

          pricing-sync writes raw.ss_activewear_products + catalog_sizes.
          run-image-sync writes catalog_colors + catalog_images.
          Both call /v2/products/ but run at different times.
          inventory-sync does a 3-table join: raw.ss_activewear_products → colorName →
          catalog_colors → colorId, and sizeName → catalog_sizes → sizeId.
          Any timing gap means some SKUs have no matching colorId or sizeId → show as "–".

          ## What to Build

          ### Modify `src/infrastructure/services/products-sync.service.ts`

          1. Add imports for catalogColors, catalogImages from @db/schema/catalog-normalized.

          2. Extract or inline the color/image mapping from scripts/image-sync-utils.ts:
             - resolveImageUrl(path) — absolute URL resolver
             - normalizeHex(raw) — hex normalizer
             - mapSSProductToColorValue(p, styleId) — builds the catalogColors insert value
             - buildImages(p) — builds the image array from product fields

          3. For each style inside the batch loop, wrap ALL four writes in db.transaction():
             a. Dedup products by colorName (first row per colorName wins)
             b. Upsert catalog_colors → RETURNING { id, name } → build colorIdByName Map
             c. Upsert catalog_images (using colorIdByName)
             d. Upsert catalog_sizes (already present — just move inside tx)
             e. Insert raw.ss_activewear_products (already present — just move inside tx)

          4. catalog_color_groups MUST be carried forward — it is load-bearing.
             It powers garment color filtering by brand, color group display in the UI,
             and the favorites/preferences system (garments/favorites/actions.ts uses it).
             This is confirmed — do not defer.

             Write pattern:
             a. In the upfront catalog_styles SELECT, also fetch brandId so you can build
                brandIdByStyleId = new Map(rows.map(r => [r.id, r.brandId]))
             b. After each style's db.transaction() commits, call collectColorGroupPairs(
                colorValues, brandIdByStyleId) — pure in-memory, outside the tx
             c. Accumulate pairs across the batch, dedup by (brandId, colorGroupName)
             d. After all styles in the batch, bulk-upsert catalog_color_groups
                using onConflictDoNothing()

             Move collectColorGroupPairs from scripts/color-group-utils.ts into the service
             or a private helper at src/infrastructure/services/products-sync-helpers.ts.

          5. Update return type to:
             { stylesProcessed: number, colorsUpserted: number, sizesUpserted: number,
               skusInserted: number, errors: number }

          6. Update src/app/api/catalog/sync-products/route.ts return shape accordingly.

          ### Absorb and delete scripts
          Move utility functions into the service first, then delete:
          - scripts/image-sync-utils.ts: move mapSSProductToColorValue, buildImages,
            resolveImageUrl, normalizeHex into the service (or products-sync-helpers.ts).
            The ssProductSchema copy in this file is redundant — adapter handles validation.
          - scripts/color-group-utils.ts: move collectColorGroupPairs into service/helpers.
          - scripts/run-image-sync.ts: delete after logic fully absorbed above.
          Grep all three for any other consumers before deleting.

          ### Tests to add/update in products-sync.service.test.ts
          - "writes catalog_colors, catalog_images, catalog_sizes, and
            raw.ss_activewear_products in a single transaction per style"
          - "when transaction fails for one style, other styles in the batch still succeed"
          - "returns correct count breakdown: colorsUpserted, sizesUpserted, skusInserted"
          - "deduplicates colorName — only one catalog_colors row per color"

          ## Quality Gates
          Run in order:
          1. npx tsc --noEmit  (must be clean)
          2. npm run lint  (must be clean)
          3. npm test  (all tests must pass)

          ## Workspace Documentation
          Write implementation notes to:
            docs/workspace/20260301-ss-pipeline-refactor/products-sync-notes.md

          Include:
          - Whether catalog_color_groups was carried forward or deferred (and why)
          - Transaction granularity decision (per-style vs per-batch) and rationale
          - Any schema surprises from ssProductSchema / ssProductSchema fields
          - Links to changed files

          ## PR
          Use build-session-protocol to complete. PR title:
          "fix(catalog): atomic products sync — eliminates timing-gap '-' bug"
          Closes #702, #699.

  - name: 'Wave 3 — Brands Persistence + Orchestrated Pipeline'
    serial: true
    sessions:
      - topic: ss-brands-sync
        stage: build
        dependsOn: ss-products-sync-merge
        prompt: |
          # S&S Brands Persistence (Issue #704)

          You are implementing Wave 3a of the S&S data pipeline refactor (Epic #701).
          This wave persists brand data from the /v2/brands/ endpoint to catalog_brands.

          ## Context

          Read these files first:
          - docs/workspace/20260301-ss-pipeline-refactor/plan.md (full plan)
          - docs/workspace/20260301-ss-pipeline-refactor/products-sync-notes.md (Wave 2 notes)
          - lib/suppliers/adapters/ss-activewear.ts (ssBrandSchema, getBrands method)
          - lib/suppliers/types.ts (ISupplierAdapter interface)
          - src/db/schema/catalog-normalized.ts (catalogBrands table)
          - src/infrastructure/services/styles-sync.service.ts (reference pattern)

          ## Step 1 — Audit the brands endpoint

          The current ssBrandSchema only captures brandName. The schema uses .passthrough()
          so other fields already flow through — we just need to type and persist them.

          To discover the full response shape, either:
          a) Call the live S&S API: GET https://api.ssactivewear.com/v2/brands/
             (requires SS_USERNAME + SS_PASSWORD env vars — check .env.local)
          b) Check the S&S API documentation or any saved response in the codebase

          Document all fields found in the response. Common expected fields:
          brandID (integer), brandName (string), brandImage (string URL), description (string)

          Update the ssBrandSchema in lib/suppliers/adapters/ss-activewear.ts with all fields
          that are useful to persist. Add export: export type SSBrand = z.infer<typeof ssBrandSchema>

          ## Step 2 — Extend the adapter

          Add getRawBrands(): Promise<SSBrand[]> to SSActivewearAdapter:
          - Uses ssGet('brands', {}, SS_CACHE_TTL.brands) — same call as getBrands()
          - Returns the full parsed SSBrand[] instead of just names
          - The existing getBrands() method stays unchanged (string[] API still used elsewhere)

          Also add getRawBrands() stub to the mock adapter if it implements IBrandable.

          ## Step 3 — Schema migration (if new columns needed)

          If brands endpoint returns columns not in catalog_brands (check current schema):
          - Add columns to catalogBrands in src/db/schema/catalog-normalized.ts
          - Run: npm run db:generate  (creates migration file)
          - Run: npm run db:migrate   (applies to local Supabase)
          - Commit the migration file

          ## Step 4 — Create brands-sync.service.ts

          src/infrastructure/services/brands-sync.service.ts:
          - Calls adapter.getRawBrands()
          - Upserts into catalog_brands by canonicalName (matching existing upsert target)
          - Updates any new fields (brandImage, description, etc.) on conflict
          - Returns { brandsUpserted: number, errors: number }

          Follow the logger pattern: logger.child({ domain: 'brands-sync' })

          ## Step 5 — Create sync-brands/route.ts

          src/app/api/catalog/sync-brands/route.ts:
          - POST only (no GET cron — brands data changes rarely, triggered by pipeline)
          - Auth: validateAdminSecret + checkAdminSyncRateLimit (match other sync routes)
          - No request body needed
          - Returns { brandsUpserted, errors, timestamp }
          - Wrap in withRequestContext

          ## Tests

          src/infrastructure/services/__tests__/brands-sync.service.test.ts:
          - "upserts brands returned by adapter.getRawBrands()"
          - "returns correct brandsUpserted count"
          - "handles empty brands response gracefully"

          ## Quality Gates
          1. npx tsc --noEmit
          2. npm run lint
          3. npm test

          ## Workspace Documentation
          Write notes to:
            docs/workspace/20260301-ss-pipeline-refactor/brands-sync-notes.md

          Include:
          - Full field inventory of /v2/brands/ response (the audit result)
          - Which fields were added to catalog_brands schema
          - Whether a migration was required
          - Links to changed files

          ## PR
          Use build-session-protocol to complete. PR title:
          "feat(catalog): brands endpoint persistence — brands-sync.service.ts"
          Closes #704.

      - topic: ss-catalog-pipeline
        stage: build
        dependsOn: ss-brands-sync
        prompt: |
          # S&S Orchestrated Catalog Pipeline (Issue #705)

          You are implementing Wave 3b of the S&S data pipeline refactor (Epic #701).
          This is the final wave — a single endpoint that chains all three catalog sync jobs
          in dependency order, eliminating the operational risk of manual ordering.

          ## Context

          Read these files first:
          - docs/workspace/20260301-ss-pipeline-refactor/plan.md (full plan)
          - docs/workspace/20260301-ss-pipeline-refactor/brands-sync-notes.md (Wave 3a notes)
          - src/infrastructure/services/styles-sync.service.ts
          - src/infrastructure/services/products-sync.service.ts
          - src/infrastructure/services/brands-sync.service.ts (just merged in Wave 3a)
          - src/app/api/catalog/sync-inventory/route.ts (reference for cron GET pattern)
          - vercel.json (current cron config)

          ## What to Build

          ### Service: src/infrastructure/services/catalog-pipeline.service.ts

          ```typescript
          export type CatalogPipelineResult = {
            styles: { synced: number; errors: number }
            products: {
              stylesProcessed: number
              colorsUpserted: number
              sizesUpserted: number
              skusInserted: number
              errors: number
            }
            brands: { brandsUpserted: number; errors: number }
            duration: number   // milliseconds
            timestamp: string  // ISO 8601
          }

          export async function runCatalogPipeline(options?: {
            styleIds?: string[]
            offset?: number
            limit?: number
          }): Promise<CatalogPipelineResult>
          ```

          Execution order (IMPORTANT — styles must precede products):
          1. syncStylesFromSupplier() — creates catalog_styles UUIDs that products-sync depends on
          2. syncProductsFromSupplier(styleIds?, { offset, limit }) — depends on step 1
          3. syncBrandsFromSupplier() — independent enrichment, run last

          Use performance.now() for duration measurement.
          Logger: logger.child({ domain: 'catalog-pipeline' })

          ### Route: src/app/api/catalog/sync-pipeline/route.ts

          **POST /api/catalog/sync-pipeline** (admin-triggered):
          - validateAdminSecret + checkAdminSyncRateLimit
          - Optional JSON body: { styleIds?: string[], offset?: number, limit?: number }
          - Returns CatalogPipelineResult + timestamp

          **GET /api/catalog/sync-pipeline** (Vercel cron):
          - CRON_SECRET auth (Bearer token in Authorization header)
          - Calls runCatalogPipeline() with no options (full catalog)
          - export const dynamic = 'force-dynamic'
          - Returns CatalogPipelineResult + timestamp

          Wrap both handlers in withRequestContext.

          ### Update vercel.json

          Add weekly catalog pipeline cron (alongside existing daily inventory cron):
          ```json
          {
            "path": "/api/catalog/sync-pipeline",
            "schedule": "0 2 * * 0"
          }
          ```
          Sunday at 02:00 UTC — outside business hours, S&S catalog changes ~monthly.

          ### Tests

          src/infrastructure/services/__tests__/catalog-pipeline.service.test.ts:
          - "calls styles sync, then products sync, then brands sync in order"
          - "passes options through to products sync"
          - "returns aggregate stats from all three services"
          - "includes duration in milliseconds"
          - "if styles sync throws, pipeline propagates the error"

          ## Quality Gates
          1. npx tsc --noEmit
          2. npm run lint
          3. npm test

          ## Epic Acceptance Check (#701)
          After your PR merges, the following should all be true:
          - POST /api/catalog/sync-pipeline chains styles → products → brands
          - After pipeline run + inventory sync: zero "–" badges for real S&S styles
          - scripts/run-image-sync.ts is deleted (done in Wave 2)
          - All services named to match S&S API endpoints (done in Wave 1)
          - Brand metadata persisted to catalog_brands (done in Wave 3a)
          - catalog_colors, catalog_sizes, raw.ss_activewear_products written atomically (done in Wave 2)

          ## Workspace Documentation
          Write notes to:
            docs/workspace/20260301-ss-pipeline-refactor/pipeline-notes.md

          Include:
          - vercel.json cron schedule rationale
          - Any edge cases in the pipeline orchestration
          - Links to changed files

          ## PR
          Use build-session-protocol to complete. PR title:
          "feat(catalog): orchestrated catalog pipeline — POST /api/catalog/sync-pipeline"
          Closes #705. References #701 (epic).
