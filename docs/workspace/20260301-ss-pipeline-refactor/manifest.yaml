          syncCatalogFromSupplier, syncRawPricingFromSupplier, /api/catalog/sync-pricing,
          /api/catalog/sync[^-]
          Fix any remaining references (documentation, scripts, etc.)

          ### 6. vercel.json
          No change — sync-inventory cron is unchanged.

          ## Quality Gates
          Run in order:
          1. npx tsc --noEmit  (must be clean)
          2. npm run lint  (must be clean)
          3. npm test  (all tests must pass)

          ## Workspace Documentation
          Before finalizing, write implementation notes to:
            docs/workspace/20260301-ss-pipeline-refactor/rename-notes.md

          Include:
          - Any references found beyond the obvious files
          - Any edge cases in the rename
          - Confirmation that vercel.json is unchanged
