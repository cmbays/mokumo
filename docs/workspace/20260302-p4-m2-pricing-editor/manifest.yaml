          2. `docs/workspace/20260302-p4-m2-pricing-editor/breadboard.md` — affordance map (U1–U19 are hub affordances, U33–U48 are markup/rush affordances)
          3. `src/domain/entities/pricing-template.ts` — entity types (GarmentMarkupRule, RushTier, PricingTemplate)
          4. `src/features/pricing/actions/pricing-templates.ts` — server actions (built in Wave 0)
          5. `src/features/pricing/components/PricingTemplateCard.tsx` — existing card to adapt
          6. `CLAUDE.md` — project standards and design system tokens

          ## What To Build

          ### 1. GarmentMarkupEditor component
          File: `src/features/pricing/components/GarmentMarkupEditor.tsx` (NEW)

          - `'use client'` directive
          - Props: `initialRules: GarmentMarkupRule[]`
          - Table with 6 rows: `tshirt`, `hoodie`, `hat`, `tank`, `polo`, `jacket` (use human-readable labels: "T-Shirt", "Hoodie", "Hat", "Tank Top", "Polo", "Jacket")
          - Each row: category label + multiplier input (`number`, `step={0.1}`, `min={1.0}`)
          - Display format: show both raw multiplier (e.g. `2.0×`) and percentage (e.g. `100% markup`) — markup% = (multiplier - 1) * 100
          - Manages local state for edits; "Save All" button calls `saveMarkupRules(rules[])` server action via `startTransition`
          - Show loading state on "Save All" during transition
          - Design: use `bg-elevated` card, `border-border` table borders, `text-foreground` for values

          ### 2. RushTierEditor component
          File: `src/features/pricing/components/RushTierEditor.tsx` (NEW)

          - `'use client'` directive
          - Props: `initialTiers: RushTier[]`
          - Table with add/remove rows
          - Columns: Name | Days Under Standard | Flat Fee ($) | Surcharge (%)
          - Inline editing for all fields (click cell → edit, blur/Enter → commit)
          - "Add Tier" button: appends blank row at end (displayOrder = current max + 1)
          - Remove (×) per row: removes from local state
          - Row order = displayOrder; positions auto-renumber on delete
          - "Save All" button calls `saveRushTiers(tiers[])` server action via `startTransition`
          - Flat Fee uses `big.js` via `money()` for display/storage
          - Show loading state on "Save All" during transition

          ### 3. Adapt PricingTemplateCard
          File: `src/features/pricing/components/PricingTemplateCard.tsx` (UPDATE)

          Read the existing file first to understand current props.

          Props to REMOVE:
          - `pricingTier`
          - `isIndustryDefault`
          - `healthPercentage`
          - `lastUpdated`

          Props to ADD:
          - `serviceType: 'screen_print' | 'dtf'`
          - `isDefault: boolean`
          - `updatedAt: Date`

          Props to KEEP: All existing props not in the remove list (especially `MarginIndicator` — show 'unknown' state when no cell data is passed in).

          Update the card rendering:
          - Show `serviceType` as a badge (use `text-teal` for screen_print, `text-brown` for dtf per design tokens)
          - Show `isDefault` as a "Default" badge when true
          - Show `updatedAt` formatted as relative time (e.g. "2 days ago")

          ## Quality Gates
          - `npx tsc --noEmit` — zero errors
          - All Flat Fee arithmetic in RushTierEditor uses `big.js`
          - No `console.log` — use `logger`

          ## Workspace Documentation

          Before finalizing your work, commit implementation notes to:
            docs/workspace/20260302-p4-m2-pricing-editor/hub-surfaces-notes.md

          Include:
          - Decisions around inline editing pattern (reuse vs custom)
          - GarmentMarkupEditor: how markup% display is computed
          - PricingTemplateCard: which fields were removed and any migration notes
          - Links to related code sections

  - name: 'Wave 2: Editor Pages'
