          ## What To Build

          ### 1. Async RSC page
          File: `src/app/(dashboard)/settings/pricing/page.tsx` (REWRITE)

          ```tsx
          // Async RSC
          // Parallel-fetch: listPricingTemplates() + getMarkupRules() + getRushTiers()
          // Use Promise.all for parallel fetching
          // Passes all as initial props to PricingHubClient
          ```

          ### 2. PricingHubClient (4-tab layout)
          File: `src/app/(dashboard)/settings/pricing/_components/PricingHubClient.tsx` (NEW)

          - `'use client'` directive
          - Props: `initialTemplates: PricingTemplate[]`, `initialMarkupRules: GarmentMarkupRule[]`, `initialRushTiers: RushTier[]`
          - 4-tab layout using shadcn Tabs:
