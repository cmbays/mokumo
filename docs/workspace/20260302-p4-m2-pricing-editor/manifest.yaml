            - "DTF" tab: list of DTF templates (`serviceType === 'dtf'`) using PricingTemplateCard
            - "Markup Rules" tab: GarmentMarkupEditor component
            - "Rush Tiers" tab: RushTierEditor component
          - Local state: `templates` (optimistic updates for default/delete)

          **PricingTemplateCard actions to wire:**
          - "Open" → `router.push('/settings/pricing/{serviceType}/{id}')` where serviceType maps: `screen_print` → `screen-print`, `dtf` → `dtf`
