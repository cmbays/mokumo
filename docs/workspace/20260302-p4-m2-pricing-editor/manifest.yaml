          ## What To Build

          ### 1. Async RSC page
          File: `src/app/(dashboard)/settings/pricing/screen-print/[id]/page.tsx` (REWRITE)

          ```tsx
          // Async RSC
          // Calls getPricingTemplate(id) server action
          // If not found: notFound()
