vertical: pricing
waves:
  - name: 'Wave 0: Backend Foundation'
    serial: true
    sessions:
      - topic: pricing-backend
        stage: build
        prompt: |
          You are building the backend foundation for P4 M2: Pricing Editor UI.

          ## Context

          Read these docs before starting:
          1. `docs/workspace/20260302-p4-m2-pricing-editor/plan.md` — full implementation plan (Wave 0 details are in Task 0.1)
          2. `docs/workspace/20260302-p4-m2-pricing-editor/breadboard.md` — affordance map (N60–N69 are the repo methods you're extending)
          3. `src/domain/ports/pricing-template.repository.ts` — port interface to extend
          4. `src/infrastructure/repositories/pricing/supabase-pricing-template.repository.ts` — existing repo to extend
          5. `src/infrastructure/repositories/pricing-templates.ts` — facade exports
          6. `CLAUDE.md` — project standards

          ## What To Build

          ### 1. Extend the port interface
          File: `src/domain/ports/pricing-template.repository.ts`

          Add two new methods:
          ```ts
          deleteTemplate(id: string, shopId: string): Promise<void>
          // DELETE WHERE id = ? AND shop_id = ? (shop-scope guard)

          setDefaultTemplate(shopId: string, id: string, serviceType: string): Promise<void>
          // TX: UPDATE SET is_default=false WHERE (shopId, serviceType)
          //     UPDATE SET is_default=true  WHERE id = ?
          ```

          Also extend `listTemplates` signature to accept optional `serviceType?: string` filter.

          ### 2. Implement both methods in the Supabase repository
          File: `src/infrastructure/repositories/pricing/supabase-pricing-template.repository.ts`

          - `deleteTemplate`: Validate both UUIDs with `isValidUuid`. DELETE with AND condition on `id` AND `shop_id` (shop scope guard).
          - `setDefaultTemplate`: Use `db.transaction()`. First UPDATE SET `is_default=false` WHERE `shop_id=shopId` AND `service_type=serviceType`. Then UPDATE SET `is_default=true` WHERE `id=id`.
          - `listTemplates`: Add optional `serviceType` param — when provided, add `eq(pricingTemplates.serviceType, serviceType)` to the WHERE clause.

          ### 3. Add facade exports
          File: `src/infrastructure/repositories/pricing-templates.ts`

          Export `deleteTemplate` and `setDefaultTemplate` via the same facade pattern as existing exports.

          ### 4. Create 11 server actions
          File: `src/features/pricing/actions/pricing-templates.ts` (NEW file)

          All actions call `verifySession()` first to get `{ shopId }`. Use `'use server'` directive.

          ```ts
          listPricingTemplates(serviceType?: string)  → repo.listTemplates(shopId, serviceType?)
          getPricingTemplate(id: string)              → repo.getTemplateById(id)
          createPricingTemplate(data)                 → repo.upsertTemplate({ ...data, shopId })
          updatePricingTemplate(id, data)             → repo.upsertTemplate({ id, ...data })
          deletePricingTemplate(id)                   → repo.deleteTemplate(id, shopId)
          savePricingMatrix(templateId, cells[])      → repo.upsertMatrixCells(templateId, cells)
          setDefaultTemplate(id, serviceType)         → repo.setDefaultTemplate(shopId, id, serviceType)
          getMarkupRules()                            → repo.getMarkupRules(shopId)
          saveMarkupRules(rules[])                    → repo.upsertMarkupRules(shopId, rules)
          getRushTiers()                              → repo.getRushTiers(shopId)
          saveRushTiers(tiers[])                      → repo.upsertRushTiers(shopId, tiers)
          ```

          Return `{ data, error }` envelope from each action. Use `logger.child({ domain: 'pricing' })` for all logging.

          ### 5. Write tests
          File: `src/features/pricing/actions/__tests__/pricing-templates.test.ts` (NEW file)

          Use the TDD skill (`.claude/skills/tdd/skill.md`). Mock the repository. Test:
          - Each action calls `verifySession()` before the repo
          - Happy path returns data correctly
          - Error path returns `{ error }` envelope
          - `deletePricingTemplate` passes shopId from session (not from caller)
          - `setDefaultTemplate` passes shopId from session

          Also write repo unit tests for `deleteTemplate` and `setDefaultTemplate`:
          File: `src/infrastructure/repositories/pricing/__tests__/supabase-pricing-template.repository.test.ts`

          Target: 80% coverage on new methods + server actions.

          ## Quality Gates
          - `npx tsc --noEmit` — zero errors
          - `npm run test:coverage` — thresholds pass
          - No `console.log` — use `logger`
          - No floating-point money arithmetic — use `big.js` via `money()` helper

          ## Workspace Documentation

          Before finalizing your work, commit implementation notes to:
            docs/workspace/20260302-p4-m2-pricing-editor/pricing-backend-notes.md

          Include:
          - Architecture decisions made (e.g., error envelope shape, UUID validation approach)
          - Key implementation tradeoffs
          - Any blockers or deferred work
          - Links to related code sections

  - name: 'Wave 1: Shared Components'
    serial: false
    sessions:
      - topic: matrix-cell-grid
        stage: build
        dependsOn: pricing-backend
        prompt: |
          You are building the MatrixCellGrid shared component for P4 M2: Pricing Editor UI.

          ## Context

          Read these docs before starting:
          1. `docs/workspace/20260302-p4-m2-pricing-editor/plan.md` — full plan (Task 1.1 is your task)
          2. `docs/workspace/20260302-p4-m2-pricing-editor/breadboard.md` — affordance map (U20–U32 are the grid affordances, N15–N26 are the code affordances)
          3. `src/domain/entities/pricing-template.ts` — entity types including `PrintCostMatrixCell`
          4. `src/domain/lib/money.ts` — money helper (required for all cell arithmetic)
          5. `CLAUDE.md` — project standards and design system tokens

          ## What To Build

          ### MatrixCellGrid component
          File: `src/features/pricing/components/MatrixCellGrid.tsx` (NEW)

          Props interface:
          ```ts
          type MatrixCellGridProps = {
            cells: PrintCostMatrixCell[]
            mode: 'sp' | 'dtf'  // 'dtf' = single column, colorCount always null
            onChange: (cells: PrintCostMatrixCell[]) => void
            readOnly?: boolean
          }
          ```

          Behavior:
          - **Rows** = sorted unique `qty_anchor` values from cells
          - **Columns** = sorted unique `color_count` values (sp-mode) OR single unlabeled column (dtf-mode)
          - **Click cell** → inline `<input type="number">` edit mode
          - **Blur or Enter** → commit value to cells array → call `onChange`
          - **Cell background tint**: green-tinted for low cost, warming toward amber for high (range-relative). Use `big.js` for range calculation.
          - **"Add Qty" button**: prompts (controlled input) for new `qty_anchor` → inserts blank cells for all existing color counts (or single blank cell in dtf-mode)
          - **"Add Color" button** (sp-mode only): prompts for new `color_count` → inserts blank cells for all existing qty anchors
          - **Remove row (×)**: removes all cells where `qty_anchor` matches
          - **Remove column (×)**: removes all cells where `color_count` matches (sp-mode only)

          Design tokens to use:
          - `bg-surface` for the grid container
          - `border-border` for cell borders
          - `text-foreground` for values
          - `text-muted-foreground` for empty cells / placeholders
          - Cell tint: low cost = slight green tint, high cost = slight amber tint (calculate via `big.js` range)

          **CRITICAL**: All cell value arithmetic (range calculation for tinting, value commits) MUST use `big.js` via `money()` helper from `src/domain/lib/money.ts`.

          ### Tests
          File: `src/features/pricing/components/MatrixCellGrid.test.ts` (NEW)

          Use the TDD skill. Test pure logic (not rendering):
          - `addQtyRow`: given cells + new qty_anchor, returns cells with new row inserted
          - `removeQtyRow`: given cells + qty_anchor, returns cells without that row
          - `addColorColumn` (sp-mode): given cells + new color_count, returns cells with new column
          - `removeColorColumn`: given cells + color_count, returns cells without that column
          - `commitCellValue`: given cells + cell key + new value, returns updated cells array
          - `computeTintLevel`: given cells, returns per-cell tint ratio (0=min, 1=max) — verify `big.js` is used

          Extract these as pure functions and test them separately from the React component.

          Target: 70% coverage on pure logic functions.

          ## Quality Gates
          - `npx tsc --noEmit` — zero errors
          - No floating-point money arithmetic anywhere in component logic

          ## Workspace Documentation

          Before finalizing your work, commit implementation notes to:
            docs/workspace/20260302-p4-m2-pricing-editor/matrix-cell-grid-notes.md

          Include:
          - Cell tinting approach (how range-relative calculation works)
          - Decisions around controlled input prompting for Add Qty/Color
          - Any accessibility choices for inline editing
          - Links to related code sections

      - topic: hub-surfaces
        stage: build
        dependsOn: pricing-backend
        prompt: |
          You are building the hub editor surfaces for P4 M2: Pricing Editor UI.

          ## Context

          Read these docs before starting:
