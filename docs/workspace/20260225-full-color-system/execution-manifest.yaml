          Remove: getColorsMutable import
          Replace all internal references to the removed catalogColors local with the colors prop.

      - id: "4.3"
        action: edit_file
        file: src/app/(dashboard)/garments/_components/BrandDetailDrawer.tsx
        description: >
          REMOVE: const [version, setVersion] = useState(0)
          REMOVE: all setVersion((v) => v + 1) calls from all handler functions
          ADD: const [brandFavoriteColorIds, setBrandFavoriteColorIds] = useState<string[]>([])
          ADD useEffect to load brand favorites on drawer open:
            useEffect(() => {
              if (!open || !brandName) return
              let cancelled = false
              startTransition(async () => {
                try {
                  const ids = await getBrandColorFavorites(brandName)
                  if (!cancelled) setBrandFavoriteColorIds(ids)
                } catch (err) {
                  if (!cancelled) {
                    actionsLogger.warn({ brandName, err }, 'failed to load brand color favorites')
                    setBrandFavoriteColorIds([])
                  }
                }
              })
              return () => { cancelled = true }
            }, [open, brandName])
          Import startTransition from react. Import getBrandColorFavorites from actions.ts.
          Import actionsLogger from shared/lib/logger.

      - id: "4.4"
        action: edit_file
        file: src/app/(dashboard)/garments/_components/BrandDetailDrawer.tsx
        description: >
          Rewrite handleToggleFavorite callback:
            const handleToggleFavorite = useCallback(async (colorId: string) => {
              setBrandFavoriteColorIds(prev =>
                prev.includes(colorId) ? prev.filter(id => id !== colorId) : [...prev, colorId]
              )
              const result = await toggleColorFavorite(colorId, 'brand', brandName)
              if (!result.success) {
                setBrandFavoriteColorIds(prev =>
                  prev.includes(colorId) ? prev.filter(id => id !== colorId) : [...prev, colorId]
                )
                toast.error('Could not update brand color — try again')
              }
            }, [brandName])
          Import toggleColorFavorite from actions.ts.

      - id: "4.5"
        action: edit_file
        file: src/app/(dashboard)/garments/actions.ts
        description: >
          Extend toggleColorFavorite to handle brand scope correctly.
          When scopeType === 'brand' and scopeId (brandName string) is provided:
            SELECT id FROM catalog_brands WHERE canonical_name=$scopeId LIMIT 1
          If no brand row found: return { success: false, error: 'Brand not found' }
          Use the resolved brand UUID as resolvedScopeId for the catalog_color_preferences upsert.
          The scopeId parameter for 'brand' scope semantically receives the canonical brand name
          (not a UUID). Add an inline comment clarifying this semantic distinction.
          Note: the null brand guard (returning error before upsert) implements the guard
          documented in breadboard-reflection Fix #2.

      - id: "4.6"
        action: edit_file
        file: src/app/(dashboard)/garments/_components/BrandDetailDrawer.tsx
        description: >
          Audit and remove any remaining references to getBrandPreferencesMutable(),
          getColorsMutable(), or resolveEffectiveFavorites from the component.
          For RemovalConfirmationDialog handlers (handleRemoveAll, handleRemoveLevelOnly,
          handleRemoveSelected) that previously mutated the in-memory brandPreferences array:
          if full inheritance persistence is not implemented in this wave (per shaping Out of Scope),
          stub with toast.info('Coming soon') and add:
          // TODO(#618-followup): full inheritance system persistence

      - id: "4.7"
        action: verify
        command: npm test
        description: All tests pass after BrandDetailDrawer changes.

      - id: "4.8"
        action: verify
        command: npx tsc --noEmit
        description: No TypeScript errors.

      - id: "4.9"
        action: verify
        command: "rg 'getColorsMutable' src/app/\\(dashboard\\)/garments/ src/features/garments/"
        description: >
          No output expected — confirms getColorsMutable() is fully removed
          from all garment feature files.

      - id: "4.10"
        action: verify
        command: "rg 'favoriteVersion' src/app/\\(dashboard\\)/garments/"
        description: >
          No output expected — confirms favoriteVersion counter is fully removed.

      - id: "4.11"
        action: verify
