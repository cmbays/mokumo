key_invariants:
  - "ColorFilterGrid never calls getColorsMutable() — all color data flows from props"
  - "GarmentCatalogToolbar never calls getColorsMutable() — uses catalogColors prop for pill lookup"
  - "BrandDetailDrawer never mutates in-memory mock arrays — all mutations go through server actions"
  - "useColorFilter never calls router.replace() — color selection is local state only"
  - "Filter matching is name-based — ID comparison against g.availableColors is removed"
  - "catalog_color_preferences is the single source of truth for color favorites at any scope"
  - "catalog_inventory has no application reads in this issue — schema only"
  - "Brand UUID resolution always happens server-side — clients pass brandName string, not UUIDs"
  - "Optimistic updates always capture previous state before mutation and roll back on failure"
  - "Server actions follow: validate UUID → verify session → read → compute → upsert → log → return typed result"

