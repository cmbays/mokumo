          ## What to Build

          ### 1. File Upload Hook (src/features/artwork/hooks/use-file-upload.ts) — NEW FILE

          Client-side orchestrator. Implements N0 (`handleFileUpload`) + N1 (`computeHash`) + N2 (`uploadToStorage`).

          ```typescript
          'use client'

          export type UploadState =
            | { phase: 'idle' }
            | { phase: 'hashing' }
            | { phase: 'uploading'; progress: number }
            | { phase: 'processing' }
            | { phase: 'success'; version: ArtworkVersion }
            | { phase: 'error'; message: string }
            | { phase: 'duplicate'; existingPath: string }

          export function useFileUpload(shopId: string) {
            const [state, setState] = useState<UploadState>({ phase: 'idle' })

            async function handleFileUpload(file: File) {
              // Step 1: compute hash
              setState({ phase: 'hashing' })
              const contentHash = await computeHash(file)

              // Step 2: initiate upload (dedup check + presigned URL)
              let initiated
              try {
                initiated = await initiateUpload({
                  entity: 'artwork',
                  shopId,
                  filename: file.name,
                  mimeType: file.type,
                  sizeBytes: file.size,
                  contentHash,
                })
              } catch (err) {
                setState({ phase: 'error', message: errorMessage(err) })
                return
              }

              if (initiated.isDuplicate) {
                setState({ phase: 'duplicate', existingPath: initiated.path })
                return
              }

              // Step 3: XHR upload to storage
              setState({ phase: 'uploading', progress: 0 })
              try {
                await uploadToStorage(
                  initiated.uploadUrl,
                  initiated.token,
                  file,
                  (pct) => setState({ phase: 'uploading', progress: pct }),
                )
              } catch (err) {
                setState({ phase: 'error', message: 'Upload failed. Please try again.' })
                return
              }

              // Step 4: confirm + renditions
              setState({ phase: 'processing' })
              const version = await confirmArtworkUpload({
                path: initiated.path,
                contentHash,
                mimeType: file.type,
              })
              setState({ phase: 'success', version })
            }

            return { state, handleFileUpload, reset: () => setState({ phase: 'idle' }) }
          }

          async function computeHash(file: File): Promise<string> {
            const buffer = await file.arrayBuffer()
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer)
            return Buffer.from(hashBuffer).toString('hex')
          }

          function uploadToStorage(
            uploadUrl: string,
            token: string,
            file: File,
            onProgress: (pct: number) => void,
          ): Promise<void> {
            return new Promise((resolve, reject) => {
              const xhr = new XMLHttpRequest()
              xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100))
              }
              xhr.onload = () => (xhr.status >= 200 && xhr.status < 300 ? resolve() : reject(new Error(`HTTP ${xhr.status}`)))
              xhr.onerror = () => reject(new Error('Network error'))
              xhr.open('PUT', uploadUrl)
              xhr.setRequestHeader('Authorization', `Bearer ${token}`)
              xhr.send(file)
            })
          }
          ```

