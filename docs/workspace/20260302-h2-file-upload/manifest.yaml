      - topic: h2-storage-foundation
        stage: build
        prompt: |
          # H2: File Upload Pipeline — Infrastructure Foundation

          You are building the complete H2 service layer. This is PURE INFRASTRUCTURE — no
          consumer code, no UI. Read these docs first, in order:

          1. docs/workspace/20260302-h2-file-upload/breadboard.md — P4 affordances (N10–N16)
          2. docs/workspace/20260302-h2-file-upload/shaping.md — Shape A parts A1–A9
          3. docs/workspace/20260302-h2-file-upload/plan.md — Task 0.1 for full file list
          4. CLAUDE.md — architecture rules, coding standards

          ## What to Build

          ### 1. Domain Ports (src/domain/ports/storage.ts) — NEW FILE

          Define these TypeScript types (NOT interfaces — CLAUDE.md rule: no `interface`):

          ```typescript
          export type IStorageProvider = {
            upload(path: string, buffer: Buffer, opts: { contentType: string }): Promise<{ path: string }>
            delete(paths: string[]): Promise<void>
            createPresignedUploadUrl(path: string, expiresIn: number): Promise<{ uploadUrl: string; token: string }>
            createPresignedDownloadUrl(path: string, expiresIn: number): Promise<string>
            download(path: string): Promise<Buffer>
            list(prefix: string): Promise<Array<{ name: string; size: number; mimeType: string }>>
          }

          export type CreatePresignedUploadUrlInput = {
            entity: string
            shopId: string
            filename: string
            mimeType: string
            sizeBytes: number
            contentHash: string
            isDuplicate?: boolean
          }

          export type PresignedUploadResult =
            | { isDuplicate: true; path: string }
            | { isDuplicate: false; path: string; uploadUrl: string; token: string; expiresAt: Date }

          export type ConfirmUploadInput = { path: string; contentHash: string }

          export type ConfirmUploadResult = {
            originalUrl: string
            thumbUrl: string | null
            previewUrl: string | null
            status: 'ready' | 'pending'
          }

          export type IFileUploadService = {
            createPresignedUploadUrl(input: CreatePresignedUploadUrlInput): Promise<PresignedUploadResult>
            confirmUpload(input: ConfirmUploadInput): Promise<ConfirmUploadResult>
            deleteFile(paths: string[]): Promise<void>
          }
          ```

          Also add `IStorageProvider` and `IFileUploadService` to src/domain/ports/index.ts.

          ### 2. Entity Configs (src/infrastructure/storage/entity-configs.ts) — NEW FILE

          ```typescript
          export type EntityConfig = {
            bucket: string
            allowedMimeTypes: string[]
            maxSizeBytes: Record<string, number>
          }

          export const ENTITY_CONFIGS: Record<string, EntityConfig> = {
            artwork: {
              bucket: 'artwork',
              allowedMimeTypes: [
                'image/png', 'image/jpeg', 'image/webp', 'image/svg+xml',
                'image/tiff', 'image/gif', 'application/pdf'
              ],
              maxSizeBytes: {
                'image/png': 50_000_000,
                'image/jpeg': 50_000_000,
                'image/webp': 50_000_000,
                'image/svg+xml': 5_000_000,
                'image/tiff': 50_000_000,
                'image/gif': 50_000_000,
                'application/pdf': 30_000_000,
              },
            },
          }

          export class UploadValidationError extends Error {
            constructor(public readonly reason: 'mime_type' | 'file_size' | 'unknown_entity', message: string) {
              super(message)
              this.name = 'UploadValidationError'
            }
          }

          export function validateEntityConfig(
            entity: string,
            mimeType: string,
            sizeBytes: number,
          ): EntityConfig {
            const config = ENTITY_CONFIGS[entity]
            if (!config) throw new UploadValidationError('unknown_entity', `Unknown entity: ${entity}`)
            if (!config.allowedMimeTypes.includes(mimeType))
              throw new UploadValidationError('mime_type', `MIME type not allowed: ${mimeType}`)
            const limit = config.maxSizeBytes[mimeType]
            if (limit !== undefined && sizeBytes > limit)
              throw new UploadValidationError('file_size', `File too large: ${sizeBytes} > ${limit}`)
            return config
          }
          ```

          ### 3. SupabaseStorageProvider (src/infrastructure/storage/supabase-storage.provider.ts)

          Implements IStorageProvider using the Supabase Storage v2 SDK.
          - Use `SUPABASE_SERVICE_ROLE_KEY` env var (sb_secret_* key) for all admin ops
          - Use `NEXT_PUBLIC_SUPABASE_URL` for the Supabase URL
          - `download(path)` → `adminClient.storage.from(bucket).download(path)` → Buffer
            (server-side direct; no presigned URL used server-side — that is a browser pattern)
          - `createPresignedUploadUrl` → `adminClient.storage.from(bucket).createSignedUploadUrl(path)`
            returns `{ path, signedUrl, token }` — expose as `{ uploadUrl, token }`
          - All 6 methods must be implemented: upload, delete, createPresignedUploadUrl,
            createPresignedDownloadUrl, download, list
          - Use logger from @shared/lib/logger with domain: 'storage'

          ### 4. RenditionService (src/infrastructure/storage/rendition.service.ts)

          `generate(originalPath: string, mimeType: string): Promise<{ thumbPath: string | null; previewPath: string | null }>`

          - R1: Call `provider.download(originalPath)` → Buffer
          - R2: Format detect by mimeType parameter
          - Sharp-native types: image/png, image/jpeg, image/webp, image/svg+xml, image/gif, image/tiff
          - Non-Sharp: application/pdf → return `{ thumbPath: null, previewPath: null }`
          - For Sharp-native:
            - Thumb: `sharp(buffer).resize(200, 200, { fit: 'inside', withoutEnlargement: true }).webp({ quality: 80 })`
            - Preview: `sharp(buffer).resize(800, 800, { fit: 'inside', withoutEnlargement: true }).webp({ quality: 85 })`
            - Upload thumb to `{entity}/{shopId}/thumbs/{versionId}.webp` via provider.upload()
            - Upload preview to `{entity}/{shopId}/previews/{versionId}.webp` via provider.upload()
          - Use `import sharp from 'sharp'`

          ### 5. FileUploadService (src/infrastructure/storage/file-upload.service.ts)

          Implements IFileUploadService.

          `createPresignedUploadUrl(input)`:
          - validateEntityConfig(entity, mimeType, sizeBytes) — throws UploadValidationError on fail
          - If input.isDuplicate === true → return { isDuplicate: true, path: existingPath } early
          - Generate versionId = crypto.randomUUID()
          - Generate path = `${entity}/${shopId}/originals/${versionId}_${sanitizeFilename(filename)}`
          - Call provider.createPresignedUploadUrl(path, 600) → { uploadUrl, token }
          - Return { isDuplicate: false, path, uploadUrl, token, expiresAt }

          `confirmUpload(input)`:
          - Parse entity + shopId + versionId from path (split by '/')
          - Call RenditionService.generate(path, mimeType)
          - Call provider.createPresignedDownloadUrl(originalPath, 3600) → originalUrl
          - If thumbPath: call provider.createPresignedDownloadUrl(thumbPath, 3600) → thumbUrl
          - Return { originalUrl, thumbUrl, previewUrl, status: 'ready' | 'pending' }

          `deleteFile(paths)`:
          - Call provider.delete(paths)

          ### 6. Storage Index (src/infrastructure/storage/index.ts)

          ```typescript
          import { SupabaseStorageProvider } from './supabase-storage.provider'
          import { FileUploadService } from './file-upload.service'

          const provider = new SupabaseStorageProvider()
          export const fileUploadService = new FileUploadService(provider)
          export type { IFileUploadService, IStorageProvider, PresignedUploadResult, ConfirmUploadResult } from '@domain/ports/storage'
          export { UploadValidationError } from './entity-configs'
          ```

          ### 7. Update Bootstrap (src/infrastructure/bootstrap.ts) — MODIFY

          Add at the top of the exports section:
          ```typescript
          export { fileUploadService } from './storage'
          ```

          ### 8. Bootstrap Script (scripts/bootstrap-storage.ts)

          Idempotent script. Run once manually before any upload.
          - Create 'artwork' bucket: `{ public: false, fileSizeLimit: 52_428_800, allowedMimeTypes: [...] }`
          - Apply RLS policies (SELECT + DELETE tied to auth.jwt()->>'shop_id')
          - Use try/catch — if bucket already exists, log and continue
          - Log success/skip for each operation

          ### 9. Unit Tests

          Write unit tests for all three classes. Mock `@supabase/ssr` at module level.
          Test coverage targets: 80% on infrastructure layer.

          Key test cases:
          - SupabaseStorageProvider: each of the 6 methods — happy path + error from SDK
          - RenditionService: Sharp-native → thumb+preview generated; PDF → pending returned; SVG handled
          - FileUploadService.createPresignedUploadUrl: isDuplicate=true short-circuit; MIME validation error; size validation error; happy path
          - FileUploadService.confirmUpload: ready path (PNG); pending path (PDF)
          - FileUploadService.deleteFile: delegates to provider.delete

          ## Coding Standards

          - Use `type` not `interface` (CLAUDE.md)
          - Use logger from @shared/lib/logger — no console.log
          - No hardcoded env vars — use process.env.* with server-only guard
          - Add 'server-only' import guard to provider and service files (they use Supabase admin SDK)
          - Code against IStorageProvider in FileUploadService — constructor takes IStorageProvider

          ## Workspace Documentation

          Before finalizing, commit implementation notes to:
            docs/workspace/20260302-h2-file-upload/h2-infra-notes.md

          Include:
          - Any Supabase SDK quirks discovered
          - Sharp import/native binding notes (if any)
          - Decision on mimeType propagation through confirmUpload (needs to be passed in or parsed from path)
          - Test mocking strategy for Supabase SDK

          ## Completion

          Use build-session-protocol skill when done. PR title: "feat(h2): storage foundation — IStorageProvider + FileUploadService + RenditionService"

