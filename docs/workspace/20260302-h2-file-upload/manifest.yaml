          ### 2. Upload Modal (src/features/artwork/components/upload-modal.tsx) — NEW FILE

          A Dialog (shadcn/ui) with 6 mutually exclusive states. Use Lucide icons only.
          Design tokens: bg-elevated for modal surface, bg-surface for dropzone, text-action for
          progress fill, text-muted-foreground for secondary info.

          States:
          - `idle/hashing`: Dropzone with dashed border (border-border). File name + size shown below.
          - `uploading`: Progress bar (div with bg-action, animated width). Show percentage.
          - `processing`: "Generating previews..." + two shimmer bars (skeleton).
          - `success`: Thumbnail image (thumbUrl || placeholder) + filename + "Upload complete" + Done button.
          - `error`: Error icon (AlertCircle, Lucide) + message + "Try Again" button.
          - `duplicate`: "This artwork already exists" + path + Close button.

          Props:
          ```typescript
          type UploadModalProps = {
            open: boolean
            onOpenChange: (open: boolean) => void
            shopId: string
            onSuccess: (version: ArtworkVersion) => void
          }
          ```

          When `onSuccess` is called (state.phase === 'success'), pass the version up to parent.
          Parent calls `router.refresh()` to reload the artwork grid.

          File dropzone: `<input type="file" accept="image/*,application/pdf" onChange={...} />`
          Also support drag-and-drop via `onDrop` on the dropzone div.

