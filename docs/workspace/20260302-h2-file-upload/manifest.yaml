          export { insertVersion, findVersionByContentHash } from './_providers/supabase/artworks'
          ```

          ### 5. Server Actions (src/features/artwork/actions/upload.action.ts) — NEW FILE

          Two server actions. Both marked `'use server'`. Both call `verifySession()` first.

          ```typescript
          'use server'
          import { verifySession } from '@infra/auth/session'
          import { fileUploadService, UploadValidationError } from '@infra/storage'
          import { insertVersion, findVersionByContentHash } from '@infra/repositories/artworks'

          export async function initiateUpload(input: {
            entity: string; shopId: string; filename: string
            mimeType: string; sizeBytes: number; contentHash: string
          }) {
            const session = await verifySession()
            // confirm shopId matches session — prevent cross-shop attacks
            if (input.shopId !== session.shopId) throw new Error('Unauthorized')

            const existing = await findVersionByContentHash(session.shopId, input.contentHash)
            const isDuplicate = existing !== null

            return fileUploadService.createPresignedUploadUrl({
              ...input,
              isDuplicate,
            })
          }

          export async function confirmArtworkUpload(input: { path: string; contentHash: string; mimeType: string }) {
            const session = await verifySession()

            const result = await fileUploadService.confirmUpload(input)

            const version = await insertVersion({
              shopId: session.shopId,
              contentHash: input.contentHash,
              originalPath: input.path,
              originalUrl: result.originalUrl,
              thumbUrl: result.thumbUrl,
              previewUrl: result.previewUrl,
              status: result.status,
              filename: input.path.split('/').pop() ?? 'unknown',
              mimeType: input.mimeType,
              sizeBytes: 0, // size already validated by H2 at initiate time
            })

            return version
          }
          ```

          Note: `mimeType` must be threaded through from client to `confirmArtworkUpload` so H2
          can pass it to RenditionService for format detection. This is a key interface detail —
          document it in your notes.

