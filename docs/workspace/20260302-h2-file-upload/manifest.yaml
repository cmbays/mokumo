          const confirmArtworkUpload = async (_: unknown): Promise<ArtworkVersion> => ({ id: '', shopId: '', status: 'ready', originalUrl: '', thumbUrl: null, previewUrl: null, filename: '', mimeType: '', sizeBytes: 0, contentHash: '', originalPath: '', createdAt: new Date(), updatedAt: new Date() })
