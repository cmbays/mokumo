language: rust
stack: backend
env:
  CARGO_TERM_COLOR: always
fileGroups:
  sources:
  - src/**/*
  - Cargo.toml
  - /Cargo.toml
  - /Cargo.lock
  migrations:
  - /crates/db/src/migration/**/*
  allRust:
  - /crates/*/src/**/*
  - /crates/*/Cargo.toml
  - src/**/*
  - Cargo.toml
  - /Cargo.toml
  - /Cargo.lock
tasks:
  build:
    command: cargo build --package mokumo-api
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  dev:
    command: cargo run --package mokumo-api
    deps:
    - web:build
    options:
      cache: false
      persistent: true
      outputStyle: stream
      runFromWorkspaceRoot: true
  test:
    command: cargo nextest run --profile ci --workspace --exclude mokumo-desktop
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    - /crates/*/tests/**/*
    - tests/**/*.rs
    options:
      runFromWorkspaceRoot: true
  test-bdd:
    command: cargo test --package mokumo-api --test bdd --features bdd
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    - tests/**/*.rs
    - tests/features/**/*.feature
    options:
      runFromWorkspaceRoot: true
  coverage:
    # --lib: unit tests only. Integration/BDD coverage excluded intentionally at M0.
    # Add --tests when domain logic in crates/core/ warrants full-stack coverage.
    command: cargo llvm-cov nextest --lib --workspace --exclude mokumo-desktop --json --output-path coverage.json
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  coverage-report:
    # Standalone alternative to `coverage` — re-runs tests with instrumentation.
    # Keep command flags in sync with `coverage` above.
    command: cargo llvm-cov nextest --lib --workspace --exclude mokumo-desktop --html --output-dir coverage/rust
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  lint:
    command: cargo clippy --workspace --exclude mokumo-desktop --all-targets -- -D warnings
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  fmt:
    command: cargo fmt --all --check
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  fmt-write:
    command: cargo fmt --all
    options:
      cache: false
      runFromWorkspaceRoot: true
  gen-types:
    command: cargo test --package mokumo-types -- export_bindings
    env:
      TS_RS_EXPORT_DIR: apps/web/src/lib/types
    inputs:
    - /crates/types/src/**/*
    - /crates/types/Cargo.toml
    outputs:
    - /apps/web/src/lib/types/
    options:
      runFromWorkspaceRoot: true
  db-prepare:
    command: cargo sqlx prepare --workspace
    inputs:
    - '@group(allRust)'
    - '@group(migrations)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  mutate:
    command: cargo mutants --workspace
    options:
      cache: false
      runFromWorkspaceRoot: true
  entity-check:
    command: cargo test --package mokumo-db --test entity_drift
    inputs:
    - '@group(allRust)'
    - '@group(migrations)'
    - /crates/*/tests/**/*
    options:
      runFromWorkspaceRoot: true
  bindings-check:
    deps:
    - web:build
    script: |
      set -euo pipefail
      TEMP_BINDINGS="$(mktemp -d)"
      trap 'rm -rf "$TEMP_BINDINGS"' EXIT

      TS_RS_EXPORT_DIR="$TEMP_BINDINGS" cargo test --workspace --exclude mokumo-desktop

      # Format generated files so diff ignores stylistic differences (oxfmt vs ts-rs)
      npx oxfmt "$TEMP_BINDINGS"/*.ts 2>/dev/null || true
      npx oxfmt apps/web/src/lib/types/*.ts 2>/dev/null || true

      diff -ru apps/web/src/lib/types/ "$TEMP_BINDINGS/"
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
