language: rust
stack: backend
env:
  CARGO_TERM_COLOR: always
fileGroups:
  sources:
  - src/**/*
  - Cargo.toml
  - /Cargo.toml
  - /Cargo.lock
  migrations:
  - /crates/db/migrations/**/*
  allRust:
  - /crates/*/src/**/*
  - /crates/*/Cargo.toml
  - src/**/*
  - Cargo.toml
  - /Cargo.toml
  - /Cargo.lock
tasks:
  build:
    command: cargo build --package mokumo-api
    deps:
    - web:build
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  dev:
    command: cargo run --package mokumo-api
    deps:
    - web:build
    options:
      cache: false
      persistent: true
      outputStyle: stream
      runFromWorkspaceRoot: true
  test:
    command: cargo nextest run --profile ci --workspace --exclude mokumo-desktop
    inputs:
    - '@group(allRust)'
    - /crates/*/tests/**/*
    - tests/**/*.rs
    options:
      runFromWorkspaceRoot: true
  test-bdd:
    command: cargo test --package mokumo-api --test bdd --features bdd
    inputs:
    - '@group(allRust)'
    - tests/**/*.rs
    - tests/features/**/*.feature
    options:
      runFromWorkspaceRoot: true
  coverage:
    # --lib: unit tests only. Integration/BDD coverage excluded intentionally at M0.
    # Add --tests when domain logic in crates/core/ warrants full-stack coverage.
    command: cargo llvm-cov nextest --lib --workspace --exclude mokumo-desktop --json --output-path coverage.json
    inputs:
    - '@group(allRust)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  lint:
    command: cargo clippy --workspace --exclude mokumo-desktop --all-targets -- -D warnings
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  fmt:
    command: cargo fmt --all --check
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
  fmt-write:
    command: cargo fmt --all
    options:
      cache: false
      runFromWorkspaceRoot: true
  gen-types:
    command: cargo test --package mokumo-types -- export_bindings
    env:
      TS_RS_EXPORT_DIR: apps/web/src/lib/types
    inputs:
    - /crates/types/src/**/*
    - /crates/types/Cargo.toml
    outputs:
    - /apps/web/src/lib/types/
    options:
      runFromWorkspaceRoot: true
  db-prepare:
    command: cargo sqlx prepare --workspace
    inputs:
    - '@group(allRust)'
    - '@group(migrations)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  mutate:
    command: cargo mutants --test-tool nextest --workspace --exclude mokumo-desktop
    options:
      cache: false
      runFromWorkspaceRoot: true
  bindings-check:
    script: "cargo test --workspace --exclude mokumo-desktop && git add apps/web/src/lib/types/ && git diff --cached --exit-code apps/web/src/lib/types/"
    env:
      TS_RS_EXPORT_DIR: apps/web/src/lib/types
    inputs:
    - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true
