language: 'rust'
stack: 'backend'

env:
  CARGO_TERM_COLOR: 'always'

fileGroups:
  sources:
    - 'src/**/*'
    - 'Cargo.toml'
    - '/Cargo.toml'
    - '/Cargo.lock'
  migrations:
    - '/crates/db/migrations/**/*'
  allRust:
    - '/crates/*/src/**/*'
    - '/crates/*/Cargo.toml'
    - 'src/**/*'
    - 'Cargo.toml'
    - '/Cargo.toml'
    - '/Cargo.lock'

tasks:
  build:
    command: 'cargo build --package mokumo-api'
    inputs:
      - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true

  dev:
    command: 'cargo run --package mokumo-api'
    deps:
      - 'web:build'
    options:
      cache: false
      persistent: true
      outputStyle: 'stream'
      runFromWorkspaceRoot: true

  test:
    command: 'cargo test --workspace'
    inputs:
      - '@group(allRust)'
      - '/crates/*/tests/**/*'
    options:
      runFromWorkspaceRoot: true

  lint:
    command: 'cargo clippy --workspace --all-targets -- -D warnings'
    inputs:
      - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true

  fmt:
    command: 'cargo fmt --all --check'
    inputs:
      - '@group(allRust)'
    options:
      runFromWorkspaceRoot: true

  fmt-write:
    command: 'cargo fmt --all'
    options:
      cache: false
      runFromWorkspaceRoot: true

  gen-types:
    command: 'cargo test --package mokumo-types -- export_bindings'
    env:
      TS_RS_EXPORT_DIR: '../../apps/web/src/lib/types'
    inputs:
      - '/crates/types/src/**/*'
      - '/crates/types/Cargo.toml'
    outputs:
      - '/apps/web/src/lib/types/'
    options:
      runFromWorkspaceRoot: true

  db-prepare:
    command: 'cargo sqlx prepare --workspace'
    inputs:
      - '@group(allRust)'
      - '@group(migrations)'
    options:
      cache: false
      runFromWorkspaceRoot: true
