# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check
# CI: runs in the security job of .github/workflows/quality.yml

[graph]
# Pulls Tauri + platform-specific system deps that vary by host OS and are
# checked separately in the desktop-e2e job.
# adr: docs/adr/adr-coverage-exclusions.md — Tauri-specific deps live in mokumo-desktop only
exclude = ["mokumo-desktop"]

# ──────────────────────────────────────────────────────────────────────
# Advisories — deny crates with known vulnerabilities
# ──────────────────────────────────────────────────────────────────────
[advisories]
# Check workspace crates for unmaintained advisories (vulnerabilities are
# always denied by default in cargo-deny 0.16+).
unmaintained = "workspace"
ignore = []

# ──────────────────────────────────────────────────────────────────────
# Licenses — BSL-1.1 project; only permissive deps allowed
# ──────────────────────────────────────────────────────────────────────
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",          # Boost — permissive, not Business Source License
    "OpenSSL",
    "MPL-2.0",          # Weak copyleft — compatible with BSL-1.1 binary distribution
    "bzip2-1.0.6",      # bzip2 permissive license (pulled in by zip 8.x bzip2 compression support)
    "0BSD",             # BSD Zero Clause — quoted_printable via lettre
    "CDLA-Permissive-2.0", # Community Data License Agreement Permissive 2.0 — webpki-roots
]

# Our workspace crates are BUSL-1.1 — allow them explicitly without
# adding BUSL-1.1 to the global allow list.
exceptions = [
    { allow = ["BUSL-1.1"], crate = "kikan-types" },
    # kikan platform + mokumo-shop vertical (Stage 0 stubs; kikan license to revisit at Phase 2)
    { allow = ["BUSL-1.1"], crate = "kikan" },
    { allow = ["BUSL-1.1"], crate = "kikan-tauri" },
    { allow = ["BUSL-1.1"], crate = "kikan-socket" },
    { allow = ["BUSL-1.1"], crate = "kikan-cli" },
    { allow = ["BUSL-1.1"], crate = "mokumo-shop" },
    { allow = ["BUSL-1.1"], crate = "kikan-spa-sveltekit" },
    { allow = ["BUSL-1.1"], crate = "kikan-admin-ui" },
    { allow = ["BUSL-1.1"], crate = "mokumo-server" },
    { allow = ["BUSL-1.1"], crate = "kikan-events" },
    { allow = ["BUSL-1.1"], crate = "kikan-mail" },
    { allow = ["BUSL-1.1"], crate = "kikan-scheduler" },
    { allow = ["BUSL-1.1"], crate = "scorecard" },
    { allow = ["BUSL-1.1"], crate = "docs-gen" },
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ──────────────────────────────────────────────────────────────────────
# Bans — duplicate version control
# ──────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "allow"        # workspace path deps use wildcards by convention

# Note: kikan workspace boundary invariants (I1, I4) are enforced by
# scripts/check-i*.sh, not by cargo-deny `bans.deny`. cargo-deny `wrappers`
# semantics are "ban this crate UNLESS direct parent is in the list" — the
# inverse of "ban this edge ONLY when consumer is X" that we need. See
# scripts/check-i1-domain-purity.sh and scripts/check-i4-dag.sh.

# ──────────────────────────────────────────────────────────────────────
# Sources — supply chain protection
# ──────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
