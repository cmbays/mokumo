# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run locally: cargo deny check
# CI: runs in the security job of .github/workflows/quality.yml

[graph]
# Match the workspace — exclude desktop (Tauri) for now since it pulls
# platform-specific deps that may need separate allow-listing.
exclude = ["mokumo-desktop"]

# ──────────────────────────────────────────────────────────────────────
# Advisories — deny crates with known vulnerabilities
# ──────────────────────────────────────────────────────────────────────
[advisories]
# Fail on any crate with a known advisory in the RustSec database.
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

# ──────────────────────────────────────────────────────────────────────
# Licenses — BSL-1.1 project; only permissive deps allowed
# ──────────────────────────────────────────────────────────────────────
[licenses]
unlicensed = "deny"
default = "deny"

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",          # Boost — permissive, not Business Source License
    "OpenSSL",
    "MPL-2.0",          # Weak copyleft — compatible with BSL-1.1 binary distribution
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ──────────────────────────────────────────────────────────────────────
# Bans — duplicate version control
# ──────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "allow"

# ──────────────────────────────────────────────────────────────────────
# Sources — supply chain protection
# ──────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
