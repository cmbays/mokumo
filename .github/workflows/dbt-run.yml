name: dbt Run

on:
  # Daily refresh — keeps marts tables current
  schedule:
    - cron: '0 6 * * *'

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      target:
        description: 'dbt target (dev or prod)'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

  # Callable from other workflows (e.g., post-sync trigger)
  workflow_call:
    inputs:
      target:
        description: 'dbt target (dev or prod)'
        required: false
        default: 'prod'
        type: string
    secrets:
      SUPABASE_DB_HOST:
        required: true
      SUPABASE_DB_USER:
        required: true
      SUPABASE_DB_PASSWORD:
        required: true

jobs:
  dbt:
    runs-on: ubuntu-latest

    env:
      # Session-mode pooler (port 5432) — direct connection is IPv6-only on this project,
      # which GitHub Actions Azure runners cannot reach. Session mode is dbt-compatible
      # (full session state preserved). NOT transaction mode (port 6543) — breaks dbt.
      DBT_PG_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      DBT_PG_PORT: '5432'
      DBT_PG_USER: ${{ secrets.SUPABASE_DB_USER }}
      DBT_PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DBT_PG_DATABASE: postgres
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
      DBT_TARGET: ${{ inputs.target || 'prod' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'dbt/uv.lock'

      - name: Set up Python
        run: uv python install

      - name: Install Python dependencies
        working-directory: dbt
        run: uv sync --frozen

      - name: Create profiles.yml from example
        working-directory: dbt
        run: cp profiles/profiles.yml.example profiles/profiles.yml

      - name: Install dbt packages
        working-directory: dbt
        run: uv run dbt deps

      - name: Resolve host to IPv4 and set PGHOSTADDR (Azure runners lack IPv6 routing)
        run: |
          echo "All DNS addresses for host:"
          python3 -c "import socket,os; [print('  '+r[0].name+': '+r[4][0]) for r in socket.getaddrinfo(os.environ['DBT_PG_HOST'],5432)]" 2>&1 || echo "  (getaddrinfo failed)"
          IPV4=$(python3 -c "import socket,os; print(socket.getaddrinfo(os.environ['DBT_PG_HOST'],5432,socket.AF_INET)[0][4][0])" 2>/dev/null || true)
          if [ -z "$IPV4" ]; then
            echo "::error::Host has no IPv4 address. GitHub Actions Azure runners have no IPv6 routing. Use the Supabase session-mode pooler or enable the Supabase IPv4 add-on."
            exit 1
          fi
          echo "Setting PGHOSTADDR=$IPV4"
          echo "PGHOSTADDR=$IPV4" >> "$GITHUB_ENV"

      - name: Verify dbt connection
        working-directory: dbt
        run: uv run dbt debug --target "$DBT_TARGET"

      - name: Seed reference data
        working-directory: dbt
        run: uv run dbt seed --target "$DBT_TARGET"

      - name: Run dbt models
        working-directory: dbt
        # Excludes stg_ss_activewear__pricing and 4 downstream models until the
        # S&S sync pipeline (issue #165) populates raw.ss_activewear_products.
        # Remove the --exclude flag once the sync is live.
        run: uv run dbt run --exclude source:ss_activewear+ --target "$DBT_TARGET"

      - name: Run dbt tests
        working-directory: dbt
        # Mirror the --exclude from dbt run — don't test models that weren't built.
        run: uv run dbt test --exclude source:ss_activewear+ --target "$DBT_TARGET"

      - name: Run dbt snapshots
        working-directory: dbt
        # snp_supplier_pricing depends on int_supplier_pricing__conformed which
        # is excluded until the S&S sync pipeline (issue #165) is live.
        run: uv run dbt snapshot --exclude snp_supplier_pricing --target "$DBT_TARGET"

      - name: Cache manifest for Slim CI
        if: success()
        run: |
          mkdir -p dbt/prod-manifest
          cp dbt/target/manifest.json dbt/prod-manifest/manifest.json

      - name: Save production manifest
        if: success()
        uses: actions/cache/save@v4
        with:
          path: dbt/prod-manifest
          key: dbt-prod-manifest-${{ github.sha }}
