name: Quality Loop
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.6.5"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest,cargo-llvm-cov
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint + format
        run: moon run api:lint api:fmt
      - name: Unit + integration tests
        run: moon run api:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      - name: BDD acceptance tests
        run: moon run api:test-bdd
      - name: Coverage
        run: moon run api:coverage

  quality-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.6.5"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (oxlint)
        run: moon run web:lint
      - name: Format check (oxfmt + prettier)
        run: moon run web:fmt
      - name: Type check (svelte-check)
        run: moon run web:check
      - name: Tests with coverage
        run: moon run web:test-coverage
      - name: Architecture constraints
        run: moon run web:depcruise

  mutation-ts:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.6.5"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Mutation testing (Stryker)
        run: moon run web:test-mutation

  seam-check:
    runs-on: ubuntu-latest
    needs: [quality-rust]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.6.5"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify ts-rs bindings in sync
        run: moon run api:bindings-check

  verdict:
    if: always()
    runs-on: ubuntu-latest
    needs: [quality-rust, quality-ts, seam-check]
    steps:
      - name: Check upstream results
        run: |
          if [ "${{ needs.quality-rust.result }}" != "success" ] || \
             [ "${{ needs.quality-ts.result }}" != "success" ] || \
             [ "${{ needs.seam-check.result }}" != "success" ]; then
            echo "One or more quality gates failed"
            exit 1
          fi
          echo "All quality gates passed"
