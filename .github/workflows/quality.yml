name: Quality Loop
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest,cargo-llvm-cov
      - name: Lint + format
        run: moon run api:lint api:fmt
      - name: Unit + integration tests
        run: moon run api:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      - name: BDD acceptance tests
        run: moon run api:test-bdd
      - name: Coverage
        run: moon run api:coverage

  quality-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-toolchain@v0
        # Moon auto-provisions Node 22.14.0 + pnpm 10.6.5 via proto
        # from .moon/toolchains.yml on first task run
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint + format + check
        run: moon run web:check
      - name: Tests
        run: moon run web:test

  seam-check:
    runs-on: ubuntu-latest
    needs: [quality-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
      - name: Verify ts-rs bindings in sync
        run: moon run api:bindings-check

  verdict:
    if: always()
    runs-on: ubuntu-latest
    needs: [quality-rust, quality-ts, seam-check]
    steps:
      - name: Check upstream results
        run: |
          if [ "${{ needs.quality-rust.result }}" != "success" ] || \
             [ "${{ needs.quality-ts.result }}" != "success" ] || \
             [ "${{ needs.seam-check.result }}" != "success" ]; then
            echo "One or more quality gates failed"
            exit 1
          fi
          echo "All quality gates passed"
