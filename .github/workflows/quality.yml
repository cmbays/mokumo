name: Quality Loop
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      tooling: ${{ steps.filter.outputs.tooling }}
      smoke: ${{ steps.filter.outputs.smoke }}
      mokumo-desktop: ${{ steps.filter.outputs.mokumo-desktop }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'services/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'crap4rs.toml'
            smoke:
              - 'tests/api/**'
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.prettierrc'
              - '.oxlintrc.json'
              - '.oxfmtrc.json'
            tooling:
              - 'tools/**'
            mokumo-desktop:
              - 'apps/mokumo-desktop/**'
              - 'tests/desktop/**'
              - 'apps/web/**'
              - 'crates/**'
              - 'services/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  lint-rust:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint + format
        run: moon run api:lint api:fmt

  test-rust:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit + integration tests
        run: moon run api:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      - name: BDD acceptance tests
        run: moon run api:test-bdd core:test-bdd

  coverage-rust:
    needs: [changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest,cargo-llvm-cov
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Coverage
        run: moon run api:coverage
      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage.json
          if-no-files-found: ignore

  quality-ts:
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (oxlint)
        run: moon run web:lint
      - name: Format check (oxfmt + prettier)
        run: moon run web:fmt
      - name: Type check (svelte-check)
        run: moon run web:check
      - name: Tests with coverage
        run: moon run web:test-coverage
      - name: Architecture constraints
        run: moon run web:depcruise

  test-storybook:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @mokumo/web exec playwright install --with-deps chromium
      - name: Storybook BDD tests
        run: moon run web:test-storybook
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  mutation-ts:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Mutation testing (Stryker)
        run: moon run web:test-mutation

  bdd-lint:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.tooling == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: BDD staleness lint
        run: moon run bdd-lint:check-staleness
      - name: BDD lint unit tests
        run: cd tools/bdd-lint && pnpm test

  demo-smoke:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Build API server
        run: moon run api:build
      - name: Run seed script
        run: moon run web:seed-demo
      - name: Verify demo.db exists
        run: test -f apps/web/scripts/demo.db
      - name: Verify customer count
        run: |
          count=$(sqlite3 apps/web/scripts/demo.db "SELECT COUNT(*) FROM customers")
          echo "Customer count: $count"
          [ "$count" -ge 25 ] || (echo "FAIL: Expected >= 25 customers, got $count" && exit 1)
      - name: Verify setup_mode
        run: |
          mode=$(sqlite3 apps/web/scripts/demo.db "SELECT value FROM settings WHERE key='setup_mode'")
          echo "Setup mode: $mode"
          [ "$mode" = "demo" ] || (echo "FAIL: Expected setup_mode=demo, got $mode" && exit 1)
      - name: Verify activity log
        run: |
          activities=$(sqlite3 apps/web/scripts/demo.db "SELECT COUNT(*) FROM activity_log")
          echo "Activity entries: $activities"
          [ "$activities" -gt 0 ] || (echo "FAIL: Expected activity_log > 0, got $activities" && exit 1)
      - name: Verify journal mode
        run: |
          journal=$(sqlite3 apps/web/scripts/demo.db "PRAGMA journal_mode")
          echo "Journal mode: $journal"
          [ "$journal" = "delete" ] || (echo "FAIL: Expected journal_mode=delete, got $journal" && exit 1)
      - name: Upload demo database
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: demo-db
          path: apps/web/scripts/demo.db
          if-no-files-found: warn

  crap-rust:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest,cargo-llvm-cov,crap4rs
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: CRAP quality gate
        run: moon run api:crap
      - name: Upload LCOV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crap-lcov
          path: tmp/lcov.info
          if-no-files-found: ignore

  api-smoke:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.smoke == 'true')
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Install hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/7.1.0/hurl_7.1.0_amd64.deb
          sudo dpkg -i hurl_7.1.0_amd64.deb
      - name: Build API server
        run: moon run api:build
      - name: Start server and run smoke tests
        run: |
          cp tests/api/envs/ci.env.example tests/api/envs/ci.env
          target/debug/mokumo-api &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6565/api/health > /dev/null 2>&1; then break; fi
            sleep 1
          done
          # Cold-start suite only: server boots in setup-required mode (no admin user),
          # so all routes except health and login return 503 until setup is complete.
          # Authenticated + post-setup tests (me-unauthenticated, not-found, list-unauthenticated)
          # are deferred to the api:smoke-authed task once seed credentials are stable.
          hurl --variables-file tests/api/envs/ci.env --test \
            tests/api/health/health.hurl \
            tests/api/auth/login-bad-credentials.hurl

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo-deny check
        run: cargo deny check
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high

  seam-check:
    needs: [changes, test-rust]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify ts-rs bindings in sync
        run: moon run api:bindings-check
      - name: Verify entity-schema alignment
        run: moon run api:entity-check

  desktop-e2e:
    needs: [changes]
    if: needs.changes.outputs.mokumo-desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true  # New — not blocking verdict until stabilized
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Moon needs git history for VCS-based change detection
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: tauri-driver
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mokumo-rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install Linux display + WebKitGTK deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb \
            at-spi2-core
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Build SvelteKit frontend
        run: moon run web:build
      - name: Create demo.db placeholder
        shell: python
        run: |
          import os, sqlite3
          os.makedirs("apps/web/scripts", exist_ok=True)
          conn = sqlite3.connect("apps/web/scripts/demo.db")
          conn.execute("SELECT 1")
          conn.close()
      - name: Build Tauri app (debug)
        run: moon run mokumo-desktop:build-debug
      - name: Run desktop E2E tests
        run: xvfb-run --auto-servernum moon run desktop-tests:test

  verdict:
    if: always()
    runs-on: ubuntu-latest
    needs: [changes, lint-rust, test-rust, quality-ts, seam-check, demo-smoke, crap-rust, api-smoke, security, secret-scan, bdd-lint, test-storybook]
    steps:
      - name: Check upstream results
        env:
          LINT_RUST: ${{ needs.lint-rust.result }}
          TEST_RUST: ${{ needs.test-rust.result }}
          QUALITY_TS: ${{ needs.quality-ts.result }}
          SEAM_CHECK: ${{ needs.seam-check.result }}
          DEMO_SMOKE: ${{ needs.demo-smoke.result }}
          CRAP_RUST: ${{ needs.crap-rust.result }}
          API_SMOKE: ${{ needs.api-smoke.result }}
          SECURITY: ${{ needs.security.result }}
          SECRET_SCAN: ${{ needs.secret-scan.result }}
          BDD_LINT: ${{ needs.bdd-lint.result }}
          TEST_STORYBOOK: ${{ needs.test-storybook.result }}
        run: |
          # Jobs that were skipped due to path filtering are fine
          for job in LINT_RUST TEST_RUST QUALITY_TS SEAM_CHECK DEMO_SMOKE CRAP_RUST API_SMOKE SECURITY SECRET_SCAN BDD_LINT TEST_STORYBOOK; do
            result=$(eval echo "\$$job")
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Job $job failed with result: $result"
              exit 1
            fi
          done
          echo "All quality gates passed (skipped jobs are OK)"
