name: Quality Loop
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      tooling: ${{ steps.filter.outputs.tooling }}
      smoke: ${{ steps.filter.outputs.smoke }}
      mokumo-desktop: ${{ steps.filter.outputs.mokumo-desktop }}
      kikan: ${{ steps.filter.outputs.kikan }}
      kikan-admin-ui: ${{ steps.filter.outputs.kikan-admin-ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'apps/mokumo-server/**'
              - 'apps/mokumo-desktop/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'crap4rs.toml'
              - '.github/workflows/quality.yml'
            kikan:
              - 'crates/kikan/**'
              - 'crates/kikan-*/**'
              - 'crates/mokumo-shop/**'
              - 'apps/mokumo-server/**'
              - 'apps/mokumo-desktop/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'scripts/check-i*.sh'
              - 'scripts/check-no-hurl-in-workflows.sh'
              - 'scripts/check-route-coverage.sh'
              - 'scripts/check-docs-paired-files.sh'
              - 'scripts/lib/**'
              - 'scripts/test/**'
              - '.github/workflows/quality.yml'
            smoke:
              - 'tests/api/**'
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.prettierrc'
              - '.oxlintrc.json'
              - '.oxfmtrc.json'
            kikan-admin-ui:
              - 'crates/kikan-admin-ui/frontend/**'
              - 'crates/kikan-admin-ui/moon.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/quality.yml'
            tooling:
              - 'tools/**'
            mokumo-desktop:
              - 'apps/mokumo-desktop/**'
              - 'tests/desktop/**'
              - 'apps/web/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  lint-rust:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint + format
        run: moon run shop:lint shop:fmt

  test-rust:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest@0.9.133
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit + integration tests
        run: moon run shop:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      - name: BDD acceptance tests
        run: moon run shop:test-bdd shop:test-bdd-api shop:test-platform-bdd

  coverage-rust:
    needs: [changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest@0.9.133,cargo-llvm-cov@0.8.5
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Coverage
        run: moon run shop:coverage
      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage.json
          if-no-files-found: ignore

  quality-ts:
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (oxlint)
        run: moon run web:lint
      - name: Format check (oxfmt + prettier)
        run: moon run web:fmt
      - name: Type check (svelte-check)
        run: moon run web:check
      - name: Tests with coverage
        run: moon run web:test-coverage
      - name: Architecture constraints
        run: moon run web:depcruise

  quality-kikan-admin-ui:
    needs: [changes]
    if: needs.changes.outputs.kikan-admin-ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Architecture constraints
        run: moon run kikan-admin-ui:frontend-depcruise

  test-storybook:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @mokumo/web exec playwright install --with-deps chromium
      - name: Storybook BDD tests
        run: moon run web:test-storybook
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  test-welcome-restore:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @mokumo/web exec playwright install --with-deps chromium
      - name: Welcome-restore BDD tests
        run: moon run web:test-welcome-restore
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: welcome-restore-playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  bdd-lint:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.tooling == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: BDD staleness lint
        run: moon run bdd-lint:check-staleness
      - name: BDD lint unit tests
        run: cd tools/bdd-lint && pnpm test

  demo-smoke:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Build server
        run: cargo build -p mokumo-server && moon run shop:build
      - name: Run seed script
        run: moon run web:seed-demo
      - name: Verify demo.db exists
        run: test -f apps/web/scripts/demo.db
      - name: Verify customer count
        run: |
          count=$(sqlite3 apps/web/scripts/demo.db "SELECT COUNT(*) FROM customers")
          echo "Customer count: $count"
          [ "$count" -ge 25 ] || (echo "FAIL: Expected >= 25 customers, got $count" && exit 1)
      - name: Verify setup_mode
        run: |
          mode=$(sqlite3 apps/web/scripts/demo.db "SELECT value FROM settings WHERE key='setup_mode'")
          echo "Setup mode: $mode"
          [ "$mode" = "demo" ] || (echo "FAIL: Expected setup_mode=demo, got $mode" && exit 1)
      - name: Verify activity log
        run: |
          activities=$(sqlite3 apps/web/scripts/demo.db "SELECT COUNT(*) FROM activity_log")
          echo "Activity entries: $activities"
          [ "$activities" -gt 0 ] || (echo "FAIL: Expected activity_log > 0, got $activities" && exit 1)
      - name: Verify journal mode
        run: |
          journal=$(sqlite3 apps/web/scripts/demo.db "PRAGMA journal_mode")
          echo "Journal mode: $journal"
          [ "$journal" = "delete" ] || (echo "FAIL: Expected journal_mode=delete, got $journal" && exit 1)
      - name: Upload demo database
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: demo-db
          path: apps/web/scripts/demo.db
          if-no-files-found: warn

  crap-rust:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest@0.9.133,cargo-llvm-cov@0.8.5,crap4rs@0.3.0
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: CRAP quality gate
        run: moon run shop:crap
      - name: Upload LCOV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crap-lcov
          path: tmp/lcov.info
          if-no-files-found: ignore

  crap-delta:
    # Per-session CRAP delta gate — fails if any function's CRAP score increased
    # on files changed by the PR. Complements `crap-rust` (threshold gate) by
    # preventing silent regressions under the strict-preset threshold.
    # Implements gh#569. Opt-in via the `ci:crap-delta` label — matches the
    # issue's original "refactor-heavy work" framing. Feature PRs with new
    # functions have no prior baseline, so the delta check is a false-positive
    # generator there; refactor/extraction PRs set the label to run it.
    needs: [changes]
    if: |
      github.event_name == 'pull_request'
      && needs.changes.outputs.rust == 'true'
      && contains(github.event.pull_request.labels.*.name, 'ci:crap-delta')
    runs-on: ubuntu-latest
    continue-on-error: true  # Stabilize first; promote via gh#569 follow-up after signal
    env:
      CARGO_TARGET_DIR: target
      PR_BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest@0.9.133,cargo-llvm-cov@0.8.5,crap4rs@0.3.0
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Build SvelteKit frontend (required by crap-rust task tree)
        run: moon run web:build
      - name: CRAP delta gate
        run: scripts/check-crap-delta.sh "origin/$PR_BASE_REF"

  crap-scorecard:
    # CRAP scorecard PR comment via the breezy-bays-labs/crap4rs scorecard
    # action. Posts a sticky comment with analysis + delta vs. the PR base.
    # Replaces the manual jq orchestration in `scripts/check-crap-delta.sh`
    # using crap4rs v0.2.1's native `--baseline` support.
    #
    # Runs on every Rust-touching PR — informational by default (no gate).
    # Once stable, fold this into mokumo#650's metrics-delta aggregator
    # comment by switching `comment-mode` from `sticky` to `none` and
    # consuming `steps.crap.outputs.markdown` from the aggregator job.
    #
    # Pinned to @main for now; pin to a SHA or release tag once the
    # action stabilizes. The future crap monorepo (ops#231) will give
    # the action a proper Marketplace listing with version tags.
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      CARGO_TARGET_DIR: target
      PR_BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          # crap4rs is needed on PATH for the "Capture baseline coverage"
          # step (it converts the base-ref's lcov to baseline.json before
          # the action runs). The scorecard action's pre-installed-binary
          # short-circuit (crap4rs ≥ 0.2.2) reuses this binary instead of
          # reinstalling, so a single binstall covers both call sites.
          bins: cargo-nextest@0.9.133,cargo-llvm-cov@0.8.5,crap4rs@0.3.0
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"

      - name: Install JS dependencies (HEAD)
        run: pnpm install --frozen-lockfile
      - name: Build SvelteKit frontend (HEAD)
        run: moon run web:build
      - name: Capture HEAD coverage
        # --exclude trio rationale: see docs/adr/adr-coverage-exclusions.md
        # --features scorecard/cli: without it llvm-cov reports 0% on every
        # cli-gated function in `crates/scorecard/src/aggregate.rs`, which
        # auto-fails their CRAP score even when unit tests exist. Mirrors
        # the rationale on the crap-rust task in crates/mokumo-shop/moon.yml.
        run: |
          mkdir -p tmp
          cargo llvm-cov nextest \
            --workspace \
            --exclude mokumo-desktop \
            --exclude kikan-tauri \
            --exclude kikan-admin-ui \
            --features scorecard/cli \
            --lcov --output-path tmp/lcov.info

      - name: Capture baseline coverage on PR base
        run: |
          set -euo pipefail
          mkdir -p tmp
          # GitHub Actions starts on a detached HEAD at the PR merge
          # commit, so `git switch -` after the base switch fails:
          # there's no "previous branch" to return to. Save the SHA and
          # restore via --detach.
          HEAD_SHA="$(git rev-parse HEAD)"
          git fetch --no-tags --depth=1000 origin "$PR_BASE_REF"
          git switch --detach "origin/$PR_BASE_REF"
          pnpm install --frozen-lockfile
          moon run web:build
          cargo llvm-cov nextest \
            --workspace \
            --exclude mokumo-desktop \
            --exclude kikan-tauri \
            --exclude kikan-admin-ui \
            --features scorecard/cli \
            --lcov --output-path tmp/base-lcov.info
          crap4rs \
            --coverage tmp/base-lcov.info \
            --src . \
            --config crap4rs.toml \
            --format json \
            --no-fail \
            > tmp/baseline.json
          # Return to HEAD so the action's `--src .` analyzes HEAD
          # source (syn walks the working tree). The HEAD lcov was
          # already captured in the previous step, so we only need
          # the source restored — pnpm install / web:build are not
          # required for the action step.
          git switch --detach "$HEAD_SHA"

      - name: Run scorecard action
        id: crap
        uses: breezy-bays-labs/crap4rs/.github/actions/scorecard@main
        with:
          coverage: tmp/lcov.info
          src: .
          baseline: tmp/baseline.json
          config: crap4rs.toml
          # mokumo's crap4rs.toml uses preset = "strict" (threshold 15);
          # passing 15 explicitly keeps the action consistent with the
          # config. Future: action could read from the config directly.
          threshold: '15'
          # Informational only during validation. Promote to true after
          # one sprint of clean signal — same stabilization playbook as
          # the original crap-delta job.
          delta-gate: 'false'
          comment-mode: 'sticky'
          comment-header: 'crap-scorecard'

      - name: Upload baseline JSON for downstream tooling
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crap-baseline
          path: tmp/baseline.json
          if-no-files-found: ignore

  api-smoke:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.smoke == 'true')
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Install hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/download/7.1.0/hurl_7.1.0_amd64.deb
          sudo dpkg -i hurl_7.1.0_amd64.deb
      # Single source of truth: shop:smoke owns the test list, server
      # bootstrap, and seed wiring. CI exists only to set up the environment
      # and invoke the task runner. The check-no-hurl-in-workflows.sh guard
      # enforces that workflow YAML contains no Hurl test path references
      # (mokumo#383).
      - name: Run smoke suite
        run: moon run shop:smoke

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo-deny check
        run: cargo deny check

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  seam-check:
    needs: [changes, test-rust]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify ts-rs bindings in sync
        run: moon run shop:bindings-check
      - name: Verify entity-schema alignment
        run: moon run shop:entity-check

  desktop-e2e:
    needs: [changes]
    if: needs.changes.outputs.mokumo-desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true  # New — not blocking verdict until stabilized
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Moon needs git history for VCS-based change detection
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: tauri-driver
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mokumo-rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install Linux display + WebKitGTK deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb \
            at-spi2-core
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Build SvelteKit frontend
        run: moon run web:build
      - name: Create demo.db placeholder
        shell: python
        run: |
          import os, sqlite3
          os.makedirs("apps/web/scripts", exist_ok=True)
          conn = sqlite3.connect("apps/web/scripts/demo.db")
          conn.execute("SELECT 1")
          conn.close()
      - name: Build Tauri app (debug)
        run: moon run mokumo-desktop:build-debug
      - name: Run desktop E2E tests
        run: xvfb-run --auto-servernum moon run desktop-tests:test

  kikan-invariants:
    needs: [changes]
    if: needs.changes.outputs.kikan == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          # G2 (route-coverage) needs `git diff origin/main...HEAD`, which
          # requires the merge-base to be reachable. Default depth=1 fetches
          # only the merge ref, so the merge-base lookup fails on PRs whose
          # branch heads aren't in local history.
          fetch-depth: 0
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep
      - name: shellcheck
        run: shellcheck -x --source-path=SCRIPTDIR scripts/check-i*.sh scripts/check-r13-action-strings.sh scripts/check-no-hurl-in-workflows.sh scripts/check-route-coverage.sh scripts/check-docs-paired-files.sh scripts/lib/rg-check.sh scripts/test/run-self-tests.sh
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Self-tests (script contracts)
        run: bash scripts/test/run-self-tests.sh
      - name: I1 — domain purity (source)
        run: bash scripts/check-i1-domain-purity.sh
      - name: I1 — vocabulary purity (kikan src)
        run: bash scripts/check-i1-vocabulary-purity.sh
      - name: I2 — adapter boundary (source)
        run: bash scripts/check-i2-adapter-boundary.sh
      - name: I2b — adapter boundary (Tauri type identifiers)
        run: bash scripts/check-i2b-tauri-type-ids.sh
      - name: I3 — headless server zero-tauri (deps)
        run: bash scripts/check-i3-headless.sh
      - name: I4 — dependency DAG
        run: bash scripts/check-i4-dag.sh
      - name: I5 — feature gate ownership
        run: bash scripts/check-i5-features.sh
      - name: R13 — shop-vertical action-string continuity
        run: bash scripts/check-r13-action-strings.sh
      - name: G1 — no Hurl path references in workflow YAML
        run: bash scripts/check-no-hurl-in-workflows.sh
      - name: G2 — new /api/ routes require sibling Hurl file
        if: github.event_name == 'pull_request'
        env:
          STRICT_BASE_REF: '1'
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git fetch origin "$PR_BASE_REF" --depth=50 --quiet
          BASE_REF="origin/$PR_BASE_REF" bash scripts/check-route-coverage.sh
      - name: kikan + kikan-spa-sveltekit compile without apps/web/build
        # Regression guard (plan #499 Deliverable 12): kikan stays
        # rust-embed-free per invariant I5, and the sister SPA primitive
        # `kikan-spa-sveltekit` also has no path into the SvelteKit tree.
        # Both must compile on a fresh checkout without `apps/web/build/`
        # existing — the SPA is built in a separate job path.
        # `--no-default-features` catches accidental unconditional deps
        # when kikan grows feature gates later.
        run: |
          test ! -e apps/web/build
          cargo check -p kikan --no-default-features
          cargo check -p kikan
          cargo check -p kikan-spa-sveltekit

  kikan-musl-build:
    needs: [changes]
    if: needs.changes.outputs.kikan == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust-musl"
          key: musl
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools
      - name: Build mokumo-server (musl)
        # rusqlite uses `bundled` so no system sqlite is needed.
        run: cargo build -p mokumo-server --release --target x86_64-unknown-linux-musl

  scorecard-aggregate:
    # V1 walking-skeleton scorecard producer (mokumo#763). Builds the
    # `aggregate` binary from `crates/scorecard`, writes a `pr-meta.json`
    # from the GitHub event payload, runs the producer, and uploads the
    # resulting `scorecard.json` as the `mokumo-scorecard-v0` artifact for
    # the cross-workflow `scorecard-comment.yml` renderer to pick up.
    #
    # The producer self-validates its output against the committed
    # `.config/scorecard/schema.json` before writing, so a Rust↔schema
    # drift fails this job and prevents a malformed artifact from ever
    # reaching the renderer.
    needs: [changes]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TARGET_DIR: target
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Build aggregate
        run: cargo build -p scorecard --features cli --release --bin aggregate
      - name: Write pr-meta.json
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          mkdir -p tmp
          # Values come from env vars (already validated/typed by the
          # GitHub Actions runner: PR_NUMBER is a number, SHAs are hex,
          # IS_FORK is a bool). No untrusted free-form text reaches this
          # JSON, so embedding via `${VAR}` is safe.
          printf '{\n  "pr_number": %s,\n  "head_sha": "%s",\n  "base_sha": "%s",\n  "is_fork": %s\n}\n' \
            "$PR_NUMBER" "$HEAD_SHA" "$BASE_SHA" "${IS_FORK:-false}" \
            > tmp/pr-meta.json
          cat tmp/pr-meta.json
      - name: Compute changed files
        # The base/head SHAs come from `github.event.pull_request.*`,
        # which GitHub's runner validates as hex SHAs — no untrusted
        # free-form text. Pass via env vars and quote shell expansions
        # to follow the workflow-injection prevention pattern.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p tmp
          git diff --name-only "$BASE_SHA"..."$HEAD_SHA" > tmp/changed-files.txt
          wc -l tmp/changed-files.txt
      - name: Run aggregate
        # V4 (mokumo#769) wires four real producers: BddSkipCount,
        # CiWallClockDelta, FlakyPopulation, and ChangedScopeDiagram.
        #
        # `--coverage-delta-pp 0.0` remains a placeholder until coverage
        # delta is wired to `cargo-llvm-cov` against the base branch.
        # `--ci-wall-clock-json` is intentionally omitted — wiring the
        # workflow to upload per-job durations is a follow-up against
        # #650 once the surface is exercised; meanwhile the row emits
        # Green with `(no base)`. `--quality-toml` defaults to
        # `.config/scorecard/quality.toml` so the configured-thresholds
        # path is exercised on every PR.
        run: |
          mkdir -p tmp
          ./target/release/aggregate \
            --pr-meta tmp/pr-meta.json \
            --coverage-delta-pp 0.0 \
            --bdd-features-root crates \
            --bdd-features-root apps/web/tests \
            --flaky-source-root crates \
            --flaky-source-root apps/web/src \
            --changed-files tmp/changed-files.txt \
            --out tmp/scorecard.json
          cat tmp/scorecard.json
      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: mokumo-scorecard-v0
          path: |
            tmp/scorecard.json
            tmp/pr-meta.json
            tmp/changed-files.txt
          retention-days: 7
          if-no-files-found: error

  scorecard-drift:
    # Cross-process complement to the in-process
    # `crates/scorecard/tests/schema_drift.rs` byte-identity test:
    # regenerates the committed wire schema (`.config/scorecard/schema.json`),
    # the operator schema (`.config/scorecard/quality.config.schema.json`),
    # and the renderer's `.github/scripts/scorecard/types.d.ts` from source,
    # then `git diff --exit-code` fails on any uncommitted drift. Catches
    # direct edits to any of those files that the path-filtered `test-rust`
    # job would otherwise skip. The renderer JSDoc `tsc --noEmit` locks the
    # renderer JS to the generated types; the trailing ajv-cli step closes
    # the loop on the operator config by validating the committed
    # `quality.toml` (after `tomllib` projects it to JSON) against the
    # operator schema. See ADR `decisions/mokumo/adr-scorecard-crate-shape.md`
    # for the full three-layer enforcement story.
    needs: [changes]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TARGET_DIR: target
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install renderer dependencies
        run: pnpm install --frozen-lockfile --filter @mokumo/scorecard-renderer...
      - name: Regenerate wire + operator schemas from Rust source
        run: cargo run -p scorecard --bin emit-schema
      - name: Assert .config/scorecard/schema.json is unchanged
        run: git diff --exit-code .config/scorecard/schema.json
      - name: Assert .config/scorecard/quality.config.schema.json is unchanged
        run: git diff --exit-code .config/scorecard/quality.config.schema.json
      - name: Regenerate renderer types from schema
        working-directory: .github/scripts/scorecard
        run: pnpm regen-types
      - name: Assert .github/scripts/scorecard/types.d.ts is unchanged
        run: git diff --exit-code .github/scripts/scorecard/types.d.ts
      - name: Renderer JSDoc type-check
        working-directory: .github/scripts/scorecard
        run: pnpm typecheck
      - name: Convert committed quality.toml to JSON for ajv
        run: |
          python3 - <<'PY' > /tmp/quality.config.json
          import sys, tomllib, json
          with open('.config/scorecard/quality.toml', 'rb') as f:
              data = tomllib.load(f)
          json.dump(data, sys.stdout)
          PY
      - name: Validate quality.toml against operator schema (ajv-cli)
        working-directory: .github/scripts/scorecard
        run: |
          pnpm dlx ajv-cli@5.0.0 validate \
            -s ../../../.config/scorecard/quality.config.schema.json \
            -d /tmp/quality.config.json

  docs-drift:
    # Regenerates AUTO-GEN doc sections via the `docs-gen` binary
    # (tools/docs-gen) and fails if any target file differs from HEAD.
    # See AGENTS.md §Synchronized-Docs for the source→target registry.
    # Shares the workspace rust-cache; cold runs cost ~30s, warm <2s.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Regenerate AUTO-GEN sections
        run: cargo run --quiet -p docs-gen
      - name: Assert README.md is unchanged
        run: git diff --exit-code README.md

  docs-paired-files:
    # Enforces AGENTS.md §Synchronized-Docs §B rules 2 + 3: every PR that
    # adds public crate surface (`pub fn`/`struct`/…) under mokumo-shop or
    # any of the 9 kikan-* satellites must also touch the matching glossary
    # (`LANGUAGE.md` or `crates/kikan/LANGUAGE.md`). See mokumo#776.
    #
    # Detection: bash + awk syntax-walk over the PR diff. `cargo public-api`
    # was considered and rejected: it requires a nightly toolchain on every
    # Rust-touching PR and only resolves the rename-with-re-export case,
    # which the `docs-not-applicable` opt-out label already covers.
    #
    # Semantic rules 1 (trust-boundary → SECURITY.md) and 4 (architectural
    # change → CONTEXT.md + ARCHITECTURE.md) have no diff signal and are
    # tracked separately under mokumo#781.
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.kikan == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the merge-base for `git diff origin/<base>...HEAD`. Default
          # depth=1 only fetches the merge ref, so the diff lookup fails on
          # PRs whose branch heads aren't in local history.
          fetch-depth: 0
      - name: Run docs-paired-files gate
        id: gate
        continue-on-error: true
        env:
          BASE_REF: origin/${{ github.base_ref }}
          STRICT_BASE_REF: '1'
          # GitHub Actions joins the labels array; the script's parser
          # handles both ' ' and ',' as separators. Comma is a safer choice
          # because GitHub label names can technically contain spaces.
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set +e
          git fetch origin "$GITHUB_BASE_REF" --depth=200 --quiet
          # Capture streams to files synchronously so the sticky-comment
          # step has a reliable input regardless of process-substitution
          # timing. Replay to the job log so the check view shows them too.
          bash scripts/check-docs-paired-files.sh > /tmp/gate.stdout 2> /tmp/gate.stderr
          rc=$?
          cat /tmp/gate.stdout
          cat /tmp/gate.stderr >&2
          exit "$rc"
      - name: Sticky comment with failure details
        # Always run on PRs so a passing PR can clear a stale failure
        # comment; only POSTS new comments on failure (avoids passing-noise
        # on PRs that never had a failure).
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          GATE_OUTCOME: ${{ steps.gate.outcome }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- docs-paired-files-sticky -->';
            const outcome = process.env.GATE_OUTCOME;
            const ruleUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/AGENTS.md#synchronized-docs`;

            let body;
            if (outcome === 'success') {
              body = [
                marker,
                '## docs-paired-files [PASS]',
                '',
                'Paired-files Synchronized-Docs rules (AGENTS.md §B 2 + 3) satisfied.',
              ].join('\n');
            } else {
              const err = fs.existsSync('/tmp/gate.stderr')
                ? fs.readFileSync('/tmp/gate.stderr', 'utf8')
                : '(no error output captured)';
              body = [
                marker,
                '## docs-paired-files [FAIL]',
                '',
                'This PR adds public crate surface without touching the matching glossary.',
                `See [AGENTS.md §Synchronized-Docs](${ruleUrl}) for the rule.`,
                '',
                '<details><summary>Gate output</summary>',
                '',
                '```',
                err.trim(),
                '```',
                '',
                '</details>',
              ].join('\n');
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              }
            );
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing && existing.body === body) {
              core.info('Sticky comment already up to date.');
              return;
            }
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated sticky comment ${existing.id}.`);
            } else if (outcome !== 'success') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new sticky comment.');
            } else {
              core.info('No prior sticky comment and gate passed; nothing to post.');
            }
      - name: Re-fail job if gate failed
        if: steps.gate.outcome == 'failure'
        run: |
          echo "::error::docs-paired-files gate failed; see sticky comment on PR for details"
          exit 1

  tools-pins:
    # Asserts every governed tool in `tools.toml` is pinned to the matching
    # version on every `bins:` line in `.github/workflows/*.yml`. T1 minimum
    # of the Warden pattern. See `tools.toml` and AGENTS.md §"Dep-graph and
    # verdict assertions".
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-tools-pins.sh

  verdict:
    # Aggregate gate. Adding a new upstream job is a one-line change: append it
    # to the `needs:` array. The check below iterates `toJSON(needs)` via jq, so
    # there is no env block or per-job branch to forget. See AGENTS.md
    # §"Dep-graph and verdict assertions" for the convention.
    if: always()
    runs-on: ubuntu-latest
    needs: [changes, lint-rust, test-rust, quality-ts, quality-kikan-admin-ui, seam-check, demo-smoke, crap-rust, api-smoke, security, dependency-review, secret-scan, bdd-lint, test-storybook, test-welcome-restore, kikan-invariants, kikan-musl-build, scorecard-aggregate, scorecard-drift, docs-drift, docs-paired-files, tools-pins]
    steps:
      - name: Check upstream results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          # `success` and `skipped` (path-filter skip) are both acceptable.
          # `cancelled`, `failure`, and anything else fail the verdict.
          failed=$(jq -r '
            to_entries
            | map(select(.value.result != "success" and .value.result != "skipped"))
            | .[]
            | "  - \(.key): \(.value.result)"
          ' <<<"$NEEDS_JSON")
          if [ -n "$failed" ]; then
            echo "::error::Quality gates failed:"
            echo "$failed"
            exit 1
          fi
          echo "All quality gates passed (skipped jobs are OK)"
