name: Quality Loop
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-toolchain@v1
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest,cargo-llvm-cov
      - name: Lint + format
        run: moon run api:lint api:fmt
      - name: Unit + integration tests
        run: moon run api:test
      - name: BDD acceptance tests
        run: moon run api:test-bdd
      - name: Coverage
        run: moon run api:coverage

  quality-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-toolchain@v1
      - name: Lint + format + check
        run: moon run web:check
      - name: Tests
        run: moon run web:test

  seam-check:
    runs-on: ubuntu-latest
    needs: [quality-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-toolchain@v1
      - uses: moonrepo/setup-rust@v1
      - name: Verify ts-rs bindings in sync
        run: moon run api:bindings-check

  verdict:
    runs-on: ubuntu-latest
    needs: [quality-rust, quality-ts, seam-check]
    steps:
      - run: echo "All quality gates passed"
