name: Quality Loop
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      tooling: ${{ steps.filter.outputs.tooling }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'services/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.prettierrc'
              - '.oxlintrc.json'
              - '.oxfmtrc.json'
            tooling:
              - 'tools/**'

  lint-rust:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint + format
        run: moon run api:lint api:fmt

  test-rust:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit + integration tests
        run: moon run api:test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore
      - name: BDD acceptance tests
        run: moon run api:test-bdd core:test-bdd

  coverage-rust:
    needs: [changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-nextest,cargo-llvm-cov
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Coverage
        run: moon run api:coverage
      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage.json
          if-no-files-found: ignore

  quality-ts:
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (oxlint)
        run: moon run web:lint
      - name: Format check (oxfmt + prettier)
        run: moon run web:fmt
      - name: Type check (svelte-check)
        run: moon run web:check
      - name: Tests with coverage
        run: moon run web:test-coverage
      - name: Architecture constraints
        run: moon run web:depcruise

  test-storybook:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @mokumo/web exec playwright install --with-deps chromium
      - name: Storybook BDD tests
        run: moon run web:test-storybook
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  mutation-ts:
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Mutation testing (Stryker)
        run: moon run web:test-mutation

  bdd-lint:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.tooling == 'true')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: BDD staleness lint
        run: moon run bdd-lint:check-staleness
      - name: BDD lint unit tests
        run: cd tools/bdd-lint && pnpm test

  demo-smoke:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Build API server
        run: moon run api:build
      - name: Run seed script
        run: moon run web:seed-demo
      - name: Verify demo.db exists
        run: test -f apps/web/scripts/demo.db
      - name: Verify customer count
        run: |
          count=$(sqlite3 apps/web/scripts/demo.db "SELECT COUNT(*) FROM customers")
          echo "Customer count: $count"
          [ "$count" -ge 25 ] || (echo "FAIL: Expected >= 25 customers, got $count" && exit 1)
      - name: Verify setup_mode
        run: |
          mode=$(sqlite3 apps/web/scripts/demo.db "SELECT value FROM settings WHERE key='setup_mode'")
          echo "Setup mode: $mode"
          [ "$mode" = "demo" ] || (echo "FAIL: Expected setup_mode=demo, got $mode" && exit 1)
      - name: Verify activity log
        run: |
          activities=$(sqlite3 apps/web/scripts/demo.db "SELECT COUNT(*) FROM activity_log")
          echo "Activity entries: $activities"
          [ "$activities" -gt 0 ] || (echo "FAIL: Expected activity_log > 0, got $activities" && exit 1)
      - name: Verify journal mode
        run: |
          journal=$(sqlite3 apps/web/scripts/demo.db "PRAGMA journal_mode")
          echo "Journal mode: $journal"
          [ "$journal" = "delete" ] || (echo "FAIL: Expected journal_mode=delete, got $journal" && exit 1)
      - name: Upload demo database
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: demo-db
          path: apps/web/scripts/demo.db
          if-no-files-found: warn

  seam-check:
    needs: [changes, test-rust]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target    # Override .cargo/config.toml's absolute path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: pnpm
      - uses: moonrepo/setup-toolchain@v0
      - uses: moonrepo/setup-rust@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mokumo-rust"
          save-if: "false"
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify ts-rs bindings in sync
        run: moon run api:bindings-check
      - name: Verify entity-schema alignment
        run: moon run api:entity-check

  verdict:
    if: always()
    runs-on: ubuntu-latest
    needs: [changes, lint-rust, test-rust, quality-ts, seam-check, demo-smoke]
    steps:
      - name: Check upstream results
        env:
          LINT_RUST: ${{ needs.lint-rust.result }}
          TEST_RUST: ${{ needs.test-rust.result }}
          QUALITY_TS: ${{ needs.quality-ts.result }}
          SEAM_CHECK: ${{ needs.seam-check.result }}
          DEMO_SMOKE: ${{ needs.demo-smoke.result }}
        run: |
          # Jobs that were skipped due to path filtering are fine
          for job in LINT_RUST TEST_RUST QUALITY_TS SEAM_CHECK DEMO_SMOKE; do
            result=$(eval echo "\$$job")
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Job $job failed with result: $result"
              exit 1
            fi
          done
          echo "All quality gates passed (skipped jobs are OK)"
