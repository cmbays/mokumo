name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Breadcrumb lint — no inline Breadcrumb or duplicate Dashboard
        run: |
          FAIL=0
          # 1. No page should import raw <Breadcrumb> — must use <Topbar>
          if grep -rn 'from.*@/components/ui/breadcrumb' app/ --include='*.tsx'; then
            echo "::error::Pages must use <Topbar breadcrumbs={buildBreadcrumbs(...)}> — not import from @/components/ui/breadcrumb. See lib/helpers/breadcrumbs.ts"
            FAIL=1
          fi
          # 2. No page should pass Dashboard in breadcrumbs prop
          if grep -rn 'label:.*["\x27\x60]Dashboard["\x27\x60]' app/ --include='*.tsx'; then
            echo "::error::Pages must not include Dashboard in breadcrumbs — Topbar renders it automatically."
            FAIL=1
          fi
          exit $FAIL

      - name: Issue template sync check — templates must match config files
        run: |
          node scripts/sync-issue-templates.js
          git diff --exit-code .github/ISSUE_TEMPLATE/ || {
            echo "::error::Issue templates are out of sync with src/config/products.json + tools/orchestration/config/tools.json. Run 'npm run sync:templates' locally and commit the result."
            exit 1
          }

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Architecture check
        run: npm run test:architecture

      - name: Unit tests
        run: npx vitest run --project unit

      - name: Acceptance tests
        run: npx vitest run --project acceptance

      - name: Build
        run: npm run build

      - name: Schema migration drift check (warn on main PRs and pushes)
        if: |
          (github.event_name == 'pull_request' && github.base_ref == 'main') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        continue-on-error: true
        run: npx drizzle-kit check

      - name: Schema migration drift check (hard fail on production)
        if: github.ref == 'refs/heads/production'
        run: npx drizzle-kit check

      - name: Coverage
        run: npm run test:coverage

      - name: Install Playwright browsers
        if: hashFiles('tests/e2e/**') != ''
        run: npx playwright install --with-deps chromium

      - name: E2E tests (non-blocking)
        if: hashFiles('tests/e2e/**') != ''
        continue-on-error: true
        run: |
          npx next start &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e

  mutation:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Mutation testing (incremental)
        run: npm run test:mutate:incremental
        continue-on-error: true

  dbt-check:
    name: dbt CI (parse + modified build)
    runs-on: ubuntu-latest

    env:
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PUSH_BEFORE_SHA: ${{ github.event.before }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect dbt changes
        id: changes
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
          else
            BASE="$PUSH_BEFORE_SHA"
          fi

          # Any file in dbt/ changed?
          if git diff --name-only "$BASE" HEAD -- 'dbt/' | grep -q .; then
            echo "dbt=true" >> "$GITHUB_OUTPUT"
          else
            echo "dbt=false" >> "$GITHUB_OUTPUT"
          fi

          # Model/macro/snapshot files changed? (triggers state:modified build)
          if git diff --name-only "$BASE" HEAD -- 'dbt/models/' 'dbt/macros/' 'dbt/snapshots/' | grep -q .; then
            echo "dbt_models=true" >> "$GITHUB_OUTPUT"
          else
            echo "dbt_models=false" >> "$GITHUB_OUTPUT"
          fi

      # ── dbt parse (lightweight, no DB) ────────────────────────────────
      - name: Install uv
        if: steps.changes.outputs.dbt == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'dbt/uv.lock'

      - name: Set up Python
        if: steps.changes.outputs.dbt == 'true'
        run: uv python install

      - name: Install dbt dependencies
        if: steps.changes.outputs.dbt == 'true'
        working-directory: dbt
        run: |
          uv sync --frozen
          cp profiles/profiles.yml.example profiles/profiles.yml
          uv run dbt deps

      - name: dbt parse
        if: steps.changes.outputs.dbt == 'true'
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
        run: uv run dbt parse

      - name: Pin Supabase host to IPv4 in /etc/hosts (Azure runners lack IPv6 routing)
        if: steps.changes.outputs.dbt == 'true'
        uses: ./.github/actions/pin-supabase-ipv4
        with:
          supabase-host: ${{ secrets.SUPABASE_DB_HOST }}

      - name: sqlfluff lint
        if: steps.changes.outputs.dbt == 'true'
        working-directory: dbt
        env:
          DBT_PG_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DBT_PG_PORT: '5432'
          DBT_PG_USER: ${{ secrets.SUPABASE_DB_USER }}
          DBT_PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DBT_PG_DATABASE: postgres
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
        run: uv run sqlfluff lint models/ --format github-annotation-native

      # ── dbt build --empty state:modified+ (dry run — validates SQL, zero rows) ──
      - name: Restore production manifest
        if: steps.changes.outputs.dbt_models == 'true'
        uses: actions/cache/restore@v5
        with:
          path: dbt/prod-manifest
          key: dbt-prod-manifest-never-exact-match
          restore-keys: dbt-prod-manifest-

      - name: dbt build --empty (dry run, modified only)
        if: steps.changes.outputs.dbt_models == 'true'
        working-directory: dbt
        env:
          DBT_PG_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DBT_PG_PORT: '5432'
          DBT_PG_USER: ${{ secrets.SUPABASE_DB_USER }}
          DBT_PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DBT_PG_DATABASE: postgres
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
        run: |
          if [ -f prod-manifest/manifest.json ]; then
            echo "Production manifest found — running state:modified+ dry run (--empty)"
            uv run dbt build --select state:modified+ --defer --state ./prod-manifest/ --empty --target prod
          else
            echo "::notice::No production manifest cached yet — skipping state:modified build. Run dbt-run.yml to seed the cache."
          fi

  deploy-preview:
    name: Deploy preview (main → Vercel preview)
    needs: check
    runs-on: ubuntu-latest
    # Fires on direct push to main or manual workflow_dispatch — not on PRs, not on production
    # Production deploys via Vercel's native Git integration (tracks production branch)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Deploy to Vercel preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --token "$VERCEL_TOKEN"

  dbt-production-gate:
    name: dbt production gate (full build)
    runs-on: ubuntu-latest
    # Only runs on production merges — the heavy check before release
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/production') ||
      (github.event_name == 'pull_request' && github.base_ref == 'production')

    env:
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PUSH_BEFORE_SHA: ${{ github.event.before }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect dbt changes
        id: changes
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
          else
            BASE="$PUSH_BEFORE_SHA"
          fi

          if git diff --name-only "$BASE" HEAD -- 'dbt/models/' 'dbt/macros/' 'dbt/snapshots/' | grep -q .; then
            echo "dbt_models=true" >> "$GITHUB_OUTPUT"
          else
            echo "dbt_models=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.changes.outputs.dbt_models == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'dbt/uv.lock'

      - name: Set up Python
        if: steps.changes.outputs.dbt_models == 'true'
        run: uv python install

      - name: Install dbt dependencies
        if: steps.changes.outputs.dbt_models == 'true'
        working-directory: dbt
        run: |
          uv sync --frozen
          cp profiles/profiles.yml.example profiles/profiles.yml
          uv run dbt deps

      - name: Restore production manifest
        if: steps.changes.outputs.dbt_models == 'true'
        uses: actions/cache/restore@v5
        with:
          path: dbt/prod-manifest
          key: dbt-prod-manifest-never-exact-match
          restore-keys: dbt-prod-manifest-

      - name: Pin Supabase host to IPv4 in /etc/hosts (Azure runners lack IPv6 routing)
        if: steps.changes.outputs.dbt_models == 'true'
        uses: ./.github/actions/pin-supabase-ipv4
        with:
          supabase-host: ${{ secrets.SUPABASE_DB_HOST }}

      - name: dbt build (full, modified only)
        if: steps.changes.outputs.dbt_models == 'true'
        working-directory: dbt
        env:
          DBT_PG_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          DBT_PG_PORT: '5432'
          DBT_PG_USER: ${{ secrets.SUPABASE_DB_USER }}
          DBT_PG_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DBT_PG_DATABASE: postgres
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
        run: |
          if [ -f prod-manifest/manifest.json ]; then
            echo "Production manifest found — running full state:modified+ build (no --empty)"
            uv run dbt build --select state:modified+ --defer --state ./prod-manifest/ --target prod
          else
            echo "::notice::No production manifest cached — running full dbt build"
            uv run dbt build --target prod
          fi

  create-release:
    name: Create GitHub Release (production)
    needs: [check, dbt-production-gate]
    runs-on: ubuntu-latest
    # Only fires when production branch is pushed (i.e. after a main→production merge)
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create CalVer release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(date -u +%Y.%m.%d)
          TAG="v${VERSION}"
          COUNT=1
          # Increment suffix if a release already exists for today
          while gh release view "$TAG" &>/dev/null; do
            COUNT=$((COUNT + 1))
            TAG="v${VERSION}-${COUNT}"
          done
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --target production
