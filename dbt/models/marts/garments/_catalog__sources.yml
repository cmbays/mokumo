version: 2

sources:
  - name: catalog
    description: >
      Normalized catalog tables in the public schema, populated by the
      products sync service (POST /api/catalog/sync-products).
      This source is the OLTP foundation for the garments analytics mart.
      Note: catalog_colors is read directly (not via raw append-only tables)
      because it already provides one deduplicated row per (style, color).
      Re-evaluate if row count exceeds ~500k.
    schema: public
    tables:
      - name: catalog_colors
        description: >
          One row per (style_id, color_name). Contains color metadata including
          color_family_name (broad S&S bucket) and color_group_name (more specific
          S&S grouping), both populated during sync.
        columns:
          - name: id
            description: UUID primary key.
            data_tests:
              - not_null
              - unique
          - name: style_id
            description: FK to catalog_styles.id.
            data_tests:
              - not_null
          - name: name
            description: Color name as provided by the supplier.
            data_tests:
              - not_null
          - name: color_family_name
            description: >
              Broad color family from S&S API (e.g. 'Blue', 'Green', 'Red').
              NULL for rows synced before migration 0016 or for non-S&S sources.
              Used by dim_color_families mart as the grouping key.
          - name: color_group_name
            description: >
              More specific S&S color grouping (e.g. 'Navy', 'Royal Blue', 'Sky Blue').
              More granular than color_family_name. NULL for non-S&S sources.
              Used by dim_color_groups mart as the grouping key.
              The catalog filter UI reads this directly from catalog_colors (OLTP).
          - name: color_code
            description: >
              Supplier color code (e.g. '032'). Nullable. Future cross-supplier join key.
          - name: hex1
            description: Primary hex color (with # prefix). Nullable.
