[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/types",
    "crates/db",
    "services/api",
    "apps/desktop",
]

[workspace.package]
version = "0.1.0"
authors = ["Christopher Bays <cmbays@breezybayslabs.com>"]
edition = "2024"
license = "BUSL-1.1"
repository = "https://github.com/cmbays/mokumo"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Web framework
axum = { version = "0.8", features = ["macros"] }
tower-http = { version = "0.6", features = ["fs", "trace"] }

# Database
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "sqlite",
    "macros",
    "migrate",
    "chrono",
] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Type sharing
ts-rs = { version = "11", features = ["format"] }

# SPA embedding
rust-embed = { version = "8", features = ["mime-guess"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Date/time
chrono = { version = "0.4", features = ["serde"] }

# SQLite direct access (backup version queries)
rusqlite = { version = "0.32", features = ["bundled", "backup"] }

# Platform directories
directories = "6"

# Graceful shutdown
tokio-util = { version = "0.7", features = ["rt"] }

# Tauri desktop shell
tauri = { version = "2", features = ["devtools"] }
tauri-build = "2"
tauri-plugin-single-instance = "2"

# Testing
serial_test = "3"

# Internal crates
mokumo-core = { path = "crates/core" }
mokumo-types = { path = "crates/types" }
mokumo-db = { path = "crates/db" }
mokumo-api = { path = "services/api" }
